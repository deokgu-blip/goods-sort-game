  (function(){ var pb=document.getElementById('pause'); if(pb) pb.addEventListener('click', function(){ haptic('btn'); pauseGame(true); }); })();
  document.getElementById('resumeBtn').addEventListener('click', function(){ haptic('btn'); resumeGame(); });

  // =============================================================
  // ITEM (POWERUP) BAR — hammer always on; timefreeze/shuffle/addtime unlock at Lv 3/6/9.
  // CHALLENGE ECONOMY (2026-06-30): NO per-level free refill. Each item grants ONE free use the FIRST
  // time it unlocks (gs_item_freebie); after that you BUY with coins (persistent inventory, gs_items).
  // =============================================================
  var ITEM_DEFS = [
    { key:'hammer',     icon:'btn_hammer',     unlock:1, cost:120, name:'HAMMER',      desc:'Smash a good and 2 more of the same kind.' },
    { key:'timefreeze', icon:'btn_timefreeze', unlock:3, cost:150, name:'TIME FREEZE', desc:'Freezes the timer for 8 seconds.' },
    { key:'shuffle',    icon:'btn_shuffle',    unlock:6, cost:200, name:'RESHUFFLE',   desc:'Shuffles every item into a fresh layout.' },
    { key:'addtime',    icon:'btn_addtime',    unlock:9, cost:180, name:'ADD TIME',    desc:'Adds 30 seconds to the timer.' }
  ];
  var FREE_ON_UNLOCK = 1, FREEZE_MS = 8000;
  // PERSISTENT item inventory (challenge economy): owned counts persist across levels via gs_items.
  // NO per-level free refill — each item grants ONE free use the FIRST time it unlocks (gs_item_freebie).
  var itemFree = (function(){ try{ return JSON.parse(localStorage.getItem('gs_items')||'{}')||{}; }catch(e){ return {}; } })();
  function saveItems(){ try{ localStorage.setItem('gs_items', JSON.stringify(itemFree)); }catch(e){} }
  function freebieSet(){ try{ return JSON.parse(localStorage.getItem('gs_item_freebie')||'{}'); }catch(e){ return {}; } }
  function grantUnlockFreebies(){
    var fb=freebieSet(), changed=false;
    ITEM_DEFS.forEach(function(d){ if (S.level >= d.unlock && !fb[d.key]){ itemFree[d.key]=(itemFree[d.key]||0)+FREE_ON_UNLOCK; fb[d.key]=1; changed=true; } });
    if (changed){ try{ localStorage.setItem('gs_item_freebie', JSON.stringify(fb)); }catch(e){} saveItems(); }
  }
  var freezeUntil = 0;          // performance.now() ts until which the timer is frozen
  var hammerArmed = false;
  function defOf(k){ for (var i=0;i<ITEM_DEFS.length;i++) if (ITEM_DEFS[i].key===k) return ITEM_DEFS[i]; return null; }
  function itemUnlocked(def){ return S._cheat || S.level >= def.unlock; }

  // (re)render every item tile for the current level state.
  function renderItems(){
    document.querySelectorAll('#boosters .booster').forEach(function(b){
      var key=b.getAttribute('data-item'), def=defOf(key); if(!def) return;
      var locked=!itemUnlocked(def), free=itemFree[key]||0;
      b.style.setProperty('--bicon', 'url("../assets/ui/'+def.icon+'.png")');   // icon -> ::before; tile = element bg
      b.classList.toggle('locked', locked);
      b.classList.toggle('armed', key==='hammer' && hammerArmed);
      if (locked){
        b.innerHTML = '<div class="lock-ov"><div class="lk-lv">Lv '+def.unlock+'</div><div class="lk-pad"></div></div>';
      } else if (free>0){
        b.innerHTML = '<div class="qty-badge">'+(S._cheat?'∞':free)+'</div>';   // inventory count (∞ in cheat)
      } else {
        b.innerHTML = '<div class="qty-badge plus">+</div>';        // empty -> yellow "+" (same badge as count; opens shop)
      }
    });
    document.body.classList.toggle('hammer-aim', hammerArmed);
  }

  // an item is usable only if INVENTORY remains. Coins are spent in the SHOP (openShop), not here.
  function canUse(key){ return S._cheat || (itemFree[key]||0) > 0; }
  // consume ONE from inventory. Returns true if there was one.
  function consumeItem(key){ if (S._cheat) return true; if ((itemFree[key]||0) > 0){ itemFree[key]-=1; saveItems(); return true; } return false; }
  // BUY one more of an item with coins (item shop). Returns true on success.
  function buyItem(key){
    var def=defOf(key); if(!def) return false; var cost=def.cost||0;
    if (S.coins >= cost){ S.coins-=cost; saveCoins(); itemFree[key]=(itemFree[key]||0)+1; saveItems(); return true; }
    return false;
  }

  // tapping an item. empty (inventory 0) -> open the buy popup; hammer toggles targeting; rest fire.
  function useItem(key){
    if (S.over || S.paused) return false;
    var def=defOf(key); if(!def || !itemUnlocked(def)){ haptic('btn'); return false; }
    if (key==='hammer'){                                 // arm/disarm targeting (consume at smash)
      if (hammerArmed){ hammerArmed=false; renderItems(); return true; }   // tap again -> disarm
      if (!canUse('hammer')){ openShop('hammer'); return false; }          // empty -> buy popup
      hammerArmed=true; renderItems(); return true;                         // arm targeting
    }
    if (!canUse(key)){ openShop(key); return false; }    // empty -> buy popup
    var fired=false;
    if (key==='timefreeze'){ freezeUntil = performance.now()+FREEZE_MS; document.body.classList.add('frozen');
      setTimeout(function(){ document.body.classList.remove('frozen'); }, FREEZE_MS); itemFreezeFx(); fired=true; }
    else if (key==='shuffle'){ itemShuffleFx(reshuffleBoard); fired=true; }
    else if (key==='addtime'){ S.timeLeft = Math.max(0,S.timeLeft)+30; updateTimer(); itemAddTimeFx(); fired=true; }
    if (fired){ consumeItem(key); haptic('clear'); renderItems(); }
    return fired;
  }

  // HAMMER smash — removes the tapped good AND up to 2 MORE goods of the SAME kind
  // (total 3) from any unlocked front layer, freeing slots. Not a clear: no combo/lock countdown.
  function hammerSmash(goodEl){
    var cb0=S.cubbies[+goodEl.dataset.cubby]; if(!cb0 || cb0.lock>0 || cb0._holding) return false;
    var slot0=+goodEl.dataset.slot, fl0=frontLayer(cb0); if(!fl0 || !fl0[slot0]) return false;
    var type=fl0[slot0];
    if (!consumeItem('hammer')){ haptic('btn'); return false; }   // pay free-or-coin
    hammerArmed=false;
    (function(){ var r=goodEl.getBoundingClientRect(); hammerSwingFx(r.left+r.width/2, r.top+r.height*0.42); })();

    // targets: tapped good FIRST, then up to 2 MORE of the same type from any unlocked front layer.
    var targets=[{cb:cb0, slot:slot0}];
    for (var ci=0; ci<S.cubbies.length && targets.length<3; ci++){
      var cb=S.cubbies[ci]; if(cb.lock>0 || cb._holding) continue;
      var fl=frontLayer(cb); if(!fl) continue;
      for (var si=0; si<SLOTS && targets.length<3; si++){
        if (fl[si]===type && !(cb===cb0 && si===slot0)) targets.push({cb:cb, slot:si});
      }
    }

    // remove each: null data + animate the DOM good out.
    var touched=[];
    targets.forEach(function(t){
      var fl=frontLayer(t.cb); if(!fl || fl[t.slot]!==type) return;
      fl[t.slot]=null;
      var gEl=frontGoodDOM(t.cb, t.slot);
      if (gEl){
        var r=gEl.getBoundingClientRect();
        sparkleRing(r.left+r.width/2, r.top+r.height/2);
        popPuff(r.left+r.width/2, r.top+r.height*0.46);
        gEl.style.transition='transform .2s ease, opacity .2s ease';
        gEl.style.transform='scale(.2) rotate(22deg)'; gEl.style.opacity='0';
      }
      if (touched.indexOf(t.cb)<0) touched.push(t.cb);
    });

    // reveal a back layer for any cubby whose FRONT just emptied.
    touched.forEach(function(cb){
      var fl=frontLayer(cb), empty=true;
      if (fl){ for(var si=0;si<SLOTS;si++) if(fl[si]) empty=false; }
      cb._hReveal=(empty && cb.layers.length>1);
      if (cb._hReveal) cb.layers.shift();
    });

    haptic('clear'); renderItems();
    setTimeout(function(){
      touched.forEach(function(cb){ renderCubby(cb, cb._hReveal?{reveal:true}:{}); cb._hReveal=false; });
      checkWin(); maybeDeadlock();
    }, 220);
    return true;
  }

  // ---- ITEM unlock ONBOARDING (shown once when an item first unlocks) ----
  function onboardSet(){ try{ return JSON.parse(localStorage.getItem('gs_item_onboarded')||'{}'); }catch(e){ return {}; } }
  function saveOnboardSet(s){ try{ localStorage.setItem('gs_item_onboarded', JSON.stringify(s)); }catch(e){} }
  function maybeOnboard(){

  // ---- FIRST-PLAY gameplay tutorial (stage 1 only, once) -------------------
  // A welcome card explains the goal, then a looping finger coachmark demonstrates
  // the drag on the real board. Auto-dismisses on first interaction or after 3 loops.
  function tutorialDone(){ try{ return localStorage.getItem('gs_tutorial_done')==='1'; }catch(e){ return false; } }
  function setTutorialDone(){ try{ localStorage.setItem('gs_tutorial_done','1'); }catch(e){} }
  var tutorHandEl=null, tutorCapEl=null, tutorLoop=null, tutGuide=null;
  function clearTutorHand(){
    if (tutorLoop){ clearTimeout(tutorLoop); tutorLoop=null; }
    if (tutorHandEl){ tutorHandEl.remove(); tutorHandEl=null; }

  function maybeGameTutorial(){
    if (window.__NO_TUTORIAL) return;                  // verify/screenshot harnesses skip the coachmark
    if (!window.__stagesSettled) return;               // wait for the LIVE stage (skip the embedded boot pass)
    if (S.level !== 1 || S.over) return;
    // DEDICATED clean tutorial stage (cfg.tutorial): a GUIDED + GATED tutorial. The hand shows on EVERY
    // L1 visit (NOT gated by gs_tutorial_done — user: "손이 안 보여"), points at the exact required move,
    // and ONLY that move is grabbable/droppable (user: "튜토리얼이면 정답 객체 외엔 선택 못 하게 막아야지").
    if (S.cfg.tutorial){ setTimeout(startGuidedTutorial, 450); return; }
    // non-tutorial first play (legacy path): welcome card + a 3-loop demo coachmark, once per install.
    if (tutorialDone()) return;
    setTutorialDone();
    S.paused = true;                                   // hold the timer during the welcome card
    popupBox.innerHTML =
      '<div class="card onboard tut">' +
        '<div class="ob-title">HOW TO PLAY</div>' +
        '<div class="tut-emoji">🛒</div>' +
        '<div class="ob-name">Collect 3 matching goods!</div>' +
        '<div class="ob-desc">Drag a good onto a <b>matching good</b>.<br>Fill a cell with <b>3</b> of a kind to clear it.<br>Use the empty cells to clear them all!</div>' +
        '<div class="ibtn ob-ok" id="tutOk">START</div>' +

      setTimeout(function(){ var p=tutorHintPair(); if(p&&p.src.el&&p.tgt.el) runTutorHand(p.src.el, p.tgt.el, false); }, 250);
    });
  }
  function tutorFrontTop(cb){ var f=frontLayer(cb); if(!f) return null; for(var i=0;i<SLOTS;i++) if(f[i]) return f[i]; return null; }
  function tutorFrontCount(cb, g){ var f=frontLayer(cb), c=0; if(!f) return 0; for(var i=0;i<SLOTS;i++) if(f[i]===g) c++; return c; }
  function tutorFrontHasEmpty(cb){ var f=frontLayer(cb); if(!f) return false; for(var i=0;i<SLOTS;i++) if(!f[i]) return true; return false; }
  function tutorHintPair(){
    var cbs = S.cubbies, i, j, s;
    // PREFER a real CLEARING move: a TARGET whose front already has 2 of a good + an empty slot,
    // and a SOURCE (other cubby) holding that good in front -> dragging it there makes 3 = clears.
    for (i=0;i<cbs.length;i++){
      var tgt = cbs[i]; if (!tgt.el || !tutorFrontHasEmpty(tgt)) continue;
      var tf = frontLayer(tgt); var counts = {};
      for (s=0;s<SLOTS;s++){ if (tf[s]) counts[tf[s]] = (counts[tf[s]]||0)+1; }
      for (var g in counts){ if (counts[g] === 2){
        for (j=0;j<cbs.length;j++){ if (cbs[j]!==tgt && cbs[j].el && tutorFrontCount(cbs[j], g) >= 1) return { src:cbs[j], tgt:tgt, good:g }; }
      }}
    }
    // fallback: any source with a front good -> a cubby that shares it (or any other cubby)
    var src=null, fb=null, gg;
    for (i=0;i<cbs.length;i++){ if (cbs[i].el && tutorFrontTop(cbs[i])){ src=cbs[i]; break; } }
    if (!src) return null;
    gg = tutorFrontTop(src);
    for (i=0;i<cbs.length;i++){ if (cbs[i]!==src && cbs[i].el && tutorFrontTop(cbs[i])===gg){ fb=cbs[i]; break; } }
    if (!fb){ for (i=0;i<cbs.length;i++){ if (cbs[i]!==src && cbs[i].el){ fb=cbs[i]; break; } } }
    return fb ? { src:src, tgt:fb, good:gg } : null;
  }
  // GUIDED tutorial (L1): point the hand at the exact move + LOCK every other good (gate in onDown/endDrag).
  function startGuidedTutorial(){ if (S.over || S.level!==1) return; refreshGuidedTutorial(); }
  var tutPokeEl=null;
  function setTutPoke(el){ clearTutPoke(); if (el && el.classList){ el.classList.add('tut-poke'); tutPokeEl=el; } }
  function clearTutPoke(){ if (tutPokeEl && tutPokeEl.classList) tutPokeEl.classList.remove('tut-poke'); tutPokeEl=null; }
  function refreshGuidedTutorial(){
    clearTutorHand();
    if (S.over || S.level!==1){ tutGuide=null; clearTutPoke(); return; }
    var pair = tutorHintPair();

    goodGaps: function(){

      return {
        kind: 'css3d-niche',
        threeCanvas: !!document.querySelector('#shelf canvas, #board-wrap canvas'),
        // preserve-3d now lives on the INNER niche-clip (the folded-box layer).
        preserve3d: clipSt ? (clipSt.transformStyle === 'preserve-3d') : false,
        // perspective now lives PER-CUBBY (so each niche clips its own receding interior).
        perspective: cub ? getComputedStyle(cub).perspective : 'none',
        wallDepth: wd,
        wallDepthPx: parseFloat(wd) || 0,
        cubbies: document.querySelectorAll('#grid .cubby').length,
        backWalls: document.querySelectorAll('#grid .cubby .c-back').length,
        sideWalls: document.querySelectorAll('#grid .cubby .c-wall').length,        // 4/cubby (t/b/l/r)
        floors: document.querySelectorAll('#grid .cubby .c-floor').length,
        backLayers: document.querySelectorAll('#grid .cubby .c-back-layer').length,
        goodsInFloors: document.querySelectorAll('#grid .cubby .c-floor .good').length,
        peekGoods: document.querySelectorAll('#grid .cubby .c-back-layer .good.peek').length
      };
    },
    // =====================================================================
    // V12 — UNIFIED 3D WOOD NICHE probes (replaces the old flat-shelf wood probes).
    //  Each cubby = a folded 3D wood box: 5+ faces (BACK + FLOOR + CEILING + L wall +
    //  R wall) present and using wood/cream; FLOOR + CEILING visible (nonzero projected
    //  height); SIDE walls visible (nonzero projected width); cubby aspect LANDSCAPE
    //  (w/h > 1.25); goods stand ON the floor (good base ≈ floor line) with contact
    //  shadow; FRONT row vs BACK row depth ordering (front goods closer = larger z).
    // =====================================================================
    shelfNiche: function(){
      var cub = document.querySelector('#grid .cubby');
      if (!cub) return null;
      var cr = cub.getBoundingClientRect();
      function styleImg(sel){ var e = cub.querySelector(sel); return e ? getComputedStyle(e).backgroundImage : ''; }
      function projRect(sel){ var e = cub.querySelector(sel); if(!e) return {w:0,h:0,present:false};
        var r = e.getBoundingClientRect(); return { w:r.width, h:r.height, present:true }; }
      // the 5 box faces present + which asset/color each uses.
      var back = cub.querySelector('.c-back');
      var floor= cub.querySelector('.c-wall.b');
      var ceil = cub.querySelector('.c-wall.t');
      var left = cub.querySelector('.c-wall.l');
      var right= cub.querySelector('.c-wall.r');
      var rim  = cub.querySelector('.c-rim');
      var backBg = back ? getComputedStyle(back).backgroundColor : null;
      var bodyBg = getComputedStyle(document.body).backgroundColor;
      // projected (rendered, post-3D-transform) sizes — folded faces foreshorten to a
      // visible sliver: floor/ceiling get nonzero projected HEIGHT, side walls nonzero
      // projected WIDTH. (A face that didn't fold/reveal would project to ~0.)
      var fp = projRect('.c-wall.b'), cp = projRect('.c-wall.t');
      var lp = projRect('.c-wall.l'), rp = projRect('.c-wall.r');
      // wood asset usage per face
      var usesBoard = function(s){ return /shelf_board\.png/.test(s); };
      var usesPost  = function(s){ return /post\.png/.test(s); };
      // GOOD ON FLOOR: a front good's base ≈ the cubby floor line (bottom). + contact shadow.
      // Also: the good's TOP must leave a GAP below the cubby top so a strip of the CEILING
      // wood shows ABOVE the good (V15 — goods don't crowd the ceiling). goodTopGap = px from
      // the cubby top to the good top; goodFillPct = good height as % of the cubby interior.
      var fg = cub.querySelector('.c-floor .good');
      var goodBaseDelta = null, hasShadow = false, goodTopGap = null, goodFillPct = null, goodCellFillPct = null;
      if (fg){
        var gr = fg.getBoundingClientRect();
        goodBaseDelta = Math.abs(gr.bottom - cr.bottom);       // good base vs cubby floor line
        goodTopGap = gr.top - cr.top;                          // headroom above the good (ceiling strip)
        goodFillPct = (gr.height / cr.height) * 100;           // how much of the cubby the good fills (HEIGHT)
        // V16 FAT goods: a wide good is WIDTH-bound (shorter) and fills its uniform CELL by
        // WIDTH. "filling the cubby" for fat goods = filling the cell width (cubbyW/3).
        goodCellFillPct = (gr.width / (cr.width / 3)) * 100;
        var cs2 = getComputedStyle(fg, '::after');
        hasShadow = (cs2.getPropertyValue('content') !== 'none') &&
                    /gradient/.test(cs2.getPropertyValue('background-image') || cs2.getPropertyValue('background') || '');
      }
      // FRONT vs BACK depth: read the translateZ (--gz) the engine sets. Front row should
      // be CLOSER to camera (larger z, i.e. less negative) than the back/peek row.
      function gzOf(sel){ var e = cub.querySelector(sel); if(!e) return null;
        var v = e.style.getPropertyValue('--gz'); return v ? parseFloat(v) : null; }
      var frontGz = gzOf('.c-floor .good');
      var backGz  = gzOf('.c-back-layer .good');
      return {
        aspect: cr.width / cr.height,
        cubbyW: cr.width, cubbyH: cr.height,
        // 5+ faces present
        facesPresent: !!(back && floor && ceil && left && right),
        rimPresent: !!rim,
        // faces use wood/cream
        backIsCream: backBg === bodyBg,
        floorUsesWood: usesBoard(styleImg('.c-wall.b')),
        ceilUsesWood:  usesBoard(styleImg('.c-wall.t')),
        leftUsesWood:  usesPost(styleImg('.c-wall.l')),
        rightUsesWood: usesPost(styleImg('.c-wall.r')),
        rimUsesWood:   usesBoard(styleImg('.c-rim')),
        // floor + ceiling visible (nonzero projected height)
        floorProjH: fp.h, ceilProjH: cp.h,
        // side walls visible (nonzero projected width)
        leftProjW: lp.w, rightProjW: rp.w,
        // goods stand ON the floor + contact shadow
        goodBaseDelta: goodBaseDelta, hasContactShadow: hasShadow,
        // good leaves a ceiling strip above it (headroom) + how much of the cubby it fills
        // (by HEIGHT for slim/tall goods; by CELL WIDTH for fat/wide goods)
        goodTopGap: goodTopGap, goodFillPct: goodFillPct, goodCellFillPct: goodCellFillPct,
        // front/back depth ordering
        frontGz: frontGz, backGz: backGz,
        depthOK: (frontGz != null && backGz != null) ? (frontGz > backGz) : null,
        bodyBg: bodyBg, backBg: backBg
      };
    },
    // =====================================================================
    // V22 — OUTER CABINET TOP FACE probe. The OUTER frame's TOP rail wood plane is tilted back so
    // its TOP SURFACE projects a visible BAND above the shelf under the look-down perspective.
    // Returns: whether it's shown (display != none), its PROJECTED band height (rendered px after the
    // 3D fold — > 0 = a visible band), where it sits relative to the shelf top edge, and a SAMPLE
    // point on its top surface (viewport px) so the verifier can screenshot it for the wood/recolor
    // hue check. frameTopDepth=0 -> hidden (projH ~0, display:none).
    // =====================================================================
    frameTop: function(){
      var persp = document.getElementById('frameTopPersp');
      var top   = document.getElementById('frameTop');
      var shelf = document.getElementById('shelf');
      if (!persp || !top || !shelf) return { present:false };
      var disp = getComputedStyle(persp).display;
      var tr = top.getBoundingClientRect();          // PROJECTED (post-3D-transform) rect
      var sr = shelf.getBoundingClientRect();
      // a sample point ~mid of the projected top band (clamped inside it) for a pixel/hue read.
      var sampleX = tr.left + tr.width * 0.5;
      var sampleY = tr.top + Math.max(1, tr.height * 0.4);
      return {
        present: true,
        shown: disp !== 'none',
        display: disp,
        projH: tr.height,                            // projected band height (>0 = visible band)
        projW: tr.width,
        frameW: sr.width,
        // FLUSH JOIN (V22b fix): the band's FRONT-BOTTOM edge sits EXACTLY ON the shelf top edge
        // (no floating gap) and its projected width == the frame width (one continuous cabinet).
        bandBottom: tr.bottom, shelfTop: sr.top,
        gap: sr.top - tr.bottom,                      // >0 = floating gap (the old bug); <=0 = fused (band sinks into frame)
        flush: tr.bottom >= sr.top - 2,               // CONNECTED: bottom AT or BELOW the frame top (overlap = fused, no floating gap)
        sameWidth: Math.abs(tr.width - sr.width) <= 2,// top face spans the SAME width as the frame
        aboveShelf: tr.top < sr.top,                  // the band visibly RISES above the shelf top edge
        frameTopDepth: (SHELF.frameTopDepth != null ? SHELF.frameTopDepth : 1.0),
        sample: { x: sampleX, y: sampleY }
      };
    },
    // =====================================================================
    // V14 — FRONT-ROW BASE NOT OCCLUDED. The front-row good stands at the FRONT of the
    // floor; the thin front rim sits BENEATH it (niche-clip z-index > rim z-index) so the
    // good PAINTS OVER the rim and its full base is visible. Returns geometry for assert:
    //  - rimTop / goodBottom: the rim's screen top must be at/below the good's base
    //    contact line (rimTop >= goodBottom - tol, i.e. the rim does NOT rise above the
    //    base) OR — when the band geometrically overlaps the base — the rim must be
    //    LAYERED BELOW the good (rimZ < clipZ) so it cannot occlude (paintOrderOK).
    //  - rimH: the rim band thickness (must be SLIM, not a tall wall).
    //  - good is at the FRONT floor edge (frontGz ≈ 0, i.e. >= back row, and ~0 depth).
    // The actual pixel test (good-base reads the good sprite, not wood) is done by the
    // verifier via a screenshot sample at baseSample {x,y}.
    // =====================================================================
    baseOcclusion: function(cubIdx){
      var sel = '#grid .cubby' + (cubIdx!=null ? '[data-idx="'+cubIdx+'"]' : '');
      var cub = document.querySelector(sel);
      if (!cub) return null;
      var rim = cub.querySelector('.c-rim');
      var clip = cub.querySelector('.niche-clip');
      var good = cub.querySelector('.c-floor .good');
      if (!rim || !good) return null;
      var rr = rim.getBoundingClientRect();
      var gr = good.getBoundingClientRect();
      var rimZ  = parseInt(getComputedStyle(rim).zIndex)  || 0;
      var clipZ = parseInt(getComputedStyle(clip).zIndex) || 0;
      var frontGz = parseFloat(good.style.getPropertyValue('--gz'));
      // paint order OK = the good's stage (niche-clip) is ABOVE the rim, so even if the
      // thin rim band overlaps the base in screen space, the GOOD is drawn ON TOP of it.
      var paintOrderOK = clipZ > rimZ;
      // a sample point on the good's BASE contact row (just inside its base, where the
      // wood rim would show if it occluded): good's horizontal center, 2px above its base.
      var baseSample = { x: gr.left + gr.width*0.5, y: gr.bottom - 3 };
      return {
        rimTop: rr.top, rimBottom: rr.bottom, rimH: rr.height,
        goodBottom: gr.bottom, goodTop: gr.top,
        rimZ: rimZ, clipZ: clipZ, paintOrderOK: paintOrderOK,
        frontGz: frontGz,
        baseSample: baseSample,
        goodLeft: gr.left, goodRight: gr.right, goodWidth: gr.width
      };
    },
    // =====================================================================
    // V5 — FRONT-ON probes (kept): no tilt + seamless cream wall.
    //  (V5-1) board/shelf transform has NO rotateX/perspective tilt.
    //  (V5-2) each cubby's open-back cream color == page/body bg color.
    // =====================================================================
    shelfV5: function(){
      function hasRotation(matrix){
        // a 2D/3D matrix with NO rotation: m11≈1,m12≈0,m21≈0,m22≈1 (and for 3D,
        // the rotation submatrix is identity). 'none' = identity = no tilt.
        if (!matrix || matrix === 'none') return false;
        var m = matrix.match(/matrix3d?\(([^)]+)\)/);
        if (!m) return false;
        var p = m[1].split(',').map(parseFloat);
        if (p.length === 6){
          return Math.abs(p[1]) > 1e-3 || Math.abs(p[2]) > 1e-3;
        }
        if (p.length === 16){
          return [1,2,4,6,8,9].some(function(i){ return Math.abs(p[i]) > 1e-3; });
        }
        return false;
      }
      var sh = document.getElementById('shelf');
      var bw = document.getElementById('board-wrap');
      var shTf = sh ? getComputedStyle(sh).transform : 'none';
      var bwTf = bw ? getComputedStyle(bw).transform : 'none';
      // page/body cream wall color (the seamless wall the shelf is mounted on)
      var bodyBg = getComputedStyle(document.body).backgroundColor;
      var bgEl = document.getElementById('bg');
      var bgBg = bgEl ? getComputedStyle(bgEl).backgroundColor : null;
      // per-cubby OPEN-BACK cream colors
      var backs = Array.prototype.map.call(document.querySelectorAll('#grid .cubby .c-back'),
        function(b){ return getComputedStyle(b).backgroundColor; });
      return {
        shelfTransform: shTf,
        boardWrapTransform: bwTf,
        shelfHasTilt: hasRotation(shTf),
        boardWrapHasTilt: hasRotation(bwTf),
        bodyBg: bodyBg, bgBg: bgBg,
        backColors: backs,
        backAllEqualBody: backs.length>0 && backs.every(function(c){ return c === bodyBg; })
      };
    },
    // =====================================================================
    // V6 — SEAM-FREE GENERATED WOOD probes.
    //  (a) row floor boards: ONE shelf_board.png element per ROW, each
    //      stretched (background-size 100% 100%, no-repeat) to ~full grid width.
    //  (b) frame sides + interior dividers use post.png; frame rails use board.
    //  (c) NO repeated/tiled wood backgrounds anywhere (all wood STRETCHES).
    //  (d) page/body bg color == cubby back-wall (cream) color (seamless wall).
    // =====================================================================
    shelfWood: function(){
      var sh = document.getElementById('shelf');
      var shRect = sh ? sh.getBoundingClientRect() : { width:1, left:0, height:1 };
      var cs = getComputedStyle(document.documentElement);
      var postW = parseFloat(cs.getPropertyValue('--frame-post-w')) || 0;
      var railH = parseFloat(cs.getPropertyValue('--frame-rail-h')) || 0;
      var divW  = parseFloat(cs.getPropertyValue('--divider-w')) || 0;
      var lap   = parseFloat(cs.getPropertyValue('--joint-lap')) || 0;
      // expected continuous-board span = grid width = shelf width - 2*frame posts.
      // V7: boards/dividers OVERLAP past the joint by `lap`, so spans are gridW+2*lap
      // (boards) and gridH+2*lap (dividers). The grid HEIGHT (for full-height posts/divs).
      var gridW = shRect.width - postW*2;
      var gridH = shRect.height - railH*2;
      function styleOf(el){ var s = getComputedStyle(el); return {
        img: s.backgroundImage, repeat: s.backgroundRepeat, size: s.backgroundSize }; }
      function usesBoard(s){ return /shelf_board\.png/.test(s.img); }
      function usesPost(s){ return /post\.png/.test(s.img); }
      function stretched(s){
        // stretched = NOT tiled: background-repeat is no-repeat AND size is 100% 100%
        // (cover/contain/auto or any 'repeat' would re-tile -> a seam).
        return /no-repeat/.test(s.repeat) && /100%\s+100%/.test(s.size);
      }
      // ROW BOARDS (one per row) — w = rendered width (full grid width + overlap), h = thickness.
      var boards = Array.prototype.map.call(document.querySelectorAll('#shelf .wood-layer .wood-board'),
        function(el){ var r = el.getBoundingClientRect(); var s = styleOf(el);
          return { w:r.width, h:r.height, board: usesBoard(s), stretched: stretched(s), repeat:s.repeat, size:s.size }; });
      // FRAME rails (top/bottom, board) + posts (sides, post) — record thickness too.
      var rails = Array.prototype.map.call(document.querySelectorAll('#shelf .wood-layer .frame-rail'),
        function(el){ var r = el.getBoundingClientRect(); var s = styleOf(el);
          return { h:r.height, board: usesBoard(s), stretched: stretched(s) }; });
      var posts = Array.prototype.map.call(document.querySelectorAll('#shelf .wood-layer .frame-post'),
        function(el){ var r = el.getBoundingClientRect(); var s = styleOf(el);
          return { w:r.width, h:r.height, post: usesPost(s), stretched: stretched(s) }; });
      // DIVIDERS (interior column boundaries, post) — record width + full-height span.
      var divs = Array.prototype.map.call(document.querySelectorAll('#shelf .wood-layer .divider'),
        function(el){ var r = el.getBoundingClientRect(); var s = styleOf(el);
          return { w:r.width, h:r.height, post: usesPost(s), stretched: stretched(s) }; });
      // collect EVERY wood element to assert none tiles
      var allWood = Array.prototype.slice.call(document.querySelectorAll(
        '#shelf .wood-layer .wood-board, #shelf .wood-layer .frame-rail, #shelf .wood-layer .frame-post, #shelf .wood-layer .divider'));
      var anyTiled = allWood.some(function(el){
        var s = getComputedStyle(el);
        // tiled iff background-repeat is anything other than no-repeat (repeat / repeat-x / round / space)
        return !/^no-repeat/.test(s.backgroundRepeat) || !/100%\s+100%/.test(s.backgroundSize);
      });
      var bodyBg = getComputedStyle(document.body).backgroundColor;
      var firstBack = document.querySelector('#grid .cubby .c-back');
      var backBg = firstBack ? getComputedStyle(firstBack).backgroundColor : null;
      return {
        rows: (S.cfg ? S.cfg.rows : 0),
        cols: (S.cfg ? S.cfg.cols : 0),
        gridW: gridW,
        gridH: gridH,
        lap: lap,
        // declared chunky thickness vars (CSS) — proves the THICKENING is data-driven.
        boardHvar: parseFloat(cs.getPropertyValue('--board-h')) || 0,
        railHvar: railH, postWvar: postW, divWvar: divW,
        boardCount: boards.length,
        boards: boards,
        boardsAllUseBoardImg: boards.length>0 && boards.every(function(b){ return b.board; }),
        boardsAllStretched: boards.length>0 && boards.every(function(b){ return b.stretched; }),
        // each board spans the FULL grid width (and a touch MORE due to the overlap lap):
        // w >= gridW (covers edge-to-edge) and w <= gridW + 2*lap + slack.
        boardsSpanFullWidth: boards.length>0 && boards.every(function(b){
          return b.w >= gridW - 2 && b.w <= gridW + 2*lap + 4; }),
        // rendered thicknesses (px) — for the THICK assert.
        boardThick: boards.length>0 ? Math.min.apply(null, boards.map(function(b){ return b.h; })) : 0,
        railCount: rails.length,
        railsUseBoardImg: rails.length>0 && rails.every(function(r){ return r.board; }),
        railsStretched: rails.length>0 && rails.every(function(r){ return r.stretched; }),
        railThick: rails.length>0 ? Math.min.apply(null, rails.map(function(r){ return r.h; })) : 0,
        postCount: posts.length,
        postsUsePostImg: posts.length>0 && posts.every(function(p){ return p.post; }),
        postsStretched: posts.length>0 && posts.every(function(p){ return p.stretched; }),
        postThick: posts.length>0 ? Math.min.apply(null, posts.map(function(p){ return p.w; })) : 0,
        // posts span the FULL shelf height (corner to corner).
        postsFullHeight: posts.length>0 && posts.every(function(p){
          return Math.abs(p.h - shRect.height) <= 2; }),
        dividerCount: divs.length,
        dividersUsePostImg: divs.length>0 && divs.every(function(d){ return d.post; }),
        dividersStretched: divs.length===0 || divs.every(function(d){ return d.stretched; }),
        divThick: divs.length>0 ? Math.min.apply(null, divs.map(function(d){ return d.w; })) : 0,
        // dividers span the FULL grid height plus overlap into rails (full-height + lap).
        dividersFullHeight: divs.length===0 || divs.every(function(d){
          return d.h >= gridH - 2 && d.h <= gridH + 2*lap + 4; }),
        anyTiled: anyTiled,
        bodyBg: bodyBg,
        backBg: backBg,
        backEqualsBody: backBg === bodyBg
      };
    },
    // =====================================================================
    // V12 — NICHE WOOD-INTERIOR SAMPLE POINTS (pixel assert that the folded wood
    // faces actually RENDER visible wood, not just exist in the DOM). Returns
    // viewport (client) px coordinates inside an EMPTY niche (no goods to occlude
    // the interior) AT the left wall, right wall, ceiling underside, and floor
    // strips. The verifier screenshots a tiny region at each point and asserts the
    // pixel is OPAQUE WOOD (not transparent, not the cream back wall) -> the wood
    // interior is genuinely visible. Picks the EMPTY workspace cubby if present.
    // =====================================================================
    nicheSamples: function(){
      // find an EMPTY cubby (its front layer all-null) so goods don't cover the walls.
      var emptyIdx = -1;
      for (var i=0;i<S.cubbies.length;i++){
        var f = frontLayer(S.cubbies[i]);
        if (f && f.every(function(x){ return !x; })){ emptyIdx = i; break; }
      }
      if (emptyIdx < 0) emptyIdx = 0;
      var cb = S.cubbies[emptyIdx];
      if (!cb || !cb.el) return { points: [], creamRGB: getComputedStyle(document.body).backgroundColor };
      var r = cb.el.getBoundingClientRect();
      var W = r.width, H = r.height;
      var pts = [];
      // LEFT/RIGHT inner walls — V13: with the UNIFORM (centered) eye the side walls fold
      // to a SUBTLE sliver (~4px) whose OPAQUE wood is right AT the opening edge (z≈0) and
      // thins toward the back wall. Sample HUGGING the opening edge (~2px in) so the strip
      // lands on the wood sliver, not the cream back wall just inside it.
      pts.push({ kind:'leftwall',  x: r.left + 2,     y: r.top + H*0.50 });
      pts.push({ kind:'rightwall', x: r.right - 2,    y: r.top + H*0.50 });
      // CEILING is HIDDEN by default (V21 — display:none) so there is NO ceiling wood band to
      // sample. Only probe it when the editor has shown it (frameCeilingDepth > 0).
      if (SHELF && SHELF.frameCeilingDepth > 0){
        pts.push({ kind:'ceiling', x: r.left + W*0.50, y: r.top + 1 });
      }
      // FLOOR — the look-down wood floor PLANE foreshortens to a band at the VERY bottom
      // opening edge (V14: the front rim is now a THIN band BEHIND the goods, so the floor
      // band is the bottommost wood strip — sample 2px above the bottom edge to land on the
      // lit plank, not the thin rim front-face just below it).
      pts.push({ kind:'floor',     x: r.left + W*0.50, y: r.bottom - 2 });
      // FRONT RIM — the thin front-face plank band along the bottom (sits just below the
      // floor surface; its front face is darker). Sample right at the bottom edge.
      pts.push({ kind:'rim',       x: r.left + W*0.50, y: r.bottom - 1 });
      var bb = getComputedStyle(document.body).backgroundColor;
      return { points: pts, creamRGB: bb, emptyIdx: emptyIdx,
               nicheRect: { left:r.left, top:r.top, width:W, height:H } };
    },
    // =====================================================================
    // V21 — UNIFORM WOOD COLOR sample points. Returns viewport (client) px coords on DISTINCT
    // wood faces — the OUTER FRAME, a cubby FLOOR-top band, a DIVIDER (the wood gap/lattice that
    // shows between two cubbies = the #grid background), and a FRONT RIM — so the verifier can
    // screenshot each and assert they are all the SAME hue (since V21 every wood face derives its
    // color from the SINGLE --grid-color, differing only in brightness). Also returns the resolved
    // --grid-color so a test can correlate the sampled hue with the picked color.
    // =====================================================================
    woodFaceSamples: function(){
      var pts = [];
      var frame = document.querySelector('#shelf .frame');
      var grid  = document.getElementById('grid');
      // OUTER FRAME — sample the wood border just inside the shelf's top-left corner (the cab-pad
      // band, which is frame wood, not a cubby opening).
      if (frame){
        var fr = frame.getBoundingClientRect();
        var pad = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cab-pad')) || 12;
        pts.push({ kind:'frame', x: fr.left + Math.max(3, pad*0.5), y: fr.top + Math.max(3, pad*0.5) });
      }
      // DIVIDER — the wood lattice gap between two horizontally-adjacent cubbies (the #grid bg
      // showing through the gap). Find two cubbies in the same row and sample the midpoint gap.
      var cubs = [].slice.call(document.querySelectorAll('#grid .cubby'));
      if (cubs.length >= 2){
        // pick a cubby and its right neighbor in the same row (same top, larger left).
        var a = cubs[0], aR = a.getBoundingClientRect();
        var b = null, bestDx = 1e9;
        cubs.forEach(function(c){ var cr = c.getBoundingClientRect();
          if (Math.abs(cr.top - aR.top) < 3 && cr.left > aR.right - 1){
            var dx = cr.left - aR.right; if (dx >= 0 && dx < bestDx){ bestDx = dx; b = c; } } });
        if (b){ var bR = b.getBoundingClientRect();
          pts.push({ kind:'divider', x: (aR.right + bR.left)/2, y: aR.top + aR.height*0.5 }); }
      }
      // FLOOR-top + RIM — reuse an EMPTY cubby's floor/rim bands (same logic as nicheSamples).
      var emptyIdx = -1;
      for (var i=0;i<S.cubbies.length;i++){
        var f = frontLayer(S.cubbies[i]);
        if (f && f.every(function(x){ return !x; })){ emptyIdx = i; break; }
      }
      if (emptyIdx < 0) emptyIdx = 0;
      var cb = S.cubbies[emptyIdx];
      if (cb && cb.el){
        var cr2 = cb.el.getBoundingClientRect();
        pts.push({ kind:'floor', x: cr2.left + cr2.width*0.50, y: cr2.bottom - 2 });
        pts.push({ kind:'rim',   x: cr2.left + cr2.width*0.50, y: cr2.bottom - 1 });
      }
      var gridColorVar = getComputedStyle(document.documentElement).getPropertyValue('--grid-color').trim();
      return { points: pts, gridColor: gridColorVar,
               liveGridColor: window.__shelfApi.get().gridColor };
    },
    stars: function(){ return S.stars; },
    combo: function(){ return S.combo; },
    maxCombo: function(){ return S.maxCombo; },
    urgent: function(){ return S.urgent; },
    comboPillText: function(){ var t = comboEl.querySelector('.cg-label'); return t ? t.textContent.replace(/\s+/g,' ').trim() : ''; },
    comboCountText: function(){ var e = document.querySelector('#comboCount .cc-x'); return e ? e.textContent.trim() : ''; },
    timeLeft: function(){ return S.timeLeft; },
    setTime: function(t){ S.timeLeft = t; updateTimer(); },
    forceLose: function(){ S.timeLeft = 0; lose(); },
    over: function(){ return S.over; },
    maxComboVal: function(){ return S.maxCombo; },
    // ---- Phase 2b QA hooks: clear / game-over / continue / deadlock ----
    // is the live overlay showing the RESULT (clear) card? returns its MAX COMBO label.
    resultCard: function(){
      var c = document.querySelector('#popupBox .clear-show');
      var v = document.querySelector('#popupBox #maxComboVal');
      var nb = document.querySelector('#popupBox #nextBtn');
      var pr = document.querySelector('#popupBox .cb-praise');
      var fw = document.querySelectorAll('#fireworks .fw, #fireworks .confetti, #fireworks .confetti-p').length;
      return { shown:!!c, on: overlay.classList.contains('on'), dim: overlay.classList.contains('clear'),
               maxComboText: v ? v.textContent.trim() : null,
               hasNext: !!nb, fireworksDom: fw,
               praiseImg: pr ? getComputedStyle(pr).backgroundImage : '' };
    },
    // is a GAME-OVER card showing? returns its mode + which banner/offer/buttons exist.
    gameOverCard: function(){
      var c = document.querySelector('#popupBox .card.gameover');
      if (!c) return { shown:false, on:overlay.classList.contains('on') };
      var title = document.querySelector('#popupBox .go-title');
      var tcls = title ? title.className : '';
      return { shown:true, on:overlay.classList.contains('on'),
        mode: /timeup/.test(tcls) ? 'timeup' : (/nospace/.test(tcls) ? 'nospace' : '?'),
        titleText: title ? title.textContent.trim() : '',
        hasContinue: !!document.querySelector('#popupBox #goContinue'),
        hasCoinHud: !!document.querySelector('#popupBox .go-coins'),
        hasClose: !!document.querySelector('#popupBox #goClose'),
        noAd: !/AD/.test(document.querySelector('#popupBox')?.textContent||''),
        hasRetry: !!document.querySelector('#popupBox #goRetry'),
        plus30: !!document.querySelector('#popupBox .oicon.plus30'),
        reshuffle: !!document.querySelector('#popupBox .oicon.reshuffle'),
        continueImg: (function(){ var b=document.querySelector('#popupBox #goContinue'); return b?getComputedStyle(b).backgroundImage:''; })(),
        retryImg: (function(){ var b=document.querySelector('#popupBox #goRetry'); return b?getComputedStyle(b).backgroundImage:''; })(),
        panelImg: getComputedStyle(c).backgroundImage,
        offerLabel: (function(){ var l=document.querySelector('#popupBox .olbl'); return l?l.textContent.trim():null; })() };
    },
    // launch the all-sides fireworks (no state change) — for the clear screenshot.
    launchFireworks: function(){ return launchFireworks(); },
    showResult: function(combo){ if(combo!=null){ S.maxCombo=combo; } showResultCard(); },
    // force each game-over directly (state -> over + the right card).
    forceTimeUp: function(){ S.timeLeft = 0; loseTimeUp(); },
    forceNoSpace: function(){ loseNoSpace(); },
    // continue handlers (simulate tapping CONTINUE on each game-over card).
    continueTimeUp: function(){ continueGame('timeup'); return { timeLeft:S.timeLeft, over:S.over, running:S.running }; },
    continueNoSpace: function(){ var before=totalGoods(); continueGame('nospace');
      return { totalBefore:before, totalAfter:totalGoods(), over:S.over, running:S.running,
               solvable: Model.solvable(Model.snapshot(), 800, 200000, Model.snapshotLocks()) }; },
    // deadlock probes
    isDeadlocked: function(){ return isDeadlocked(); },
    anyClearReachable: function(){ var r=Model.anyClearReachable(Model.snapshot(), 60000, Model.snapshotLocks()); return r; },
    boardSolvable: function(){ return Model.solvable(Model.snapshot(), 800, 200000, Model.snapshotLocks()); },
    // LOCK gimmick probes (test): set a cubby's lock count (+re-render) / read all lock states.
    setLock: function(idx, n){ var cb=S.cubbies[idx]; if(!cb) return null; cb.lock=n|0; renderCubby(cb); return cb.lock; },
    lockStates: function(){ return S.cubbies.map(function(cb){ return cb.lock|0; }); },
    fireCombo: function(n){ for(var i=0;i<(n||1);i++) bumpCombo(); return S.combo; },   // preview the combo gauge
    flyFlames: function(n){ flyFlameToCombo(window.innerWidth*0.5, window.innerHeight*0.6, n||1); return n; },   // QA: N flames fly to the pill
    bgmState: function(){ return window.__sfx ? window.__sfx.bgmState && window.__sfx.bgmState() : null; },
    // build a CONTRIVED deadlock board on the live state: 4 types x3 each (multiples of 3,
    // so the bag IS reshuffle-solvable), but arranged FULLY PACKED + MIXED with NO empty
    // slot anywhere -> no move is possible -> no clear is reachable -> DEADLOCK. This is a
    // genuine player-induced dead end (boards ship solvable). Used to verify the detector +
    // NO SPACE flow + reshuffle-to-SOLVABLE (the grouped reshuffle recovers it).
    setDeadlockBoard: function(){
      var g = (S.cfg.goods && S.cfg.goods.length>=4) ? S.cfg.goods : ['cola','juice','milk','chips'];
      var A=g[0], B=g[1], C=g[2], D=g[3];
      S.cubbies = [
        { r:0,c:0, layers:[[A,B,C]], locked:false, el:null, floor:null, backEl:null },
        { r:0,c:1, layers:[[B,C,D]], locked:false, el:null, floor:null, backEl:null },
        { r:1,c:0, layers:[[C,D,A]], locked:false, el:null, floor:null, backEl:null },
        { r:1,c:1, layers:[[D,A,B]], locked:false, el:null, floor:null, backEl:null }
      ];
      S.cfg = Object.assign({}, S.cfg, { cols:2, rows:2 });
      buildBoard();
      return { total: totalGoods(), deadlocked: isDeadlocked() };
    },
    // QA/screenshot: fire the in-play praise IMAGE + combo badge + bursts at the
    // board center for a forced combo state (does NOT mutate the board/score).
    showFx: function(combo){
      combo = combo || 1;
      S.combo = combo; if (combo > S.maxCombo) S.maxCombo = combo;
      updateComboPill(true);
      var sw = shelfEl.getBoundingClientRect();
      var cx = sw.left + sw.width*0.5, cy = sw.top + sw.height*0.42;
      praise(cx, cy, combo);
      if (combo >= 2) comboBadge(cx, cy, combo);
      sparkleRing(cx, cy); confettiBurst(cx, cy);
      flyStar(cx, cy, combo);
    },
    // QA/screenshot: fire ONLY the praise text at a horizontal fraction of the viewport
    // (frac 0=left edge .. 1=right edge) to verify the on-screen clamp for long words.
    praiseAt: function(frac, combo){
      praise(window.innerWidth * (frac==null?0.5:frac), window.innerHeight*0.4, combo||3);
    },
    // QA: drive the item system (free/coin economy + hammer 3-same).
    itemUse: function(key){ return useItem(key); },
    itemCanUse: function(key){ return canUse(key); },
    itemFreeLeft: function(key){ return itemFree[key]||0; },
    setItemFree: function(key, n){ itemFree[key]=n|0; saveItems(); renderItems(); return itemFree[key]; },
    hammerAt: function(cubbyIdx, slot){ var cb=S.cubbies[cubbyIdx]; var g=cb&&frontGoodDOM(cb,slot); return g?hammerSmash(g):false; },
    coins: function(){ return S.coins; },
    setCoins: function(n){ S.coins=n|0; saveCoins(); renderItems(); return S.coins; },
    shouldEmitGameEnd: shouldEmitGameEnd,
    safeTop: function(){ return getComputedStyle(document.documentElement).getPropertyValue('--safe-top').trim(); },
    win: function(){ win(); },
    // find a winning move sequence, then EXECUTE it on the live board (so effects +
    // haptics still fire). Solving runs on a CLONED SLOT model via bounded DFS with
    // memoization — mirrors V4 doMove/maybeReveal/clear (3-slot layers, null=empty).
    autoSolve: function(maxSteps, budget, mix){
      maxSteps = maxSteps || 2000;
      // LOCK-AWARE solve: reuse the real Model (normalize/moves/move/total) which threads lock
      // counts (locked cubbies are no source/target; every clear counts ALL locks down by 1).
      // This lets autoSolve actually clear LOCKED stages, not just lock-free ones. mix=true also
      // explores parking a good into a partial different-type cubby (the live free-sort rule),
      // which some packed boards need; default greedy keeps it fast.
      var nodeBudget = budget || 3000000, seen = {}, path = null, allowMix = !!mix;
      function dfs(st, locks, acc){
        if(nodeBudget-- <= 0) return false;
        var nr = Model.normalize(st, locks); st = nr.st; locks = nr.locks;   // auto-settle full-same fronts
        if(Model.total(st)===0){ path = acc.slice(); return true; }
        if(acc.length > maxSteps) return false;
        var k = Model.key(st, locks); if(seen[k]) return false; seen[k]=1;
        var ms = Model.moves(st, locks, allowMix);                           // lock-aware (optionally mixing)
        for(var i=0;i<ms.length;i++){
          var r = Model.move(st, ms[i].f, ms[i].t, locks); if(!r) continue;
          acc.push([ms[i].f, ms[i].t]);
          if(dfs(r.st, r.locks, acc)) return true;
          acc.pop();
        }
        return false;
      }
      var solved = dfs(Model.snapshot(), Model.snapshotLocks(), []);
      var steps = 0;
      if(solved && path){
        // execute on the live board (no explicit slot -> first-filled source, nearest-empty target).
        // S._solving bypasses the per-cubby 0.2s clear-HOLD lock (programmatic moves run synchronously).
        S._solving = true;
        for(var s=0;s<path.length && totalGoods()>0;s++){ doMove(path[s][0], path[s][1]); steps++; }
        S._solving = false;
      }
      return { steps:steps, remaining:totalGoods(), won:totalGoods()===0, solvedPlan: !!solved };
    },
    // QA: jump to a level number (drives item unlocks, which key off S.level).
    setLevel: function(n){ startLevelFn(n|0); return S.level; },
    // =====================================================================
    // SHELF CONFIG probes — prove the engine reads SHELF_DEFAULTS as the single
    // source of truth, that cornerRadius=0 yields ANGULAR corners, and that an
    // override (localStorage / applyConfig) changes the RENDERED vars.
    // =====================================================================
    shelfConfig: function(){
      var cs = getComputedStyle(document.documentElement);
      var frame = document.querySelector('#shelf .frame');
      var cub   = document.querySelector('#grid .cubby');
      var shelf = document.getElementById('shelf');
      function pxv(n){ return parseFloat(cs.getPropertyValue(n)) || 0; }
      return {
        defaults: SHELF_DEFAULTS,                          // baked-inline defaults object
        live: window.__shelfApi.get(),                     // resolved live config
        // rendered CSS-var-driven values (what actually paints):
        cornerRadiusVar: cs.getPropertyValue('--corner-radius').trim(),
        frameRadius: frame ? getComputedStyle(frame).borderTopLeftRadius : null,
        cubbyRadius: cub ? getComputedStyle(cub).borderTopLeftRadius : null,
        nichePersp: cub ? getComputedStyle(cub).perspective : null,
        rimHVar: pxv('--rim-h'),
        cabPadVar: pxv('--cab-pad'),
        nicheGapVar: pxv('--niche-gap'),
        shelfAspect: shelf ? getComputedStyle(shelf).aspectRatio : null
      };
    },
    // apply a partial config LIVE (same path the editor uses) and return the new
    // rendered values so a test can prove the override changes what paints.
    applyShelfConfig: function(partial){
      window.__shelfApi.applyConfig(partial);
      return window.__qa.shelfConfig();
    },
    // =====================================================================
    // V18 — OUTER-WALL probe. For a LEFT-of-center cubby, a CENTER column cubby, and a
    // RIGHT-of-center cubby, return the projected (rendered) WIDTH of each side wall after
    // the 3D transform. With the OUTER-wall reveal:
    //   LEFT cubby  : LEFT (outer) wall > RIGHT wall (≈0)
    //   RIGHT cubby : RIGHT (outer) wall > LEFT wall (≈0)
    //   CENTER cubby: both ≈ 0 (straight-on, no side wall)
    // We pick the cubbies by their center X relative to the board center.
    // =====================================================================
    wallsByPosition: function(){
      var grid = document.getElementById('grid').getBoundingClientRect();
      var boardCenterX = grid.left + grid.width / 2;
      var cubs = [].slice.call(document.querySelectorAll('#grid .cubby'));
      function projW(cub, sel){ var e = cub.querySelector(sel); if (!e) return 0;
        var r = e.getBoundingClientRect(); return r.width; }
      function info(cub){
        var cr = cub.getBoundingClientRect();
        return { cx: cr.left + cr.width/2,
          leftW: projW(cub, '.c-wall.l'), rightW: projW(cub, '.c-wall.r') };
      }
      // most-left, most-right, and the cubby whose center is closest to the board center.
      var leftCub = null, rightCub = null, centerCub = null, bestC = Infinity;
      cubs.forEach(function(c){
        var cr = c.getBoundingClientRect(); var cx = cr.left + cr.width/2;
        if (!leftCub || cx < leftCub.getBoundingClientRect().left) leftCub = c;
        if (!rightCub || cx > rightCub.getBoundingClientRect().left) rightCub = c;
        var d = Math.abs(cx - boardCenterX);
        if (d < bestC){ bestC = d; centerCub = c; }
      });
      return {
        boardCenterX: boardCenterX,
        left:   info(leftCub),
        center: info(centerCub),
        right:  info(rightCub)
      };
    },
    // =====================================================================
    // V18 — LIGHTING probe. Reports the GOOD drop-shadow offset (dx,dy from the CSS vars set
    // by applyShelfCssVars) so a test can assert it points BOTTOM-RIGHT (dx>0,dy>0), and the
    // front-vs-back brightness so a test can assert the BACK row is dimmer (backDim < 1, and
    // the back good's computed filter brightness < the front good's).
    // =====================================================================
    lightingProbe: function(){
      var cs = getComputedStyle(document.documentElement);
      function pxv(n){ return parseFloat(cs.getPropertyValue(n)) || 0; }
      var dx = pxv('--good-shadow-dx'), dy = pxv('--good-shadow-dy');
      var backDim = parseFloat(cs.getPropertyValue('--back-dim')) || 0;
      // pull a brightness() value out of a computed filter string (heuristic) — front goods
      // have no brightness() (full), peek goods carry brightness(var(--back-dim)).
      function brightnessOf(g){
        if (!g) return null;
        var f = getComputedStyle(g).filter || '';
        var m = /brightness\(([0-9.]+)\)/.exec(f);
        return m ? parseFloat(m[1]) : 1;   // no brightness() => full (1)
      }
      var frontG = document.querySelector('#grid .cubby .c-floor .good');
      var backG  = document.querySelector('#grid .cubby .c-back-layer .good.peek');
      var liveCfg = window.__shelfApi.get();
      return {
        shadowDx: dx, shadowDy: dy,
        lightAngle: liveCfg.lightAngle,
        shadowStrength: liveCfg.shadowStrength,
        // V21 — split shadow strengths (cubby interior shading vs goods' drop-shadow)
        cubbyShadowStrength: liveCfg.cubbyShadowStrength,
        goodShadowStrength: liveCfg.goodShadowStrength,
        // resolved good drop-shadow opacity (parsed out of --good-shadow-color rgba alpha)
        goodShadowOp: (function(){
          var c = cs.getPropertyValue('--good-shadow-color') || '';
          var m = /rgba?\([^)]*,\s*([0-9.]+)\s*\)/.exec(c); return m ? parseFloat(m[1]) : null;
        })(),
        cubbyShadeOp: parseFloat(cs.getPropertyValue('--cubby-shade-op')) || 0,
        backDim: backDim,
        frontBrightness: brightnessOf(frontG),
        backBrightness: brightnessOf(backG),
        // also read the cubby inner-shading gradient dark-pole position (should be bottom-right)
        shadeDarkX: cs.getPropertyValue('--cubby-shade-dark-x').trim(),
        shadeDarkY: cs.getPropertyValue('--cubby-shade-dark-y').trim(),
        // V19 — SHALLOW top inner-shadow band opacity (a small fraction of shadowStrength).
        topShadow: (window.__shelfApi.get().topShadow),
        topShadeOp: parseFloat(cs.getPropertyValue('--cubby-top-shade-op')) || 0,
        // does the back wall's painted gradient stack include the TOP linear band?
        backHasTopBand: (function(){
          var b = document.querySelector('#grid .cubby .c-back');
          if (!b) return false;
          var bg = getComputedStyle(b).backgroundImage || '';
          return /linear-gradient/.test(bg);   // the top band is the only linear-gradient on .c-back
        })()
      };
    }
  };
  window.__ready = true;
})();
</script>
