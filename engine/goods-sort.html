    // which forced 0 whenever ceilingVisibility=0 so the depth slider did nothing) is REMOVED.
    var frameCeilDepth = (SHELF.frameCeilingDepth != null ? SHELF.frameCeilingDepth : 0);
    var Dceil = D * frameCeilDepth;
    // V20 — FLOOR DEPTH ("각 그리드의 바닥면 깊이"): the floor face depth multiplies the base box
    // depth so the floor band can be deeper/shallower than the box.
    var floorDepthMul = (SHELF.floorDepth != null ? SHELF.floorDepth : 1.0);
    var Dfloor = D * floorDepthMul;

    S.cubbies.forEach(function(cb){
      if (!cb.el) return;
      // GLOBAL eye X in THIS cubby's local coords. A single eye above the board CENTER,
      // expressed per cubby as oxLocal = boardCenterX − cubbyLeft (the NON-mirrored form).
      // CSS sign: an eye to the RIGHT of a recessed box reveals its LEFT interior wall.
      //   LEFT-of-center cubby : cubbyLeft < boardCenterX -> oxLocal > 0 (often > W, eye to the
      //     RIGHT) -> reveals its LEFT (OUTER) wall. ✓ outer-wall spec.
      //   RIGHT-of-center cubby: cubbyLeft > boardCenterX -> oxLocal < 0 (eye to the LEFT) ->
      //     reveals its RIGHT (OUTER) wall. ✓ outer-wall spec.
      //   CENTER column        : cubbyLeft ≈ boardCenterX − W/2 -> oxLocal ≈ W/2 (straight-on,
      //     ≈ no side wall). ✓
      // So the FARTHER a cubby is from board center, the more its OUTER wall shows; the center
      // column shows ≈ none. This is the OUTER-WALL reveal the user asked for (reverts the prior
      // mirror that produced center-facing walls).
      var thisRect = cb.el.getBoundingClientRect();
      var cubbyCenterX = thisRect.left + W / 2;
      // PER-CUBBY center-distance: distFrac 0 (center column) -> 1 (edge). The V20 FALLOFF
      // factor = distFrac^wallFalloff shrinks BOTH side walls toward the center (center ≈ 0).
      var distFrac = Math.min(1, Math.abs(cubbyCenterX - boardCenterX) / halfBoardW);
      var falloff = Math.pow(distFrac, wallFalloff);
      // INDEPENDENT wall depths: OUTER wall (center-away) ∝ wallOuterReveal, CENTER-facing wall
      // (toward board center) ∝ wallCenterReveal — both × the falloff factor.
      var Douter  = D * wallOuter  * falloff;
      var Dcenter = D * wallCenter * falloff;
      // Which physical wall (left/right) is the OUTER one for THIS cubby? A cubby LEFT of board
      // center faces RIGHT toward center -> its LEFT wall is OUTER, RIGHT wall is CENTER-facing.
      // A cubby RIGHT of center -> RIGHT wall OUTER, LEFT wall CENTER-facing.
      var leftIsOuter = (cubbyCenterX <= boardCenterX);
      var Dleft  = leftIsOuter ? Douter  : Dcenter;   // left wall depth
      var Dright = leftIsOuter ? Dcenter : Douter;    // right wall depth

      // GLOBAL EYE (perspective-origin) — base X = board center expressed in local coords
      // (reveals the OUTER wall). V20: when wallCenterReveal>0 we BLEND the eye toward the
      // cubby's OWN center (W/2) so the CENTER-facing wall also folds toward the camera and
      // genuinely projects. blend = wallCenter / (wallOuter + wallCenter): 0 when no center
      // reveal (pure outer eye = current look), grows as the center wall is dialed up.
      var oxOuter = boardCenterX - thisRect.left;     // = boardCenterX − cubbyLeft (outer-wall eye)
      var oxCenter = W / 2;                            // cubby's own center (both walls show)
      var denom = wallOuter + wallCenter;
      var blend = (denom > 1e-6) ? (wallCenter / denom) : 0;
      var oxLocal = oxOuter * (1 - blend) + oxCenter * blend;
      cb.el.style.perspectiveOrigin = oxLocal + 'px ' + EYE_OY + 'px';

      // size + transform the 6 faces so the box closes exactly (no step / 단차).
      var back = cb.el.querySelector('.c-back');
      var floor = cb.el.querySelector('.c-wall.b');
      var ceil  = cb.el.querySelector('.c-wall.t');
      var left  = cb.el.querySelector('.c-wall.l');
      var right = cb.el.querySelector('.c-wall.r');
      var rim   = cb.el.querySelector('.c-rim');
      if (back){ back.style.width=W+'px'; back.style.height=H+'px';
        back.style.transform='translateZ('+(-D)+'px)'; }
      // FLOOR — depth = base D × floorDepth (V20). Hinged front-bottom, folds back.
      if (floor){ floor.style.width=W+'px'; floor.style.height=Dfloor+'px';
        floor.style.top=(H-Dfloor)+'px'; floor.style.transformOrigin='center bottom';
        floor.style.transform='rotateX('+ang+'deg)'; }
      if (ceil){
        // Per-cubby CEILING — EDITOR-ONLY (default frameCeilingDepth 0 = HIDDEN). The cabinet ROOF (지붕)
        // is the OUTER top board (buildFrameTop), NOT this inner face. When an editor config enables it
        // (frameCeilingDepth>0), a simple ceiling face folds back from the cell's top edge. ceilingTopRowOnly
        // (default true) limits it to the top row if shown.
        var ceilTopOnly = (SHELF.ceilingTopRowOnly !== false);
        var isTopRow = (!cb.attic && cb.r === 0);
        if (Dceil <= 0 || (ceilTopOnly && !isTopRow)){ ceil.style.display='none'; }
        else {
          ceil.style.display='';
          ceil.style.width=W+'px'; ceil.style.height=Dceil+'px';
          ceil.style.top='0px'; ceil.style.transformOrigin='center top';
          ceil.style.transform='rotateX('+(-ang)+'deg)';
        }
      }
      // SIDE WALLS — INDEPENDENT depths (Dleft / Dright). The perspective eye blend (above)
      // decides which one is visibly revealed; here we give each its true folded depth.
      if (left){ left.style.width=Dleft+'px'; left.style.height=H+'px';
        left.style.transformOrigin='left center'; left.style.transform='rotateY(-90deg)'; }
      if (right){ right.style.width=Dright+'px'; right.style.height=H+'px';
        right.style.left=(W-Dright)+'px'; right.style.transformOrigin='right center';
        right.style.transform='rotateY(90deg)'; }
      if (rim){ rim.style.width=W+'px'; rim.style.height=rimH+'px';
        rim.style.top=(H-rimH)+'px'; rim.style.transform='translateZ(1px)'; }
    });
    // OUTER cabinet top face (depends on the live frame width + frameTopDepth).
    buildFrameTop();
  }

  // ---- V22 — OUTER CABINET TOP FACE ----
  // Build the whole shelf unit's TOP surface: a horizontal wood plane on the OUTER frame's TOP
  // rail. The plane is hinged at its FRONT-BOTTOM edge (which sits at the shelf's top edge) and
  // folded BACK via rotateX(ang) so under the LOOK-DOWN perspective its TOP SURFACE recedes
  // up/away — exactly the cabinet top you see when glancing slightly down (ref_frame_top.png). It
  // is the OUTER cabinet top, SEPARATE from the per-cubby ceilings (frameCeilingDepth). Depth =
  // a fraction of the shelf width × frameTopDepth; frameTopDepth==0 -> display:none (hidden).
  function buildFrameTop(){
    var persp = document.getElementById('frameTopPersp');
    var top   = document.getElementById('frameTop');
    if (!persp || !top || !shelfEl) return;
    var ftDepth = (SHELF.frameTopDepth != null ? SHELF.frameTopDepth : 1.0);
    if (!(ftDepth > 0)){ persp.style.display = 'none'; return; }
    persp.style.display = 'block';   // override the CSS default (display:none -> hidden)
    var sr = shelfEl.getBoundingClientRect();
    var SW = sr.width || 1;
    // BASE band depth: a fraction of the shelf width so it scales with the board, × frameTopDepth.
    // 0.10 of the width at frameTopDepth=1 gives a clearly visible top band like the reference.
    var Dtop = Math.max(2, SW * 0.10 * ftDepth);
    // FOLD ANGLE — the top plane is hinged at its FRONT-BOTTOM edge (which sits EXACTLY ON the
    // shelf's TOP edge) and folds BACK via rotateX so its lit TOP SURFACE recedes up/away. The
    // FIX (V22b): the eye (perspective-origin) is set to 50% 100% — LEVEL WITH THE HINGE — so the
    // plane's FRONT-BOTTOM edge stays GLUED to the shelf top edge (no lift, no floating gap) and
    // its projected width stays == the frame width. A MODERATE fold (~58°) makes the band read as
    // a SOLID receding top surface that connects FLUSH down to the frame top (one continuous
    // cabinet), instead of an edge-on sliver floating above it (the old rotateX(90) bug). Still
    // controllable by frameTopDepth (it scales Dtop -> a deeper/shallower top band).
    // FOLD = shelfAngle (74°) — the SAME tilt as the FLOOR, so the roof's projected band reads as the
    // same shelf board (user: 바닥과 동일한 각도). Hinged at the FRONT-BOTTOM edge, folds back-up.
    var fold = (SHELF.shelfAngle != null ? +SHELF.shelfAngle : 74);
    // V28 — TRUE PERSPECTIVE (user: 지붕은 뒤로 갈수록 가로가 좁아져야 원근감이 맞다). Use the SAME perspective
    // as the cells (SHELF.perspective) so the roof's BACK edge CONVERGES inward (narrower) as it recedes —
    // a real top board receding away — instead of the old near-orthographic (parallel) sides. The
    // FRONT-bottom edge is at the hinge (z=0) so it stays the full frame width (connected); only the back
    // narrows -> no overhang either.
    var perspPx = Math.max(150, Math.min(4000, (SHELF.perspective != null ? +SHELF.perspective : 560)));
    document.documentElement.style.setProperty('--frame-top-persp', perspPx.toFixed(0) + 'px');
    // EYE on the hinge X (center, level with the hinge) — the band foreshortens straight back, symmetric.
    persp.style.perspectiveOrigin = '50% 100%';
    // V27 — FRONT FRAME: the roof board's FRONT-BOTTOM hinge sits EXACTLY ON the shelf's top edge (NOT
    // sunk into it), so the cabinet's TOP FRAME RAIL (the full --cab-pad wood border below the board)
    // stays VISIBLE as the roof's front frame — the SAME thickness as the floors' front frames (the
    // inter-row lattice). The old `ov` overlap covered that rail (made the front frame a ~1px sliver,
    // user: 지붕 앞쪽 프레임이 너무 얇아). bottom hinge at y=0 -> front frame == --cab-pad.
    persp.style.height = Dtop + 'px';
    persp.style.top = (-Dtop) + 'px';     // band TOP rises Dtop above; its BOTTOM hinge sits ON the shelf top edge
    top.style.height = Dtop + 'px';
    top.style.transform = 'rotateX(' + fold + 'deg)';
  }

  // ---- FIT GOODS (V8) ----
  // Size goods BIG + SNUG like the reference: each good fills ~GOOD_H_PCT of the cubby
  // INTERIOR height (board-top -> shelf above), and the 3 slim goods sit side-by-side
  // filling the cubby WIDTH with small gaps. Tiles are SQUARE but content aspects differ
  // wildly (GOOD_AR), so we size PER TYPE: target height = GOOD_H_PCT of the interior,
  // box width = height * AR; if a type's box would exceed GOOD_MAX_W_FRAC of the cubby
  // width (wide items like donut), shrink THAT type's height so it still fits. We cache
  // the per-type pixel HEIGHT in fitState; makeGood reads it to set --good-h / --good-ar.
  // V9 — goods are BIGGER + SPREAD EDGE TO EDGE (reference). Each good fills ~90% of the
  // cubby INTERIOR height (snug to the shelf above, only a sliver of headroom) and each
  // good box may be up to ~32% of the cubby width so the 3 slim goods, sitting centered
  // in their far-left / middle / far-right slots, span the WHOLE cubby width near-touching
  // (kills the big empty side margins). Wide items (donut) still shrink to fit their slot.
  // V9 — goods fill ~98% of the cubby INTERIOR height (snug to the shelf above). Slim
  // items (bottles/cartons) reach that full height; WIDE items (the chips can, the donut
  // disc) shrink their height so their width stays within budget, BUT never below a
  // MIN-HEIGHT floor so a wide disc still reads as a real good (not a sliver). The width
  // budget is generous (~0.50 of the cubby) so a can fills most of the height; a good box
  // that is wider than its slot simply overflows into the small inter-good gap (its HIT
  // region stays the slot, so it never steals a neighbor — Fix #2).
  // ---- FIT GOODS (V12 — NICHE) ----
  // Goods are BIG billboards standing on the 3D FLOOR, FILLING the (now SHORTER,
  // landscape) cubby so their tops reach up near the ceiling ("가득 찬 느낌"). The cubby
  // is shorter than before, so target height = a big fraction of the interior. The 3
  // FRONT goods spread across the full width (slots s0/s1/s2 centered ~17/50/83%) and
  // stand at the FRONT floor depth (small translateZ); the BACK row stands DEEPER on the
  // floor (bigger translateZ = real front/back depth) so it peeks above/between the front.
  // Per-type: box height = GOOD_H_PCT*interior, width = height*content-aspect; wide items
  // (donut/snack) shrink height so width stays in budget (floored so they aren't slivers).
  // V15: lowered 0.96->0.88 so the goods' tops leave a clear strip of CEILING wood visible
  // ABOVE them (like the reference, where goods fill most of the cubby but the shelf above
  // still shows). Goods stay BIG + filling (~88% of the interior), just not crowding the
  // ceiling band so the ceiling reads as a real surface, not a hidden line.
  var GOOD_H_PCT = 0.88;        // front good height = ~88% of the cubby interior (leaves ceiling strip)
  var GOOD_GAP_FRAC = 0.04;     // DEFAULT horizontal gap between goods (fraction of cubby width) —
                                // overridden by SHELF.goodGap. The 3 slot centers are spread W/6,
                                // W/2, 5W/6 (spacing W/3), so a good's width MUST stay <= W/3 - gap
                                // to NEVER reach a neighbor -> consistent gaps, no overlap.
  var PEEK_H_FRAC = 0.86;       // peek (back-row) good height = this fraction of the front good height
  // FLOOR DEPTH fractions t (0=front lip, 1=back wall): the FRONT row stands AT the FRONT
  // EDGE of the floor (t≈0 -> base frontmost, fully visible, the floor recedes BEHIND it),
  // the BACK row deeper toward the back wall (real depth -> front/back read; the back row
  // is partially occluded by the front row, which is fine). V14: FRONT_T lowered 0.14->0
  // so the front base is at/in-front-of the thin front rim and is never occluded.
  var FRONT_T = 0.0, BACK_T = 0.62;
  // FIT-TO-SLOT (no-overlap) MODEL: each good lives in ONE of 3 slot columns whose
  // centers spread across the FULL cubby width (W/6, W/2, 5W/6 -> spacing W/3). To NEVER
  // touch a neighbor, a centered good's WIDTH must stay <= the per-slot width budget:
  //     slotWidthBudget = W/3 - goodGap*W
  // We scale each good PRESERVING its real aspect (GOOD_AR = width/height) to fit within
  // BOTH that slot width budget AND the height budget (goodFillHeight*interiorH) — whichever
  // limit BINDS FIRST:
  //   - TALL/SLIM goods (bottles/cans/ice bars, AR<<1): HEIGHT-bound -> fill the height,
  //     stay narrow (their height*AR width is well under the slot budget).
  //   - WIDE goods (snack bag AR~0.71, donut AR~2.13): WIDTH-bound -> shrink to the slot
  //     width budget, end up SHORTER (their full-height width would overflow the slot).
  // Result: NO good's box exceeds its slot width -> adjacent goods never overlap.
  // fitState caches the per-type box HEIGHT (px) for the FRONT row; the back row reuses it
  // scaled by PEEK_H_FRAC (the back slots share the SAME W/3 spacing, so the same width
  // budget * PEEK_H_FRAC keeps the back row non-overlapping too).
  var fitState = { interiorH: 0, slotBudgetPx: 0, heightPx: {} };   // heightPx[type] = front good box height (px)
  function fitGoods(){
    var anyCubby = gridEl.querySelector('.cubby');
    if (!anyCubby) return;
    var cr = anyCubby.getBoundingClientRect();
    var W = cr.width || 1, H = cr.height || 1;
    if (W < 2 || H < 2) return;
    var interiorH = H;                                // goods stand on the floor at the opening bottom
    var goodHpct = (SHELF.goodFillHeight != null) ? SHELF.goodFillHeight : GOOD_H_PCT;
    // MOBILE FIX: on small phone cells the tall goods covered the wood FLOOR band (user:
    // "모바일에서 선반 바닥이 안보여"). Shrink the good a touch on phones so each shelf floor
    // surface stays clearly visible. Wide/desktop viewports keep the tuned fill height.
    if (typeof window !== 'undefined' && window.innerWidth < 500){ goodHpct = Math.min(goodHpct, 0.80); }
    var gapFrac  = (SHELF.goodGap != null) ? SHELF.goodGap : GOOD_GAP_FRAC;
    // per-slot WIDTH BUDGET: adjacent slot centers are W/3 apart, so a centered good of
    // width <= W/3 - gap can never reach its neighbor. Clamp gap so the budget stays > 0.
    var slotWidthBudget = Math.max(W * 0.10, W / 3 - gapFrac * W);
    var hBudget = goodHpct * interiorH;               // height budget (leaves a ceiling strip)
    fitState.interiorH = interiorH;
    fitState.slotBudgetPx = slotWidthBudget;
    fitState.heightPx = {};
    for (var type in GOOD_AR){
      var ar = GOOD_AR[type] || 0.42;                 // width / height (real aspect, preserved)
      // height-bound candidate: fill the height, width follows from AR.
      var hpx = hBudget;
      var wpx = hpx * ar;
      // if that width overflows the slot, this good is WIDTH-bound -> shrink height so the
      // width drops to the slot budget (aspect preserved -> shorter box).
      if (wpx > slotWidthBudget){ hpx = slotWidthBudget / ar; }
      fitState.heightPx[type] = hpx;                  // <= hBudget always; width = hpx*ar <= budget
    }
    // re-apply sizing to any goods already in the DOM (resize path)
    var goods = gridEl.querySelectorAll('.good');
    for (var i=0;i<goods.length;i++){ applyGoodSize(goods[i]); }
  }
  // apply the cached per-type box size + FLOOR DEPTH (translateZ) to ONE good element.
  // FRONT goods sit at FRONT_T (small -z); PEEK/back goods at BACK_T (bigger -z = deeper).
  // The width is ALWAYS height*AR <= the slot budget (set in fitGoods), so a good NEVER
  // exceeds its slot width -> no horizontal overlap with neighbors (front OR back row).
  function applyGoodSize(g){
    var type = g.dataset.type;
    if (!type || !fitState.heightPx[type]) return;
    var isPeek = g.classList.contains('peek');
    var h = fitState.heightPx[type] * (isPeek ? PEEK_H_FRAC : 1);
    g.style.setProperty('--good-ar', String(GOOD_AR[type] || 0.42));
    g.style.setProperty('--good-h', h.toFixed(2) + 'px');
    // floor depth: t -> translateZ(-D*t). Front row near the opening, back row deeper.
    var t = isPeek ? BACK_T : FRONT_T;
    var gz = -(nicheGeom.D || 70) * t;
    g.style.setProperty('--gz', gz.toFixed(2) + 'px');
  }

  // build ONE cubby's niche DOM (factored so attic toppers reuse the exact same niche box).
  function makeCubbyEl(cb){
    var el = document.createElement('div');
    el.className = 'cubby';
    el.dataset.idx = cb ? S.cubbies.indexOf(cb) : -1;
    // V12 NICHE: an INNER preserve-3d layer (.niche-clip) holds the folded box —
    // BACK WALL + 4 folded WOOD faces (.c-wall t/b/l/r = ceiling/floor/left/right) +
    // the back-row stage + the interactive front floor (slots). The FRONT RIM sits
    // outside the clip (front-edge plank). All face sizes/transforms set in buildNiches().
    el.innerHTML =
      '<div class="niche-clip">' +
        '<div class="c-back"></div>' +
        '<div class="c-wall t"></div><div class="c-wall b"></div>' +
        '<div class="c-wall l"></div><div class="c-wall r"></div>' +
        '<div class="c-back-layer"></div>' +
        '<div class="c-floor"></div>' +
      '</div>' +
      '<div class="c-rim"></div>';
    if (cb){
      cb.el = el; cb.floor = el.querySelector('.c-floor'); cb.backEl = el.querySelector('.c-back-layer');
      // HIDE FACES — add a per-face class so CSS sets display:none on the chosen wood face(s).
      // The cubby stays in S.cubbies and .c-floor (goods/slots) is untouched, so gameplay is intact.
      // 'floor' also drops the .c-back floor BAND (handled via .hide-floor on .c-back in CSS).
      if (cb.hideFaces && cb.hideFaces.length){
        cb.hideFaces.forEach(function(f){
          if (f === 'floor')   el.classList.add('hide-floor');
          else if (f === 'ceiling') el.classList.add('hide-ceiling');
          else if (f === 'left')    el.classList.add('hide-left');
          else if (f === 'right')   el.classList.add('hide-right');
          else if (f === 'back')    el.classList.add('hide-back');
        });
      }
    }
    return el;
  }
  // V29 — CONSTANT CELL HEIGHT regardless of ROW count (user: 층수는 위·아래로 세로 확장, 칸 높이는
  // 3/4/5층 모두 동일). The OLD model fixed the shelf BOX (aspect-ratio) and squished cells into more
  // rows. NEW: size cells so the TALLEST board (MAX_ROWS) fits the available area, then set the shelf
  // HEIGHT = totalRows × cellH — fewer rows ⇒ SHORTER shelf (centered by #board-wrap), more rows ⇒
  // TALLER. Width FILLS the area (cols adjust within it). Cell height is independent of THIS stage's
  // rows (it depends only on cols + viewport), so 3/4/5-row boards share the same cell height. Called
  // by buildBoard AND on resize so it stays correct across orientation changes.
  function sizeShelf(){
    var sh = document.getElementById('shelf'); var cfg = S.cfg; if (!sh || !cfg) return;
    var ca = SHELF.cubbyAspect || 0.86;
    if (cfg.tutorial){   // 1-row tutorial keeps its special landscape scale (reads like a 4×3 slice)
      sh.style.width = ''; sh.style.height = '';
      sh.style.aspectRatio = ((4 * cfg.cols) / (3 * ca * cfg.rows)).toFixed(3) + ' / 1';
      return;
    }
    var totalRows = (cfg.rows || 1) + (cfg.atticRows || 0);
    var MAX_ROWS = 5;                    // the game's tallest board; cells sized so 5 rows always fit
    var REF_COLS = 3;                    // GLOBAL cell HEIGHT is anchored to a 3-col board (the early look)
    var cellAR = 4 / (3 * ca);           // a 3-col cell's W:H (≈1.55) — the tuned landscape look
    var bw = document.getElementById('board-wrap');
    var availW = Math.max(80, (bw && bw.clientWidth)  ? bw.clientWidth  - 6  : Math.min(window.innerWidth * 0.96, 540));
    var availH = Math.max(80, (bw && bw.clientHeight) ? bw.clientHeight - 18 : window.innerHeight * 0.60);
    // SHELF WIDTH fills the area (cols adjust within it); capped at 540 AND so a MAX_ROWS×REF_COLS board
    // fits the height. ALL cells share ONE height = (shelfW/REF_COLS)/cellAR — independent of THIS stage's
    // cols AND rows, so 3/4/5-row (and 3/4-col) boards keep the SAME cell height; only the WIDTH per col
    // and the TOTAL height (= rows × cellH) change.
    var cols = cfg.cols || 1;
    var shelfW = Math.min(availW, 540, availH * REF_COLS * cellAR / MAX_ROWS);
    var cellH = (shelfW / REF_COLS) / cellAR;        // GLOBAL constant cell height
    // GLOBAL constant cell WIDTH too: a cell is NEVER wider than the 3-col reference width, so a 2-col
    // board (2x3) gets the SAME cell width as a 3-col board (3x3) — just a narrower, CENTERED shelf
    // (user: 2x3 칸 가로폭 = 3x3 칸 가로폭). cols>=REF_COLS keep shelfW/cols (4-col stays as before).
    var cellW = shelfW / Math.max(cols, REF_COLS);
    sh.style.aspectRatio = 'auto';
    sh.style.width  = Math.round(cellW * cols) + 'px';
    sh.style.height = Math.round(totalRows * cellH) + 'px';
  }
  function buildBoard(){
    var cfg = S.cfg;
    S.cap = cfg.cellCap || 3;
    // ATTIC: optional floorless 1-/2-cell toppers stacked ABOVE the main grid (user: 한칸/두칸짜리
    // 바닥빼고 천장 위에 올리기). They occupy `atticRows` extra rows at the TOP; main grid shifts down.
    var atticRows = cfg.atticRows || 0;
    var totalRows = cfg.rows + atticRows;
    gridEl.style.gridTemplateColumns = 'repeat(' + cfg.cols + ', 1fr)';
    gridEl.style.gridTemplateRows = 'repeat(' + totalRows + ', 1fr)';
    // V29 — size the shelf so CELL HEIGHT is CONSTANT regardless of row count (sizeShelf below).
    sizeShelf();
    gridEl.innerHTML = '';
    var byRC = {};
    S.cubbies.forEach(function(cb){ if (!cb.attic) byRC[cb.r+'_'+cb.c] = cb; });
    // MAIN grid cells (rows x cols), placed BELOW the attic band via explicit grid-row.
    for (var r=0; r<cfg.rows; r++){
      for (var c=0; c<cfg.cols; c++){
        var el = makeCubbyEl(byRC[r+'_'+c]);
        el.style.gridRow = (atticRows + r + 1); el.style.gridColumn = (c + 1);
        gridEl.appendChild(el);
      }
    }
    // ATTIC toppers (cubbies flagged attic, at attic-row `aRow` + column c) + VOID masks for the
    // empty attic cells (wallpaper-colored so only the toppers read as pieces sitting on top).
    if (atticRows > 0){
      var occ = {};
      S.cubbies.forEach(function(cb){ if (cb.attic) occ[(cb.aRow!=null?cb.aRow:atticRows-1) + '_' + cb.c] = true; });
      // VOID masks FIRST (DOM order) so the toppers, appended after, paint OVER the mask edges.
      for (var ar2=0; ar2<atticRows; ar2++){

    // LOCK overlays live at GRID level (absolute, NOT clipped by the cubby) so chains can
    // hook OVER the wood frame. One per cubby; positionLocks() places it over its cubby.
    S.cubbies.forEach(function(cb){
      if (!cb.el) return;
      var lk = document.createElement('div'); lk.className = 'c-lock';
      lk.innerHTML =
        '<div class="c-lock-dim"></div><div class="c-lock-crack"></div>' +
        '<div class="c-chain c1"></div><div class="c-chain c2"></div>' +
        '<div class="c-gapcover"></div>' +
        '<div class="c-lock-pad"></div>' +
        '<div class="c-lock-badge"><span class="c-lock-num"></span></div>';

    fitGoods();           // V12 — size goods BIG (fill cubby) + floor depth (front/back)
    positionLocks();      // place each lock overlay exactly over its cubby (chains overflow)
    renderAllCubbies();
  }
  // Position each grid-level lock overlay exactly over its cubby box (chains overflow onto
  // the frame). Re-run on resize. Uses offset* (cubby's box within the positioned #grid).
  function positionLocks(){
    S.cubbies.forEach(function(cb){
      if (!cb.lockEl || !cb.el) return;
      var le = cb.lockEl, el = cb.el;
      le.style.left = el.offsetLeft + 'px';
      le.style.top = el.offsetTop + 'px';

  // ---- LAYER ACCESSORS (single source of truth for the depth model) ----
  function frontLayer(cb){ return (cb.layers && cb.layers.length) ? cb.layers[0] : null; }
  function backLayer(cb){ return (cb.layers && cb.layers.length > 1) ? cb.layers[1] : null; }

  // Render one cubby. V4 POSITIONAL SLOTS: each of the 3 fixed slot columns
  // (left/center/right) is a transparent hit-box. The FRONT layer renders a good
  // INSIDE its slot at the matching slot index (null slot = empty, no good). The
  // back layer (if present) renders peeking goods in the SAME 3 slot columns,
  // deeper/dimmer/higher and NON-interactive.
  // The slot cell owns the hit region (constrained to its column) even though the
  // sprite art overflows upward -> grabbing always hits the good in THAT column.
  function makeGood(type, slot, idx, layer, peek){
    var g = document.createElement('div');
    g.className = peek ? 'good peek' : 'good';
    g.style.backgroundImage = 'url("' + tileURL(type) + '")';
    g.dataset.type = type;
    g.style.setProperty('--gs', GOOD_SCALE[type] || 1);
    g.dataset.cubby = idx;
    g.dataset.slot = slot;
    g.dataset.layer = String(layer);
    applyGoodSize(g);          // V8 — BIG+SNUG per-type box (height-driven, content-aspect hugged)
    return g;
  }
  function renderCubby(cb, opts){
    opts = opts || {};
    var idx = S.cubbies.indexOf(cb);
    var front = frontLayer(cb) || [null,null,null];
    var back  = backLayer(cb);

    // FRONT layer — 3 fixed slot cells; a good sits in a slot iff that slot holds a type.
    if (cb.floor){
      cb.floor.innerHTML = '';
      for (var i=0; i<SLOTS; i++){
        var slotEl = document.createElement('div');
        slotEl.className = 'slot s' + i;
        slotEl.dataset.slot = i;
        if (front[i]){
          var g = makeGood(front[i], i, idx, 0, false);
          // V4 GRAB RULE: every FRONT-layer good is grabbable.
          // (locked cubbies (lock>0) mark all front goods blocked.)
          if (cb.lock > 0) g.classList.add('blocked');
          if (opts.reveal){
            g.classList.add('revealing');
            (function(gg){ gg.addEventListener('animationend', function(){ gg.classList.remove('revealing'); }, { once:true }); })(g);
          }
          slotEl.appendChild(g);
        }
        cb.floor.appendChild(slotEl);
      }
    }
    // BACK layer — peeking goods in the SAME 3 slot columns (non-interactive).
    if (cb.backEl){
      cb.backEl.innerHTML = '';
      if (back){
        for (var j=0; j<SLOTS; j++){
          var bslot = document.createElement('div');
          bslot.className = 'slot s' + j;
          bslot.dataset.slot = j;
          if (back[j]){
            bslot.appendChild(makeGood(back[j], j, idx, 1, true));
          }
          cb.backEl.appendChild(bslot);
        }
      }
    }
    renderLock(cb);
  }
  // ---- LOCK gimmick (자물쇠) ---------------------------------------------------
  // A cubby with lock:N is FROZEN — its front goods are 'blocked' (no grab), it rejects
  // drops, and it shows a padlock badge with the count N. EVERY clear anywhere counts
  // ALL locks down by 1; when a lock reaches 0 it BREAKS and the cubby becomes interactive.
  function renderLock(cb){
    if (!cb.lockEl) return;
    var n = cb.lock, le = cb.lockEl;
    var numEl = le.querySelector('.c-lock-num');
    var c1 = le.querySelector('.c-chain.c1'), c2 = le.querySelector('.c-chain.c2');
    if (n > 0){
      cb.el && cb.el.classList.add('locked');
      le.classList.add('on'); le.classList.remove('breaking');
      // DIM: solid for >=4, cracked(금간) for 1..3
      le.classList.toggle('dim-solid', n >= 4);
      le.classList.toggle('dim-crack', n <= 3);
      // CHAINS: 2 for >=3, 1 for ==2, 0 for ==1
      if (c1) c1.style.display = (n >= 2) ? '' : 'none';
      if (c2) c2.style.display = (n >= 3) ? '' : 'none';
      if (numEl) numEl.textContent = n;
    } else {
      cb.el && cb.el.classList.remove('locked');
      le.classList.remove('on','dim-solid','dim-crack');
    }
  }
  // Called on EVERY clear: count every lock down by 1; break (and re-enable) any that hit 0.
  function decrementLocks(){
    S.cubbies.forEach(function(c){
      if (c.lock > 0){
        c.lock -= 1;
        if (c.lock === 0){
          if (c.lockEl){
            var numEl = c.lockEl.querySelector('.c-lock-num');
            if (numEl) numEl.textContent = '';
            c.lockEl.classList.add('breaking');     // swap to broken-padlock art + pop
            SFX.play('lock');                       // soft muffled unlatch thunk
            c.el && c.el.classList.remove('locked');
            haptic('clear');
            (function(cc){ setTimeout(function(){
              if (cc.lockEl) cc.lockEl.classList.remove('on','breaking','dim-solid','dim-crack');
              renderCubby(cc);                      // re-render so goods become grabbable
            }, 520); })(c);
          } else { renderCubby(c); }
        } else {
          renderLock(c);
        }
      }
    });
  }
  function renderAllCubbies(){ S.cubbies.forEach(function(cb){ renderCubby(cb); }); }

  // =============================================================
  // RULES — V4 POSITIONAL SLOTS
  // A layer is a fixed-length-3 array [s0,s1,s2]; each slot is a type or null.
  // =============================================================
  // slot helpers -------------------------------------------------
  function filledCount(layer){ var n=0; for(var i=0;i<SLOTS;i++) if(layer[i]) n++; return n; }
  function isFull(layer){ return filledCount(layer)===SLOTS; }
  function isAllEmpty(layer){ return filledCount(layer)===0; }
  function firstFilledSlot(layer){ for(var i=0;i<SLOTS;i++) if(layer[i]) return i; return -1; }
  // all 3 slots hold the SAME type (no null) -> clear condition
  function allSameSlots(layer){
    if (!isFull(layer)) return false;
    for (var i=1;i<SLOTS;i++) if (layer[i]!==layer[0]) return false;
    return true;
  }
  // nearest EMPTY slot to a preferred index (tie -> closer to preferred, then left)
  function nearestEmptySlot(layer, prefer){
    if (prefer>=0 && prefer<SLOTS && !layer[prefer]) return prefer;
    var best=-1, bestD=99;
    for (var i=0;i<SLOTS;i++){
      if (layer[i]) continue;
      var d = (prefer>=0) ? Math.abs(i-prefer) : i;
      if (d<bestD){ bestD=d; best=i; }
    }
    return best;
  }
  // same as nearestEmptySlot but treats slot `except` as NOT available (used for a
  // same-cubby relocate: the good still occupies its source slot, so the source slot is
  // not a valid target even though its data cell is about to be vacated).
  function nearestEmptySlotExcept(layer, prefer, except){
    if (prefer>=0 && prefer<SLOTS && prefer!==except && !layer[prefer]) return prefer;
    var best=-1, bestD=99;
    for (var i=0;i<SLOTS;i++){
      if (i===except || layer[i]) continue;
      var d = (prefer>=0) ? Math.abs(i-prefer) : i;
      if (d<bestD){ bestD=d; best=i; }
    }
    return best;
  }

  // V4 GRAB RULE — a good is grabbable iff it is a FRONT-layer good (not a peeking
  // back good) living in the floor, and the cubby isn't locked.
  function isGrabbable(cb, goodEl){
    if (!cb || !goodEl) return false;
    if (cb.lock > 0) return false;                      // LOCK gimmick: frozen cubby
    if (goodEl.dataset.layer !== '0') return false;     // only FRONT-layer goods
    return !!(cb.floor && cb.floor.contains(goodEl) && !goodEl.classList.contains('peek'));
  }
  // V4 DROP RULE — a good drops into the target cubby's FRONT layer if it has at
  // least one EMPTY slot, regardless of type (free-sort). A full front rejects.
  function canDrop(fromCb, toCb, type){
    if (fromCb === toCb) return false;
    if (toCb.lock > 0) return false;                    // LOCK gimmick: frozen cubby
    var tf = frontLayer(toCb);
    if (!tf) return false;                              // no front layer to receive
    return !isFull(tf);                                 // free iff any null slot
  }

  // SLOT FROM X — given a target cubby element and a pointer X, return the slot
  // column (0/1/2) nearest the pointer within that cubby. Used so dropping on the
  // LEFT lands in slot 0, RIGHT in slot 2 (Fix #1).
  function slotFromX(cubbyEl, clientX){
    if (!cubbyEl) return -1;
    var r = cubbyEl.getBoundingClientRect();
    if (r.width<=0) return 1;
    var rel = (clientX - r.left) / r.width;             // 0..1 across the cubby
    if (rel < 1/3) return 0;
    if (rel < 2/3) return 1;
    return 2;
  }

  // REVEAL — if a cubby's FRONT layer is ALL-EMPTY (all 3 slots null) AND a back
  // layer exists, drop the empty front so the next layer SLIDES FORWARD to become
  // the new front (with a reveal animation). If no back layer, the all-empty front
  // stays as a free workspace. Returns true if a reveal actually happened.
  function maybeReveal(cb){
    var front = frontLayer(cb);
    if (front && isAllEmpty(front) && cb.layers.length > 1){
      cb.layers.shift();                                // drop empty front; next becomes front
      renderCubby(cb, { reveal:true });                 // animate the new front sliding forward
      return true;
    }
    return false;
  }

  // perform a move (data + render) ; returns true if a CLEAR happened.
  // fromSlot (optional) = which source slot to take (default: first filled).
  // toSlot   (optional) = preferred target slot; falls to nearest empty if taken.
  function doMove(fromIdx, toIdx, fromSlot, toSlot){
    var fromCb = S.cubbies[fromIdx], toCb = S.cubbies[toIdx];
    if (!fromCb || !toCb) return false;
    if (!S._solving && (fromCb._holding || toCb._holding)) return false;   // mid-clear hold: ignore LIVE moves to/from it
    var ff = frontLayer(fromCb);
    if (!ff) return false;
    var sFrom = (fromSlot===undefined || fromSlot===null || !ff[fromSlot]) ? firstFilledSlot(ff) : fromSlot;
    if (sFrom < 0) return false;                        // nothing to move
    var type = ff[sFrom];

    // SAME-CUBBY drop = CANCEL the action (user): dropping the good back onto its OWN cubby
    // does NOT relocate it — it returns to its ORIGINAL slot (endDrag re-renders the source,
    // restoring the hidden good in place). No data change, no combo change.
    if (fromCb === toCb) return false;

    if (!canDrop(fromCb, toCb, type)) return false;

    var tf = frontLayer(toCb);
    // place into the preferred slot if empty, else nearest empty slot (Fix #1)
    var prefer = (toSlot===undefined || toSlot===null) ? -1 : toSlot;
    var sTo = nearestEmptySlot(tf, prefer);
    if (sTo < 0) return false;                          // full (shouldn't reach, canDrop guards)

    ff[sFrom] = null;                                   // vacate source slot
    tf[sTo] = type;                                     // occupy target slot
    renderCubby(toCb);

    // squash-bounce on the landed good (the one we just placed in slot sTo)
    if (toCb.floor){
      var lg = toCb.floor.querySelector('.slot.s'+sTo+' .good');
      if (lg){ lg.classList.add('land');
        lg.addEventListener('animationend', function(){ lg.classList.remove('land'); }, { once:true }); }
    }
    haptic('place');

    // CLEAR: front layer's 3 slots all hold the SAME type. (clearCubby nulls the DATA synchronously
    // for solver/win consistency, but HOLDS the goods visible 0.2s before the pop — see clearCubby.)
    if (allSameSlots(tf)){
      clearCubby(toCb);                                 // clears + reveals toCb's back layer (if any)
      renderCubby(fromCb); maybeReveal(fromCb);
      return true;
    }
    // no clear: re-render source; if its front went all-empty, reveal next layer
    renderCubby(fromCb);
    maybeReveal(fromCb);
    return false;        // a non-clearing move does NOT reset the combo (it lives the 20s window)
  }

  // =============================================================
  // CLEAR + EFFECTS (star fly, praise, combo, pop)
  // =============================================================
  function clearCubby(cb){
    SFX.play('clear');                                  // the satisfying soft ASMR "poof" (fires per cell clear)
    var el = cb.el;
    var rect = el ? el.getBoundingClientRect() : {left:0,top:0,width:0,height:0};
    var cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;

    // combo bump (consecutive-clear streak; 0-based -> first clear = 1)
    bumpCombo();
    var combo = S.combo;
    var base = (S.cfg.scoring && S.cfg.scoring.starsPerSort) || 1;
    S.stars += base * Math.max(1, combo);              // internal score (no UI counter)

    // DATA is updated SYNCHRONOUSLY (single source of truth): null the 3 front slots, then reveal a
    // back layer + decrement locks NOW. This keeps totalGoods()/win-check/solver/autoSolve consistent
    // immediately — only the VISUAL pop is deferred (the 0.2s hold below).
    var f = frontLayer(cb); if (f){ for (var si=0; si<SLOTS; si++) f[si] = null; }  // empty FRONT slots (data)
    var willReveal = (cb.layers.length > 1);
    if (willReveal) cb.layers.shift();                  // back layer -> front (data, now)
    decrementLocks();                                    // LOCK: every clear counts ALL locks down by 1

    // HOLD the completed triple VISIBLE for 0.2s, THEN fire the FX + pop it out (user: 정리 완료 후
    // 0.2초 머문 뒤 사라짐). The cubby is frozen (cb._holding) during the window so its still-shown
    // goods can't be grabbed while the data already cleared.
    cb._holding = true; if (el) el.classList.add('cb-hold');
    var heldGoods = cb.floor ? cb.floor.querySelectorAll('.good') : [];
    setTimeout(function(){
      // COMBO FEEDBACK — flame -> top pill, sparkle, + PRAISE TEXT (GOOD!/GREAT!/… by combo).
      flyFlameToCombo(cx, cy, combo);             // # of flames scales with combo (user: 콤보수만큼 차례로 빨려듦)
      sparkleRing(cx, cy);
      praise(cx, cy - 6, combo);
      if (el){ el.classList.add('clearing'); el.addEventListener('animationend', function(){ el.classList.remove('clearing'); }, { once:true }); }
      haptic('clear');
      // BOUNCE + POP (뿅): the 3 goods bounce up together then pop out (CSS goodPop) + a soft poof.
      heldGoods.forEach(function(g){
        g.classList.add('popping');
        var gr = g.getBoundingClientRect();
        var px = gr.left + gr.width/2, py = gr.top + gr.height*0.46;
        setTimeout(function(){ popPuff(px, py); }, 175);
      });
      setTimeout(function(){
        cb._holding = false; if (el) el.classList.remove('cb-hold');
        renderCubby(cb, willReveal ? { reveal:true } : {});   // back layer slides up if revealed
        checkWin();
      }, 340);
    }, 200);
  }

  // combo logic ----------------------------------------------
  // combo = consecutive clears. Increments on each clear, resets to 0 when the
  // player makes a move that does NOT clear (see doMove) or on the combo timeout.
  // maxCombo tracks the highest this level (shown on the result in Phase 2b).
  function bumpCombo(){
    S.combo += 1;
    if (S.combo > S.maxCombo) S.maxCombo = S.combo;
    if (S.combo >= 2) SFX.play('combo');                // soft ascending chime only on a real streak (>=2)
    updateComboPill(true);
    if (S.comboTimer) clearTimeout(S.comboTimer);
    var ms = (S.cfg.combo && S.cfg.combo.resetAfterMs) || 20000;   // combo retention = 20s
    startComboGauge(ms);                                // green fill depletes over `ms`
    S.comboTimer = setTimeout(resetCombo, ms);
  }
  function resetCombo(){
    if (S.combo === 0) return;
    S.combo = 0;
    if (S.comboTimer){ clearTimeout(S.comboTimer); S.comboTimer = null; }
    updateComboPill(false);
  }
  // restart the combo gauge: snap fill to 100% then linearly drain to 0 over `ms`.
  function startComboGauge(ms){
    if (!comboFillEl) return;
    comboFillEl.style.transition = 'none';
    comboFillEl.style.width = '100%';
    void comboFillEl.offsetWidth;                       // force reflow so the next transition runs
    comboFillEl.style.transition = 'width ' + ms + 'ms linear';
    comboFillEl.style.width = '0%';
  }
  // the COMBO gauge shows the CURRENT combo ("COMBO xN") and is visible only during a streak.
  function updateComboPill(bump){
    if (comboNumEl) comboNumEl.textContent = S.combo;
    comboEl.classList.toggle('show', S.combo > 0);
    if (S.combo === 0 && comboFillEl){ comboFillEl.style.transition='none'; comboFillEl.style.width='0%'; }
    if (bump){ [comboEl, comboCountEl].forEach(function(e){ if(e){ e.classList.remove('bump'); void e.offsetWidth; e.classList.add('bump'); } }); }
  }

  // star fly (fx_star.png sprite) ----------------------------
  // Flies from the cleared cubby toward the top-right combo pill, then updates
  // the internal score (no separate stars UI — combo pill replaces it).
  function flyStar(x, y, gain){
    var target = comboEl.getBoundingClientRect();
    var tx = target.left + target.width*0.5, ty = target.top + target.height/2;
    var st = document.createElement('div'); st.className='fly-star';
    st.style.left = x+'px'; st.style.top = y+'px';
    st.style.transform = 'translate(-50%,-50%) scale(1)';
    document.body.appendChild(st);
    // burst then fly
    requestAnimationFrame(function(){
      st.style.transition = 'left .55s cubic-bezier(.5,-0.3,.3,1), top .55s cubic-bezier(.5,-0.3,.3,1), transform .55s ease, opacity .55s ease';
      st.style.left = tx+'px'; st.style.top = ty+'px';
      st.style.transform = 'translate(-50%,-50%) scale(.5)';
    });
    setTimeout(function(){
      st.remove();
      S.stars += gain;                 // internal score (no UI counter)
      // combo pill pop on arrival
      comboEl.classList.remove('bump'); void comboEl.offsetWidth; comboEl.classList.add('bump');
    }, 560);
  }
  // COMBO flames — `count` 🔥 (= the current combo, capped) pop at the clear spot and fly, ONE AFTER
  // ANOTHER (staggered), INTO the top flame pill (#comboCount). The flame count grows with the combo
  // (user: "콤보수에 따라 불꽃이 점점 늘어나고, N개를 한번에 얻으면 N개가 차례대로 빨려들어가야 돼").
  var FLAME_CAP = 6;
  function flyFlameToCombo(x, y, count){
    count = Math.max(1, Math.min(count|0 || 1, FLAME_CAP));
    var dest = comboCountEl || comboEl;
    var t = dest ? dest.getBoundingClientRect() : null;
    var hidden = (!t || (t.width === 0 && t.height === 0));   // tutorial / hidden HUD -> pop in place
    for (var i=0;i<count;i++){
      (function(i){
        // tiny spread so stacked flames don't perfectly overlap at the source
        var ox = x + (i ? (((i*53)%23) - 11) : 0), oy = y + (i ? (((i*37)%15) - 7) : 0);
        setTimeout(function(){ spawnFlyFlame(ox, oy, hidden ? null : t); }, i*130);   // STAGGER -> sequential suck-in
      })(i);
    }
  }
  function spawnFlyFlame(x, y, t){
    // t = the dest pill rect, or null when the HUD is hidden (tutorial): just pop + fade in place.
    if (!t){
      var flp = document.createElement('div'); flp.className='fly-flame'; flp.textContent='🔥';
      flp.style.left=x+'px'; flp.style.top=y+'px'; flp.style.transform='translate(-50%,-50%) scale(0)';
      document.body.appendChild(flp);
      requestAnimationFrame(function(){
        flp.style.transition='transform .22s cubic-bezier(.34,1.75,.5,1), opacity .5s ease .25s';
        flp.style.transform='translate(-50%,-60%) scale(1.05)'; flp.style.opacity='0';
      });
      setTimeout(function(){ flp.remove(); }, 820);
      return;
    }
    var tx = t.left + t.width*0.5, ty = t.top + t.height/2;
    var fl = document.createElement('div'); fl.className='fly-flame'; fl.textContent='🔥';
    fl.style.left = x+'px'; fl.style.top = y+'px';
    fl.style.transform = 'translate(-50%,-50%) scale(0)';
    document.body.appendChild(fl);
    var HOLD = 150, RISE = 620;
    // 1) POP IN at the clear spot (overshoot), then HOLD a beat in place
    requestAnimationFrame(function(){
      fl.style.transition = 'transform .2s cubic-bezier(.34,1.75,.5,1)';
      fl.style.transform = 'translate(-50%,-50%) scale(1.12)';
    });
    // 2) after the hold, SWOOP up along a dynamic ARC into the top flame pill (rAF):
    //    bow the path up+sideways + add a rotation wobble + horizontal sway + shrink/fade.
    setTimeout(function(){
      fl.style.transition = 'none';
      var side = (tx >= x ? 1 : -1);
      var cx = (x + tx)/2 + side*46;          // control point: bow SIDEWAYS
      var cy = Math.min(y, ty) - 72;          // ... and UP above both ends (arc)
      var t0 = performance.now();
      function step(now){
        var p = Math.min(1, (now - t0)/RISE);
        var e = p<0.5 ? 2*p*p : 1 - Math.pow(-2*p+2,2)/2;   // easeInOutQuad
        var u = 1 - e;

      setTimeout(function(){ if (!S.over && totalGoods() > 0) maybeDeadlock(); }, 280);
    }
    // GUIDED tutorial: after the move settles, re-point the hand at the NEXT required move (or drop the
    // gate when the board is solved). On a cancelled/failed drop, re-show the hand quickly at the same move.
    if (tutGuide) setTimeout(refreshGuidedTutorial, done ? 480 : 90);
  }

  // pointer handlers
  function onDown(ev){
    if (S.paused || S.over) return;
    var p = pt(ev);
    if (tutGuide){                                     // GUIDED tutorial: ONLY the highlighted good is grabbable
      var gh = hitAt(p.x, p.y);
      if (!gh || gh.idx !== tutGuide.srcIdx || !gh.good || gh.good.dataset.type !== tutGuide.srcType){
        ev.preventDefault(); return;                   // wrong good -> blocked; the hand keeps pointing at the right move
      }
      clearTutorHand();                                // correct grab -> hide the hand during the drag (re-shown after)
    } else if (tutorHandEl){ clearTutorHand(); }       // (legacy demo) first interaction dismisses the coachmark
    // HIT-TEST by SLOT (Fix #2): map the pointer to the slot column under it and
    // grab THAT slot's FRONT good — never a visually-overlapping neighbor/back good.
    var hit = hitAt(p.x, p.y);
    if (hammerArmed){                                  // HAMMER targeting: tap a good to smash it
      if (hit && hit.good){ hammerSmash(hit.good); }
      else { hammerArmed = false; renderItems(); }     // tap empty space -> cancel
      ev.preventDefault();
      return;
    }
    if (hit && hit.good){
      startDrag(hit.good, p.x, p.y);
      ev.preventDefault();
    }
  }
  function onMove(ev){ if (drag){ var p=pt(ev); moveGhost(p.x,p.y); ev.preventDefault(); } }
  function onUp(ev){ if (drag){ var p=pt(ev); endDrag(p.x,p.y); ev.preventDefault(); } }
  function pt(ev){
    if (ev.touches && ev.touches.length) return { x:ev.touches[0].clientX, y:ev.touches[0].clientY };
    if (ev.changedTouches && ev.changedTouches.length) return { x:ev.changedTouches[0].clientX, y:ev.changedTouches[0].clientY };
    return { x:ev.clientX, y:ev.clientY };
  }
  shelfEl.addEventListener('pointerdown', onDown, { passive:false });
  window.addEventListener('pointermove', onMove, { passive:false });
  window.addEventListener('pointerup', onUp, { passive:false });
  window.addEventListener('pointercancel', onUp, { passive:false });

  // =============================================================
  // TIMER + WIN/LOSE
  // =============================================================
  function fmt(sec){
    sec = Math.max(0, Math.ceil(sec));
    var m = Math.floor(sec/60), s = sec%60;
    return (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  }
  function tick(now){
    // The loop must ALWAYS reschedule — it has to survive win/lose (S.running=false) so the NEXT
    // level's timer ticks again. (Bug: returning here without rescheduling froze the timer on every
    // level after the first clear.) Only DECREMENT while actually running + not paused/over/frozen.
    if (S.running && !S.paused && !S.over){
      var dt = (now - S.lastTick)/1000;
      S.lastTick = now;
      if (now >= freezeUntil) S.timeLeft -= dt;        // TIME FREEZE: skip decrement while frozen
      if (S.timeLeft <= 0){ S.timeLeft = 0; updateTimer(); lose(); }
      else updateTimer();
    } else {
      S.lastTick = now;
    }
    requestAnimationFrame(tick);
  }
  function updateTimer(){
    if (timerTxtEl) timerTxtEl.textContent = fmt(S.timeLeft);
    // URGENT: remaining < 60s -> skull pill + red page background. Reverts when
    // time goes back >=60 (e.g. after a continue / time refill).
    var urgent = (S.timeLeft > 0 && S.timeLeft < 60) || (S.timeLeft === 0 && S.over);
    // when time hits exactly 0 mid-play keep urgent until reset; but a fresh level
    // (timeLeft full) clears it.
    if (S.timeLeft >= 60) urgent = false;
    setUrgent(urgent);
  }
  function setUrgent(on){
    if (on === S.urgent) return;
    S.urgent = on;
    if (on){ timerEl.classList.add('urgent'); document.body.classList.add('urgent'); }
    else   { timerEl.classList.remove('urgent'); document.body.classList.remove('urgent'); }
  }

  // =============================================================
  // PURE BOARD MODEL — for DEADLOCK detection + RESHUFFLE solvability.
  // A "state" = array of cubbies, each = array of LAYERS, each layer = [s0,s1,s2]
  // (null = empty slot). Mirrors the live doMove/maybeReveal/clear rules EXACTLY
  // (front-layer-only moves, full-same -> clear, reveal back layer when front empty).
  // Shared so the same rules drive the solver, the deadlock check, and reshuffle.
  // =============================================================
  var Model = (function(){
    function filled(l){ var n=0; for(var k=0;k<SLOTS;k++) if(l[k]) n++; return n; }
    function allEmpty(l){ return filled(l)===0; }
    function fullSame(l){ if(filled(l)!==SLOTS) return false; for(var k=1;k<SLOTS;k++) if(l[k]!==l[0]) return false; return true; }
    function firstFilled(l){ for(var k=0;k<SLOTS;k++) if(l[k]) return k; return -1; }
    function firstEmpty(l){ for(var k=0;k<SLOTS;k++) if(!l[k]) return k; return -1; }
    function front(st,i){ return st[i].length ? st[i][0] : null; }
    function reveal(st,i){ while(st[i].length>1 && allEmpty(st[i][0])) st[i].shift(); }
    function total(st){ var n=0; for(var i=0;i<st.length;i++) for(var j=0;j<st[i].length;j++) n+=filled(st[i][j]); return n; }
    // LOCK-aware: `locks` (optional parallel int array per cubby) freezes a cubby while >0.
    function decLocks(locks){
      if(!locks) return locks;
      var any=false; for(var i=0;i<locks.length;i++){ if(locks[i]>0){ any=true; break; } }
      if(!any) return locks;
      var nl=locks.slice(); for(var j=0;j<nl.length;j++) if(nl[j]>0) nl[j]-=1; return nl;
    }
    function move(st,f,t,locks){
      if(f===t) return null;
      if(locks && (locks[f]>0 || locks[t]>0)) return null;   // LOCK: frozen cubby — no source/target
      var ff=front(st,f), tf=front(st,t);
      if(!ff) return null;
      var sf=firstFilled(ff); if(sf<0) return null;
      if(!tf) return null;
      var se=firstEmpty(tf); if(se<0) return null;
      var ns = st.map(function(c){ return c.map(function(l){return l.slice();}); });
      var nff=ns[f][0], ntf=ns[t][0];
      var g=nff[sf]; nff[sf]=null; ntf[se]=g;
      var cleared=false;
      if(fullSame(ntf)){ for(var k=0;k<SLOTS;k++) ntf[k]=null; cleared=true; }
      reveal(ns,f); reveal(ns,t);
      return { st:ns, cleared:cleared, locks: cleared ? decLocks(locks) : locks };
    }
    function key(st,locks){ var s = st.map(function(c){ return c.map(function(l){return l.map(function(x){return x||'_';}).join(',');}).join('|'); }).join(';'); return locks ? s+'#'+locks.join(',') : s; }
    // NORMALIZE: a front layer that is ALREADY full-same is an immediate clear (the live
    // game never holds a stable full-same front — it clears on the move that completed it).
    // So before searching, auto-clear any full-same fronts + cascade reveals. This makes a
    // pre-grouped board (3-same per cubby) trivially solvable even when 100% packed -> the
    // reshuffle's grouped layout is recognized as solvable. Mutates a CLONE.
    // LOCK-aware: locked cubbies (locks[i]>0) NEVER auto-clear; each auto-clear counts
    // ALL locks down by 1 (mirrors the live decrementLocks). Returns {st, locks}.
    function normalize(st, locks){
      var ns = st.map(function(c){ return c.map(function(l){return l.slice();}); });
      var nl = locks ? locks.slice() : null;
      var changed = true;
      while(changed){
        changed = false;
        for(var i=0;i<ns.length;i++){
          if(nl && nl[i]>0) continue;                    // LOCK: frozen cubby never auto-clears
          var f = ns[i].length ? ns[i][0] : null;
          if(f && fullSame(f)){ for(var k=0;k<SLOTS;k++) f[k]=null; reveal(ns,i); changed = true;
            if(nl){ for(var j=0;j<nl.length;j++) if(nl[j]>0) nl[j]-=1; } }
        }
      }
      return { st:ns, locks:nl };
    }
    // candidate moves, ordered (completing > gathering-same > dump-to-empty > MIX).
    // `mix` ON: also emit "mix into a partial DIFFERENT-type cubby" (pri 3). The live drop
    // rule allows a good into ANY cubby with an empty front slot regardless of type, so the
    // DEADLOCK check (anyClearReachable) MUST set mix=true or it under-explores and falsely
    // cries NO-SPACE (e.g. parking a good in a workspace). FULL-SOLVE (solvable/reshuffle)
    // leaves mix OFF so the search stays bounded — a board solvable greedily is what we want
    // to ship; mixing only balloons the state space without changing the yes/no we rely on.
    function moves(st, locks, mix){
      var n=st.length, out=[];
      for(var f=0;f<n;f++){ if(locks && locks[f]>0) continue; var ff=front(st,f); if(!ff || firstFilled(ff)<0) continue;
        var tp=ff[firstFilled(ff)];
        for(var t=0;t<n;t++){ if(t===f) continue; if(locks && locks[t]>0) continue; var tf=front(st,t); if(!tf || firstEmpty(tf)<0) continue;
          var fc=filled(tf), same=true;
          for(var k=0;k<SLOTS;k++){ if(tf[k] && tf[k]!==tp){ same=false; break; } }
          var pri;
          if(fc===SLOTS-1 && same) pri=0;          // completes a triple (clears)
          else if(fc>0 && fc<SLOTS && same) pri=1;  // gathers onto the same type
          else if(fc===0) pri=2;                    // dump into a fully-empty cubby
          else if(mix) pri=3;                       // MIX into a partial different-type cubby (legal free-sort)
          else continue;                            // full-solve: greedy only (keep search bounded)
          out.push({f:f,t:t,pri:pri});
        }
      }
      out.sort(function(a,b){ return a.pri-b.pri; });
      return out;
    }
    // snapshot the LIVE board into a pure state
    function snapshot(){ return S.cubbies.map(function(cb){ return (cb.layers||[]).map(function(l){return l.slice();}); }); }
    // snapshot the LIVE lock counts (parallel to snapshot()); null when nothing is locked.
    function snapshotLocks(){ var any=false; var a=S.cubbies.map(function(cb){ var v=cb.lock|0; if(v>0) any=true; return v; }); return any ? a : null; }
    // ---- DEADLOCK: is ANY clear reachable from `st` within a bounded node budget? ----
    // We BFS/DFS and succeed the moment a move's `cleared` flag fires (total drops). If
    // the budget exhausts with NO clear found -> DEADLOCK. Memoizes visited states + caps
    // the budget so it NEVER hangs. (Boards ship solvable, so deadlock = bad player moves.)
    function anyClearReachable(st, budget, locks){
      budget = budget || 60000;
      var nr = normalize(st, locks);
      var start = nr.st, slocks = nr.locks;
      // if normalizing ALREADY cleared something (pre-grouped full-same fronts), a clear is
      // trivially "reachable" (the very next settle clears it).
      if(total(start) < total(st)) return { reachable:true, exhausted:false };
      var seen = {};
      var stack = [{ st:start, locks:slocks }];
      seen[key(start, slocks)] = 1;
      while(stack.length){
        if(budget-- <= 0) return { reachable:false, exhausted:true };
        var cur = stack.pop();
        var ms = moves(cur.st, cur.locks, true);   // mix=true: all legal moves (sound deadlock check)
        for(var i=0;i<ms.length;i++){
          var r = move(cur.st, ms[i].f, ms[i].t, cur.locks);
          if(!r) continue;
          if(r.cleared) return { reachable:true, exhausted:false };   // a clear IS reachable
          var k = key(r.st, r.locks);
          if(!seen[k]){ seen[k]=1; stack.push({ st:r.st, locks:r.locks }); }
        }
      }
      return { reachable:false, exhausted:false };   // searched everything, no clear -> DEADLOCK
    }
    // ---- is the FULL board solvable (clearable to empty)? for reshuffle validation ----
    function solvable(st, maxSteps, budget, locks){
      maxSteps = maxSteps || 800; budget = budget || 300000;
      var seen = {}; var found = false;
      function dfs(s, slocks, depth){
        if(budget-- <= 0) return false;
        var nr = normalize(s, slocks); var ns=nr.st, nl=nr.locks;   // auto-clear full-same fronts first
        if(total(ns)===0){ found = true; return true; }
        if(depth>maxSteps) return false;
        var k = key(ns, nl); if(seen[k]) return false; seen[k]=1;
        var ms = moves(ns, nl);
        for(var i=0;i<ms.length;i++){
          var r = move(ns, ms[i].f, ms[i].t, nl); if(!r) continue;
          if(dfs(r.st, r.locks, depth+1)) return true;
        }
        return false;
      }
      dfs(st, locks, 0);
      return found;
    }
    return { snapshot:snapshot, snapshotLocks:snapshotLocks, anyClearReachable:anyClearReachable, solvable:solvable, normalize:normalize, total:total, moves:moves, move:move, key:key, front:front, filled:filled };
  })();

  // DEADLOCK CHECK after a player move: if NO clear is reachable from the current
  // state, trigger the NO SPACE game-over. Bounded node budget -> never hangs.
  function isDeadlocked(){
    if (totalGoods() === 0) return false;        // already won, not a deadlock
    // CHEAP GATE (perf): the mixing-aware solver is costly when there are many empty
    // slots (huge branching) — but that's exactly the case with PLENTY of maneuver room,
    // i.e. NOT a deadlock. A true deadlock needs a near-full board. So skip the solver
    // whenever >=3 front slots are open; only run it when the board is genuinely TIGHT.
    // This removes the per-move 70ms+ hitch the deadlock check used to cause.
    var empties = 0;
    for (var i=0;i<S.cubbies.length;i++){ var cb=S.cubbies[i]; if(cb.lock>0) continue;
      var fl=frontLayer(cb); if(!fl) continue;
      for (var s=0;s<SLOTS;s++) if(!fl[s]){ empties++; if(empties>=3) return false; }
    }
    var st = Model.snapshot();
    var r = Model.anyClearReachable(st, 20000, Model.snapshotLocks());
    // EXHAUSTED budget without proving reachability -> do NOT cry deadlock (no false
    // positive). Only a fully-searched "no clear reachable" is a real deadlock.
    return (!r.reachable && !r.exhausted);
  }
  function maybeDeadlock(){
    if (S.over || S.paused) return;
    if (isDeadlocked()){ loseNoSpace(); }
  }

  // RESHUFFLE (NO SPACE continue): re-randomize ALL remaining goods (front + every
  // hidden back layer) across the cubbies into a NEW, SOLVABLE arrangement, then apply
  // it to the live board and resume. Verified with the solver before applying.
  function reshuffleBoard(){
    // collect the multiset of all remaining good types
    var bag = [];
    S.cubbies.forEach(function(cb){
      (cb.layers||[]).forEach(function(l){ for (var i=0;i<l.length;i++) if (l[i]) bag.push(l[i]); });
    });
    if (bag.length === 0) return false;
    // capture the original cubby SHAPE: how many layers each cubby held (the slot capacity
    // we redistribute into). We refill the SAME goods into the SAME capacities, re-randomized.
    var shape = S.cubbies.map(function(cb){ return Math.max(1, (cb.layers||[]).length); });
    function shuffle(a){ for (var i=a.length-1;i>0;i--){ var j=(Math.random()*(i+1))|0; var t=a[i];a[i]=a[j];a[j]=t; } return a; }
    function emptyCubbies(){ return S.cubbies.map(function(cb,ci){
      var layers=[]; for(var li=0; li<shape[ci]; li++) layers.push([null,null,null]); return layers; }); }
    // all (cubby,layer,slot) positions
    function allPositions(cubbies){ var P=[]; cubbies.forEach(function(layers,ci){
      layers.forEach(function(l,li){ for(var s=0;s<SLOTS;s++) P.push([ci,li,s]); }); }); return P; }

    // STRATEGY A (GUARANTEED SOLVABLE) — GROUP each type into complete TRIPLES, each triple
    // placed into ONE layer (a full-same front auto-clears via the solver's normalize). The
    // bag from a solvable board has every type count = multiple of 3, so this always packs.
    // Triples are scattered across cubbies/layers (shuffled) so the result still looks mixed,
    // yet is provably solvable. Leftover (non-multiple-of-3 remainder, rare) is scattered.
    function buildGrouped(){
      var counts = {}; bag.forEach(function(t){ counts[t]=(counts[t]||0)+1; });
      var triples = [];               // each = [t,t,t]
      var leftovers = [];
      Object.keys(counts).forEach(function(t){
        var n = counts[t];
        while(n>=3){ triples.push([t,t,t]); n-=3; }
        while(n-->0) leftovers.push(t);
      });
      shuffle(triples);
      var cubbies = emptyCubbies();
      // list of (cubby,layer) LAYER slots to receive a triple, shuffled
      var layerSlots = [];
      cubbies.forEach(function(layers,ci){ layers.forEach(function(l,li){ layerSlots.push([ci,li]); }); });
      shuffle(layerSlots);
      var li2 = 0;
      triples.forEach(function(tr){
        if(li2 < layerSlots.length){ var p=layerSlots[li2++]; cubbies[p[0]][p[1]] = tr.slice(); }
      });
      // scatter any leftovers into remaining empty slots
      if(leftovers.length){
        var pos = allPositions(cubbies).filter(function(p){ return !cubbies[p[0]][p[1]][p[2]]; });
        shuffle(pos); var k=0;
        for(var i=0;i<leftovers.length && k<pos.length;i++){ var p=pos[k++]; cubbies[p[0]][p[1]][p[2]]=leftovers[i]; }
      }
      return cubbies;
    }
    // STRATEGY B (RANDOM scatter, reserve a workspace) — a more "shuffled" look; verified.
    function buildScatter(){
      var pool = shuffle(bag.slice()), pi=0;
      var cubbies = emptyCubbies();
      var positions = allPositions(cubbies);
      shuffle(positions);
      // reserve >= one full cubby (SLOTS) of free workspace so moves stay possible
      var reserve = SLOTS;
      var capacity = positions.length;
      var fillCount = Math.min(pool.length, Math.max(pool.length, capacity - reserve));
      // never lose goods: if reserve would drop goods, fill all (no reserve)
      fillCount = Math.min(pool.length, capacity);
      for(var p=0; p<positions.length && pi<pool.length; p++){
        var pos=positions[p]; cubbies[pos[0]][pos[1]][pos[2]] = pool[pi++];
      }
      return cubbies;
    }
    function normalizeLayers(cubbies){
      // drop empty FRONT layers so the first non-empty layer is the front (mirrors reveal()).
      return cubbies.map(function(layers){
        while (layers.length>1 && layers[0].every(function(x){return !x;}) &&
               layers.slice(1).some(function(l){ return l.some(function(x){return x;}); })){ layers.shift(); }
        return layers;
      });
    }
    // pick a SOLVABLE candidate. The SHUFFLE item must RANDOMIZE (재배치), NOT sort — so try the RANDOM
    // SCATTER first (a genuinely MIXED board). Only fall back to the GROUPED layout (which packs each
    // type's triples into single layers = looks "sorted/정렬", which the user does NOT want) when no
    // random scatter is solvable — e.g. a fully-packed NO-SPACE rescue board, where grouped is the
    // guaranteed-solvable safety net. (Mid-game shuffle keeps its workspace, so scatter is solvable.)
    var chosen = null;
    for (var attempt=0; attempt<40 && !chosen; attempt++){
      var cand = buildScatter();
      if (Model.solvable(cand, 800, 200000)) chosen = cand;
    }
    if (!chosen){
      var grouped = buildGrouped();                 // guaranteed solvable-by-construction (last resort)
      chosen = grouped;                              // (solvability re-checked implicitly by construction)
    }
    chosen = normalizeLayers(chosen);
    // apply to the live board (preserve r/c; replace layers).
    S.cubbies.forEach(function(cb, ci){ cb.layers = chosen[ci]; });
    buildBoard();          // re-render the whole board with the new arrangement
    return true;
  }

  // V4: count goods across ALL layers of all cubbies (front + every hidden back
  // layer). Layers are fixed-length-3 slot arrays, so count NON-NULL slots.
  function totalGoods(){
    var n=0;
    S.cubbies.forEach(function(cb){
      if (cb.layers) cb.layers.forEach(function(l){ for (var i=0;i<l.length;i++) if (l[i]) n++; });
    });
    return n;
  }
  function checkWin(){
    if (S.over) return;
    // WIN only when every layer of every cubby is empty.
    if (totalGoods() === 0){ win(); }
  }
  // ---- CLEAR (level clear = all goods removed) ----
  // Fire the GameReels GameEnd{success:true} (per contract) THEN run the all-sides
  // FIREWORKS show, THEN show the RESULT card (panel_result.png + MAX COMBO + NEXT).
  function win(){
    if (S.over) return;
    S.over = true; S.running = false;
    SFX.play('win');                                   // cozy win jingle
    tutGuide = null; clearTutorHand(); clearTutPoke(); // L1 solved -> drop the tutorial gate + hand + glow
    if (S.comboTimer) clearTimeout(S.comboTimer);
    // COIN REWARD on clear (the only earn source): base + combo bonus + small level scaling.
    // CHALLENGE economy (2026-06-30): tighter + skill(combo)-rewarded so coins must be managed.
    S._earned = 15 + (S.maxCombo||0)*4 + Math.floor((S.level||1)/8)*4;
    S.coins += S._earned; saveCoins();
    if (S._cheat) {}  // (cheat doesn't change rewards)
    if (shouldEmitGameEnd(S.level)){
      GR.post('GameEnd', { success:true, progressIndex:S.level, currentIndex:S.level });
    }
    var dur = launchFireworks();                 // ~1.6-2s all-around fireworks
    // show the result card partway through the show (so the celebration overlaps it)
    setTimeout(function(){ showResultCard(); }, Math.min(1400, Math.max(900, dur*0.7)));
  }
  // ---- GAME OVER: TIME UP (timer hit 0 with goods remaining) ----
  function lose(){ loseTimeUp(); }
  function loseTimeUp(){
    if (S.over) return;
    S.over = true; S.running = false;
    if (S.comboTimer) clearTimeout(S.comboTimer);
    if (shouldEmitGameEnd(S.level)){
      GR.post('GameEnd', { success:false, progressIndex:S.level, currentIndex:S.level });
    }
    showGameOverCard('timeup');
  }
  // ---- GAME OVER: NO SPACE (deadlock — no clear reachable) ----
  function loseNoSpace(){
    if (S.over) return;
    S.over = true; S.running = false;
    if (S.comboTimer) clearTimeout(S.comboTimer);
    if (shouldEmitGameEnd(S.level)){
      GR.post('GameEnd', { success:false, progressIndex:S.level, currentIndex:S.level });
    }
    showGameOverCard('nospace');
  }

  // =============================================================
  // RESULT / GAME-OVER CARDS (image-based — all text ENGLISH)
  // =============================================================
  var overlay = document.getElementById('overlay');
  var popupBox = document.getElementById('popupBox');

  // CLEAR — a DIM layer (no card): big praise banner + MAX COMBO + NEXT, with the
  // all-sides fireworks still going. Fills the screen so it doesn't read empty.
  function showResultCard(){
    // big praise on the result = the word for the MAX combo reached (>=3; default to the first tier).
    var praiseImg = 'praise_' + (praiseWord(Math.max(3, S.maxCombo || 0)) || 'cool');
    popupBox.innerHTML =
      '<div class="clear-show" id="resultCard">' +
        '<div class="cb-praise" style="background-image:url(\'../assets/ui/' + praiseImg + '.png\')"></div>' +
        '<div class="cb-maxcombo">' +
          '<div class="lbl">MAX COMBO</div>' +
          '<div class="val" id="maxComboVal">x' + S.maxCombo + '</div>' +
        '</div>' +
        '<div class="cb-coins"><span class="ci"></span>+' + (S._earned||0) + '</div>' +
        '<div class="ibtn cb-next" id="nextBtn"><span class="nextlbl">NEXT</span></div>' +
      '</div>';

  }

  // GameReels build: the game-over is a simple RESTART screen (NO continue, NO coins) — tap RESTART to
  // replay the current level. Only reached when REELS is on; restoring the full game brings back continue.
  function showReelsRestart(mode){

  // CONTINUE costs coins (no ads). If short on coins, nudge the button instead.
  function tryContinue(mode, cost){
    if (S.coins >= cost){ S.coins -= cost; saveCoins(); var cv=document.getElementById('goCoinVal'); if(cv) cv.textContent=S.coins; continueGame(mode); }
    else { var b=document.getElementById('goContinue'); if(b){ b.classList.remove('shake'); void b.offsetWidth; b.classList.add('shake'); } }

  // CONTINUE handler — resume play after a game-over.
  //  TIME UP  -> add +30 seconds and resume (clears urgent if >=60).
  //  NO SPACE -> reshuffle ALL items into a new SOLVABLE board and resume.
  function continueGame(mode){
    closePopup();
    if (mode === 'timeup'){
      S.timeLeft = Math.max(0, S.timeLeft) + 30;       // +30s
      S.over = false; S.running = true; S.paused = false;
      S.lastTick = performance.now();
      updateTimer();                                   // refreshes urgent (clears if >=60)
    } else {
      reshuffleBoard();                                // re-randomize into a solvable board
      S.over = false; S.running = true; S.paused = false;
      S.lastTick = performance.now();
      updateTimer();
    }
  }

  function closePopup(){
    overlay.classList.remove('on');
    document.body.classList.remove('dim');
    popupBox.innerHTML = '';
  }

  function nextLevel(){
    closePopup();
    if (stopLevel && S.level >= stopLevel){ return; } // segment end: stop
    S.level += 1;
    startLevelFn(S.level);
  }

  // =============================================================
  // LEVEL LIFECYCLE
  // =============================================================
  function startLevelFn(level){
    S.level = level;
    S.cfg = loadStage(level);
    // V3: build per-cubby LAYER stacks (normLayers handles both layers:[...] and
    // legacy flat items:[...]). layers[0]=FRONT (interactive), rest=hidden/peeking.
    S.cubbies = S.cfg.cubbies.map(function(cb){
      return { r:cb.r, c:cb.c, attic:!!cb.attic, aRow:(cb.aRow!=null?cb.aRow:null),
               // hideFaces: per-cubby list of wood faces to render display:none WITHOUT
               // un-registering the cubby (goods/slots/drag/drop/match all keep working).
               // faces: 'floor' (.c-wall.b + .c-back floor band), 'ceiling' (.c-wall.t),
               // 'left' (.c-wall.l), 'right' (.c-wall.r), 'back' (.c-back). NEVER hides
               // .c-floor (it holds the goods + slot hit-columns).
               hideFaces: (Array.isArray(cb.hideFaces) ? cb.hideFaces.slice() : null),
               layers: normLayers(cb), lock:(cb.lock|0), el:null, floor:null, backEl:null, lockEl:null };
    });
    S.cap = S.cfg.cellCap || 3;
    S.timeLeft = S.cfg.timeLimit || 120;
    S.stars = 0; S.combo = 0; S.maxCombo = 0; S.over = false; S.paused = false; S.running = true;
    if (S.comboTimer){ clearTimeout(S.comboTimer); S.comboTimer = null; }
    lvNumEl.textContent = level;
    updateComboPill(false);     // reset combo pill to "x0"
    setUrgent(false);           // clear any red-urgency from a prior level
    document.body.classList.toggle('tut-clean', !!S.cfg.tutorial);   // L1 tutorial: hide HUD/item bar
    closePopup();
    preloadTiles(stageGoodTypes(S.cfg));        // current stage tiles into cache before the board paints
    buildBoard();
    setTimeout(function(){ try { preloadTiles(stageGoodTypes(loadStage((S.level||1)+1))); } catch(e){} }, 350);  // warm the NEXT stage during play -> instant transition
    updateTimer();
    // ITEM bar: refresh per-level free uses, clear transient item state, render, onboard new unlocks.
    grantUnlockFreebies();   // challenge economy: 1 free per item at FIRST unlock only (no per-level refill)
    hammerArmed = false; freezeUntil = 0;
    document.body.classList.remove('frozen');
    renderItems();
    tutGuide = null; clearTutorHand(); clearTutPoke();  // clear any prior-level tutorial gate/hand/glow
    maybeOnboard();
    maybeGameTutorial();
  }

  // =============================================================

  function resumeGame(){

    pauseScreen.classList.remove('on');
