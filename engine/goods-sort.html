<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Goods Sort</title>
<!-- rounded, chunky game font (동글동글) applied to ALL in-game text -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     LAYOUT — mobile PORTRAIT, viewport-driven, no fixed design box.
     --safe-top : honored by HUD (notch/safe-area, env()). NOT zeroed in reels (header stays where the full game has it).
     ============================================================ */
  :root{
    --safe-top: env(safe-area-inset-top, 0px);
    --hud:#2c1c0e; --gold:#ffcf3f; --gold-d:#f1a91d;
    --green:#3fb24a; --green-d:#2e8a37; --red:#e8453c;
    /* ===========================================================
       V12 — UNIFIED 3D WOOD NICHE (ported from _niche_poc.html).
       Each cubby is now ONE real folded 3D wood box built with CSS-3D,
       receding into the screen by a fixed DEPTH (D):
         BACK WALL (cream, at z=-D)
         + WOOD FLOOR   (bottom, hinged front-bottom, rotateX 90°, lit)
         + WOOD CEILING (top, hinged front-top, rotateX -90°, dim)
         + WOOD SIDE WALLS (left+right, rotateY ∓90°, full height)
         + WOOD FRONT RIM (plank thickness along front-bottom edge)
       These are the SIDES OF ONE FOLDED BOX -> they meet at REAL shared
       3D edges => NO step (단차) where floor/ceiling join the side/back.
       The cabinet face stays UPRIGHT (no rotateX on the whole shelf);
       depth reveals purely via a per-niche `perspective` + a SHARED
       global eye (perspective-origin) so left niches show their RIGHT
       inner wall, right niches their LEFT — side walls + ceiling + floor
       all visible without leaning the shelf. Everything derives from the
       box depth D + cell W,H -> per-cell parametric (scales to any grid).
       --board-img used for FLOOR/CEILING/RIM ; --post-img for SIDE WALLS.
       =========================================================== */
    --board-img: url("../assets/shelf_board.png");
    --post-img:  url("../assets/post.png");
    /* V21 — UNIFIED WOOD COLOR: GRAYSCALE (luminance-only) grain maps. They carry ONLY the
       wood grain detail (no baked brown), so the wood's COLOR comes ENTIRELY from --grid-color
       (the gridColor picker). Each wood face = a SOLID --grid-color base × this near-white grain
       map (multiply) so every face is the SAME hue, differing only by a per-face brightness().
       The original colored boards stay as --board-img/--post-img for legacy/back-compat selectors. */
    --board-grain: url("../assets/shelf_board_gray.png");
    --post-grain:  url("../assets/post_gray.png");
    /* TOP-SURFACE fraction kept for legacy baseline math (slot bottom). */
    --board-top-frac: 0.60;
    /* NICHE box depth (px) into the screen — clear-but-subtle (not fisheye).
       Set per-render in JS from the live cell size, but a default lives here. */
    --niche-depth: 70px;
    --niche-persp: 560px;    /* per-niche perspective: gentle, real depth */
    --rim-h: 7px;            /* front-rim = THIN front FACE band BELOW the standing surface
                                (V14: reverted the over-tall 16px lip that walled-off / occluded
                                the goods' bases — now a thin band that sits BENEATH the goods). */
    /* a gentle WARM-LIGHTEN tint applied to wood faces (matches the POC look). */
    --wood-tint: brightness(1.07) saturate(1.06) sepia(.05);
    /* V20 — GRID TINT: a MULTIPLY overlay color recomputed in JS from SHELF.gridColor,
       NORMALIZED against the default wood tone so the DEFAULT gridColor (#caa06a) yields
       white (= no change, current look). Kept for legacy selectors (frame/grid backgrounds). */
    --grid-tint: #ffffff;
    /* V21 — GRID COLOR: the RAW gridColor (the picker value, NOT normalized). It is the SOLID
       base color every wood face multiplies its grayscale grain map over, so the WHOLE shelf is
       ONE uniform wood hue and moving the picker recolors all faces identically (frame rails/posts,
       floor planks, dividers, side walls, front rim, ceiling) — they differ ONLY in brightness. */
    --grid-color: #caa06a;
    /* CABINET frame thickness (the outer wood box the niches sit inside) +
       inter-niche gap (the wood lattice between cubbies). */
    --cab-pad: 12px;         /* outer cabinet wood border */
    --niche-gap: 9px;        /* wood gap between cubbies (the lattice) */
    /* CORNER RADIUS of the outer frame + niche/cubby wood. 0 = ANGULAR (sharp/squared),
       the default look. Driven by SHELF.cornerRadius (config single source of truth). */
    --corner-radius: 0px;
    /* legacy alias kept so prior --wall-depth asserts still resolve > V2 baseline.
       It now equals the niche box depth (the real recess depth). */
    --wall-depth: 70px;
    /* ===========================================================
       WALLPAPER — one continuous cream wall behind everything. FLAT
       color (no repeating texture -> no tile seams). The page/body bg,
       the #bg full-viewport layer, AND each niche's back wall all use
       this EXACT value so the whole thing reads as one seamless wall.
       =========================================================== */
    --wallpaper: #ecd3b3;   /* V23 — warmer/softer peach bg (was bright #f0e2c8) — calmer overall tone */
    /* ===========================================================
       V18 — DIRECTIONAL LIGHTING (top-left light -> bottom-right shadows).
       These are DEFAULTS for the static/offline render; applyShelfCssVars()
       recomputes them from SHELF.lightAngle / shadowStrength / backDim at runtime.
       --good-shadow-dx/dy : each good's drop-shadow offset (default bottom-right).
       --cubby-shade-* : the niche inner-shadow gradient poles (dark toward bottom-right).
       --back-dim : back-row (peek) goods brightness (in shadow).
       =========================================================== */
    --good-shadow-dx: 4.24px;
    --good-shadow-dy: 4.24px;
    --good-shadow-blur: 5px;
    --good-shadow-color: rgba(20,10,2,.45);
    --back-dim: 0.5;
    --cubby-shade-dark-x: 79.7%;
    --cubby-shade-dark-y: 79.7%;
    --cubby-shade-lit-x: 20.3%;
    --cubby-shade-lit-y: 20.3%;
    --cubby-shade-op: 0.248;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; height:100%; overflow:hidden;
    background:var(--wallpaper); font-family:"Baloo 2","Jua",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    touch-action:none; user-select:none; -webkit-user-select:none; }
  /* touch-action does NOT inherit → set it on the tap targets AND their descendants (the
     tap can land on the inner text/icon) so rapid taps never trigger iOS double-tap-ZOOM. */
  #game, #hud, #hudFrame, #timer, #lv, #comboCount, #boosters, .booster, #devnav, #grid, #overlay,
  #hud *, #boosters *, #devnav *, #overlay *{ touch-action:manipulation; }
  /* full-viewport CREAM WALL so any ratio is filled (L12) and it blends with the
     page/body bg into one seamless wall. FLAT color — no tiling texture. This is the
     SAME wall the cubby open-backs show through their openings (V6). */
  #bg{ position:fixed; inset:0; z-index:0;
    background-color:var(--wallpaper);
    transition:filter .3s ease; }
  body.dim #bg{ filter:brightness(.45) saturate(.8); }

  /* RED URGENCY OVERLAY — full-viewport red tint that pulses when the timer
     drops below 60s. Sits just above the wallpaper, below the game. Removed
     (display:none) again if time goes back >=60 (e.g. after a continue). */
  #urgentTint{ position:fixed; inset:0; z-index:2; pointer-events:none;
    background:radial-gradient(135% 110% at 50% 45%, rgba(255,70,50,.18) 0%, rgba(235,40,28,.42) 55%, rgba(190,20,14,.72) 100%);
    opacity:0; transition:opacity .35s ease; }
  /* DISABLED (user): the full-screen red tint made play feel too hard. Urgency is shown
     by the TIMER alone (red plate + skull). The tint element stays but never paints. */
  body.urgent #urgentTint{ opacity:0; }
  @keyframes urgentPulse{ 0%,100%{ opacity:.7; } 50%{ opacity:1; } }

  #game{ position:fixed; inset:0; z-index:1; display:flex; flex-direction:column;
    align-items:center; }
  /* TUTORIAL stage (level 1): the board renders with the EXACT same code/look as the normal game
     (a connected 1x3 cabinet — same wood frame). We ONLY hide the top HUD & bottom item bar
     (user: "상하단 UI를 표시하지말고 배경과 그리드만" + "기존 코드 방식으로 1x3"). board-wrap (flex:1)
     centers the cabinet on the bare background. */
  body.tut-clean #hud, body.tut-clean #boosters{ display:none !important; }

  /* ---------------- HUD (reference: a WOOD FRAME bar wrapping the row) ----------------
     [ Lv ]   ·   [ TIMER ]   ·   [ ⏸ ]   +  COMBO gauge overlapping the frame's bottom.
     ------------------------------------------------------------------------------------ */
  /* FULL-BLEED BROWN HEADER: the SAME brown as the old rounded bar, now filling the top edge-to-
     edge from y=0 (behind the safe area) so the empty top strip is filled with header-brown
     (user: 빈 공간을 헤더와 같은 색으로 채워). The bottom keeps the liked rounded-bar form (clean
     24px rounded corners, NOT a convex curve). HUD controls sit LOWER (header moved down). */
  #hud{ width:100%; max-width:none; padding:calc(var(--safe-top) + 24px) 16px 0; z-index:5;
    display:flex; flex-direction:column; align-items:center;
    background:linear-gradient(#a4683f,#9a5d36);
    border-radius:0 0 26px 26px;
    box-shadow:0 4px 9px rgba(0,0,0,.16); }
  /* the HUD control row — now just a layout grid ON the brown header (no own bar/bg) */
  #hudFrame{ position:relative; width:100%; max-width:480px;
    display:grid; grid-template-columns:1fr auto 1fr; align-items:center; column-gap:8px;
    padding:0; }
  .hud-left{ display:flex; align-items:center; justify-self:start; }
  .hud-right{ display:flex; align-items:center; justify-self:end; }
  .hud-center{ display:flex; align-items:center; justify-content:center; justify-self:center; }

  .img-pill{ position:relative; display:flex; align-items:center; justify-content:center;
    background-repeat:no-repeat; background-position:center; background-size:100% 100%;
    line-height:1; pointer-events:none; }
  .img-pill .txt{ position:relative; z-index:1; font-weight:900; color:#fff;
    -webkit-text-stroke:2px rgba(120,40,10,.85); paint-order:stroke fill;
    text-shadow:0 2px 0 rgba(0,0,0,.28); font-variant-numeric:tabular-nums; white-space:nowrap; }

  /* Lv — ENGRAVED into the frame (음각): a dark maroon plate pressed INTO the wood
     (inset shadow = carved; bottom-edge highlight = the lip catching light). Not a raised pill. */
  #lv{ width:78px; height:38px; background:linear-gradient(#6f3d2c,#5b3324);
    border-radius:12px;
    box-shadow: inset 0 3px 4px rgba(0,0,0,.55), inset 0 -2px 3px rgba(0,0,0,.28),
                0 1px 0 rgba(255,224,188,.30); }
  #lv .txt{ font-size:16px; color:#ffeede; -webkit-text-stroke:0; text-shadow:0 1px 2px rgba(0,0,0,.6); }

  /* Timer — CSS amber rounded-RECT plate (reference): warm gold gradient + light cream rim
     + white digits with a soft outline. Urgent <60s -> red SKULL image (alert state). */
  #timer{ width:150px; height:52px; background:linear-gradient(#f6ca52,#e6952c);
    border-radius:17px; border:3px solid #ffe6ac;
    box-shadow:0 3px 4px rgba(90,50,10,.26), inset 0 2px 2px rgba(255,255,255,.5),
               inset 0 -3px 5px rgba(168,94,16,.42); }
  #timer .txt{ font-size:27px; color:#fff; letter-spacing:1px;
    -webkit-text-stroke:2.5px #9a7c49; paint-order:stroke fill;
    text-shadow:0 2px 1px rgba(110,70,20,.4); }
  /* URGENT (<60s): RED plate (same shape) + SKULL on the LEFT, digits pushed RIGHT (reference). */
  #timer.urgent{ background:linear-gradient(#ff6f56,#e23a2b);
    border:3px solid #ffd1c5; box-shadow:0 3px 4px rgba(120,20,10,.3), inset 0 2px 2px rgba(255,255,255,.32);
    animation:tpulse .8s ease-in-out infinite; }
  #timer.urgent::before{ content:""; position:absolute; left:9px; top:50%; transform:translateY(-50%);
    width:31px; height:31px; background:url("../assets/ui/skull_timer.png") center/contain no-repeat;
    filter:drop-shadow(0 1px 1px rgba(120,10,5,.4)); }
  #timer.urgent .txt{ color:#fff; padding-left:28px;          /* shift digits RIGHT, clear of the skull */
    -webkit-text-stroke:2.5px #a32014; text-shadow:0 2px 1px rgba(120,10,5,.5); }
  @keyframes tpulse{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.07);} }

  /* pause chip (kept) */
  .hud-chip{ background:linear-gradient(#fff8ec,#f1ddb8); color:var(--hud);
    border:2px solid #fff; border-radius:16px; padding:6px 11px;
    box-shadow:0 3px 0 rgba(0,0,0,.22); font-weight:800; font-size:15px;
    display:flex; align-items:center; line-height:1; }
  #pause{ cursor:pointer; pointer-events:auto; font-size:17px; }

  /* COMBO gauge — the TRACK is ALWAYS shown (user: 프로그래스 UI 위치는 항상 노출).
     The green fill + "COMBO xN" label appear only during an active combo. Overlaps the
     frame's bottom edge, centered under the timer. */
  /* COMBO COUNT — engraved flame pill on the HUD right (🔥 xN); SAME size as #lv (78x38). */
  #comboCount{ width:78px; height:38px; box-sizing:border-box; display:flex; align-items:center; justify-content:center; gap:3px;
    border-radius:12px; background:linear-gradient(#6f3d2c,#5b3324);
    box-shadow: inset 0 3px 4px rgba(0,0,0,.55), inset 0 -2px 3px rgba(0,0,0,.28), 0 1px 0 rgba(255,224,188,.30);
    font-weight:800; color:#ffeede; font-size:16px; pointer-events:none; }
  #comboCount .fl{ font-size:15px; filter:drop-shadow(0 1px 1px rgba(0,0,0,.45)); }
  #comboCount .cc-x{ text-shadow:0 1px 2px rgba(0,0,0,.6); font-variant-numeric:tabular-nums; }
  #comboCount.bump{ animation:cbump .3s ease; }

  /* COMBO retention bar — INTEGRAL with the frame (일체형): a downward LOBE of the SAME wood
     as #hudFrame (fuses, no separate border) with a DEBOSSED dark channel carved into it. */
  /* straddle the header bottom ~HALF (user: 헤더에 기존처럼 반정도만 걸치게): margin-top spaces it
     below the elements; the negative margin-bottom pulls #hud's bottom edge up to the gauge's
     middle so its lower lobe hangs BELOW the header (like the original frame-lobe). */
  .combo-gauge{ position:relative; width:148px; height:25px; margin-top:6px; margin-bottom:-13px; z-index:6; pointer-events:none;
    padding:4px 7px 6px; border-radius:0 0 16px 16px;     /* straight top fuses to the frame; rounded bottom = the lobe */
    background:linear-gradient(#96592f,#88512f);          /* SAME wood as the frame */
    box-shadow:0 3px 3px rgba(0,0,0,.16); }
  .combo-gauge .cg-track{ position:absolute; left:7px; right:7px; top:4px; bottom:6px; border-radius:9px;
    background:#3a2010; overflow:hidden;                  /* DEBOSSED channel carved into the wood */
    box-shadow:inset 0 3px 5px rgba(0,0,0,.7), inset 0 -1px 0 rgba(255,205,155,.12); }
  /* clean SINGLE-layer green fill — clipped by the track's rounded box (no double outline). */
  .combo-gauge .cg-fill{ position:absolute; left:0; top:0; bottom:0; width:0%;
    background:linear-gradient(#83ea54,#4ec22e);
    box-shadow:inset 0 2px 0 rgba(255,255,255,.35); opacity:0; transition:opacity .15s; }
  .combo-gauge .cg-label{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:13px; color:#fff; -webkit-text-stroke:1.5px rgba(35,80,18,.95);
    paint-order:stroke fill; text-shadow:0 1px 0 rgba(25,60,12,.5); letter-spacing:.3px;
    opacity:0; transition:opacity .15s; }
  .combo-gauge.show .cg-fill, .combo-gauge.show .cg-label{ opacity:1; }
  .combo-gauge.bump{ animation:cbump .3s ease; }
  @keyframes cbump{ 0%{transform:scale(1);} 35%{transform:scale(1.1);} 100%{transform:scale(1);} }

  /* ============================================================
     V12 — UNIFIED 3D WOOD NICHE SHELF (ported from _niche_poc.html).
     The cabinet face stays UPRIGHT (NO rotateX on the whole shelf, V5-1
     kept). Each cubby is now ONE real folded 3D wood box (back + floor +
     ceiling + 2 side walls + front rim) that recedes into the screen by a
     fixed DEPTH and reveals its interior purely via a per-niche perspective
     + a SHARED global eye (perspective-origin set per niche in JS). The
     #cabinet is the outer wood box; #grid lays the niches in a CSS grid
     with a wood gap (the lattice between cubbies).
     ============================================================ */
  #board-wrap{ flex:1; width:100%; display:flex; align-items:center; justify-content:center;
    padding:6px 2px 12px; min-height:0; }
  /* the shelf — FRONT-ON, no tilt (transform carries NO rotation, V5-1 kept).
     V12 — LANDSCAPE cubbies: a WIDER, SHORTER aspect so a 3x4 grid yields wide
     short cubbies (~1.5:1 w:h) like the reference. */
  #shelf{ position:relative; width:min(96vw, 78vh, 540px); aspect-ratio:1/0.95;
    transform-style:flat;
    transform: none;                 /* front elevation — NO rotateX tilt */
    /* V23b — lower only the BRIGHTNESS a touch (glare comfort) — NOT saturation; the colors must stay
       (user: 채도 죽이지마, 알록달록하게). Goods get an extra saturate boost on .good. */
    filter: brightness(0.95) drop-shadow(0 18px 24px rgba(60,38,16,.42)); }
  /* #cabinet = the OUTER WOOD BOX the niches sit inside (wood border + wood lattice
     gap). It is the real wood frame; the niches open into it. */
  /* V21 — UNIFIED WOOD: the frame is a SOLID --grid-color base × the GRAYSCALE board grain map
     (multiply) so its hue comes ENTIRELY from gridColor (no baked brown). The colored --board-img
     stays LAST in the layer list (fully covered by the opaque grain map above it) so the
     wood-asset selectors/asserts (shelf_board.png present) still resolve. A plain brightness()
     (no sepia/saturate, which would shift hue) gives this face its consistent lighting level. */
  #shelf .frame{ position:absolute; inset:0;
    background-color: var(--grid-color, #caa06a);    /* solid wood hue base (the picker value) */
    background-image:
      var(--board-grain),                            /* grayscale grain map (multiply over the hue) */
      linear-gradient(var(--grid-color,#caa06a),var(--grid-color,#caa06a)),
      var(--board-img);                              /* legacy colored asset kept for selectors */
    background-size: 100% 100%, 100% 100%, 100% 100%; background-repeat:no-repeat;
    background-blend-mode: multiply, normal, normal;
    filter: brightness(1.08);   /* V23b — frame a touch brighter than the dark floor (contrast), but not glaring */
    border-radius: var(--corner-radius, 0px);
    padding: var(--cab-pad);
    box-shadow: inset 0 2px 0 rgba(255,255,255,.22), inset 0 -3px 8px rgba(40,24,8,.4); }
  /* the niche grid sits inside the cabinet wood border. The GAP is a wood lattice
     (the #grid background shows between niches). gap + grid placement = data-driven. */
  #shelf .grid{ position:absolute;
    inset: var(--cab-pad);
    display:grid; gap: var(--niche-gap);
    background-color: var(--grid-color, #caa06a);
    background-image:
      var(--board-grain),
      linear-gradient(var(--grid-color,#caa06a),var(--grid-color,#caa06a)),
      var(--board-img);
    background-size: 100% 100%, 100% 100%, 100% 100%; background-repeat:no-repeat;
    background-blend-mode: multiply, normal, normal;
    filter: brightness(1.08);   /* V23b — frame a touch brighter than the dark floor (contrast), but not glaring */
    border-radius: var(--corner-radius, 0px); z-index:1; }
  /* legacy wood-layer container kept (empty) so old selectors resolve harmlessly. */
  #shelf .wood-layer{ position:absolute; inset:0; z-index:0; pointer-events:none; display:none; }

  /* ============================================================
     V22 — OUTER CABINET TOP FACE (the whole shelf unit's top surface).
     A horizontal wood plane sitting ON the topmost OUTER frame rail, tilted BACK
     (rotateX) so under the look-down perspective you see its TOP SURFACE receding
     up/away (like glancing down at the top of a cabinet). It is the OUTER cabinet
     top — SEPARATE from the (hidden) per-cubby ceilings.
       .frame-top-persp : its OWN perspective context (so it projects in 3D even
                          though #shelf stays flat). Sits ABOVE the frame top edge.
       .frame-top       : the wood plane; hinged at its FRONT-BOTTOM edge and folded
                          back via rotateX (set per-frame in buildFrameTop()). Same
                          unified wood (SOLID --grid-color × grayscale grain) as every
                          other face, lit a touch LIGHTER (top surface catches light).
     Sizes/transform/visibility are computed in JS (buildFrameTop) from frameTopDepth.
     ============================================================ */
  #shelf .frame-top-persp{ position:absolute; left:0; right:0; top:0;
    perspective: var(--frame-top-persp, 900px); perspective-origin: 50% 100%;
    /* V27 — CLIP the roof board to the frame width: the perspective projection paints the folded board
       a few px WIDER than its layout box, so its edges poked PAST the side frame (user: 오른쪽 끝에 조금
       튀어나와). overflow:hidden clips it to left:0/right:0 = the frame width on BOTH sides (scales with
       any board width, unlike a fixed inset). */
    overflow:hidden;
    pointer-events:none; z-index:2; display:none; }
  #shelf .frame-top{ position:absolute; left:0; right:0; bottom:0;
    transform-origin: center bottom; transform-style:flat;
    /* ROOF (V27) — the 지붕 paints EXACTLY like the FLOOR (.c-wall.b): the LIT top of the wood plank
       (light at the FRONT/bottom edge, soft shade toward the BACK) at brightness 0.68. So the cabinet
       TOP reads as the SAME shelf board as the floors below — the floor copied straight onto the top
       (user: 바닥면을 그대로 복사해서 위로). SOLID --grid-color × grayscale grain -> recolors uniformly. */
    background-color: var(--grid-color, #caa06a);
    background-image:
      linear-gradient(to top, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 32%, rgba(0,0,0,.10) 100%),
      var(--board-grain),
      linear-gradient(var(--grid-color,#caa06a),var(--grid-color,#caa06a)),
      var(--board-img);
    background-size: 100% 100%, 100% 150%, 100% 100%, 100% 150%; background-repeat:no-repeat;
    background-position: 0 100%, 0 100%, 0 0, 0 100%;
    background-blend-mode: normal, multiply, normal, normal;
    filter: brightness(0.68);   /* MATCH the floor's brightness — same shelf board */
    border-top-left-radius: var(--corner-radius, 0px);
    border-top-right-radius: var(--corner-radius, 0px); }

  /* ============================================================
     A single CUBBY = the GRID CELL that owns the slot hit-regions + holds
     ONE folded 3D wood niche box. The .cubby is the OUTER clip+perspective
     element (overflow:hidden + perspective) so the receding interior is
     clipped to the opening and never spills over the wood lattice. The
     INNER .niche-clip keeps transform-style:preserve-3d with NO overflow
     (a non-visible overflow would flatten the box to 2D — POC insight).
       .niche-clip  : preserve-3d layer holding the 6 wood faces.
       .c-back      : BACK WALL (cream, at z=-D) — same color as page wall.
       .c-wall .t/.b/.l/.r : the FLOOR/CEILING + LEFT/RIGHT side walls
                      (real folded wood faces — the visible 3D interior).
       .c-back-layer: the preserve-3d stage holding peeking BACK-row goods.
       .c-floor     : the preserve-3d stage holding the FRONT-row goods +
                      the 3 slot hit-columns (left/center/right).
     ============================================================ */
  .cubby{ position:relative; overflow:hidden; border-radius: var(--corner-radius, 0px);
    perspective: var(--niche-persp);
    /* perspective-origin set per-cubby in JS (shared global eye). */ }
  /* INNER preserve-3d layer — holds the folded box + the goods. NO overflow (would
     flatten). z-index ABOVE the front rim (V14) so the GOODS standing on the floor PAINT
     OVER the thin front-lip band -> each good's FULL base is visible, never walled-off. */
  .cubby .niche-clip{ position:absolute; inset:0; transform-style:preserve-3d; z-index:3; }
  /* ---- LOCK gimmick (자물쇠): GRID-LEVEL overlay (NOT clipped by the cubby) so the
     CHAINS hook OVER the wood frame between cubbies. Positioned over each cubby by
     positionLocks(). count>=4: solid dim+2 chains / 3: crack+2 / 2: crack+1 / 1: crack+0. */
  #grid .c-lock{ position:absolute; z-index:25; display:none; pointer-events:none; }
  #grid .c-lock.on{ display:block; }
  .cubby.locked .niche-clip{ filter:brightness(.93) saturate(.98); }   /* faint "frozen" shade — keep the warm wood/cream tone so the cell matches unlocked cells */
  /* DIM layer: very light NEUTRAL shadow (no blue tint) so the locked cell reads the SAME color as
     normal cells — the chain + padlock + badge are the lock indicators, not a dark box. */
  .c-lock .c-lock-dim{ position:absolute; inset:0; z-index:1; background:rgba(20,16,10,.0); transition:background .25s; }
  .c-lock.dim-solid .c-lock-dim{ background:rgba(20,16,10,.12); }
  .c-lock.dim-crack .c-lock-dim{ background:rgba(20,16,10,.07); }
  /* CRACK overlay (금간 유리) — shown only on cracked (count<=3) */
  .c-lock .c-lock-crack{ position:absolute; inset:-4%; z-index:2; display:none;
    background:url("../assets/ui/crack_overlay.png") center/cover no-repeat; opacity:.9;
    mix-blend-mode:screen; pointer-events:none; }
  .c-lock.dim-crack .c-lock-crack{ display:block; }
  /* CHAINS — strands crossing the OPENING with ends hooked OVER the frame; strong offset
     shadow = the chain reads as hanging in FRONT (3D), not painted on the niche back. */
  .c-lock .c-chain{ position:absolute; z-index:3; left:50%; top:50%; width:112%; height:25%;
    background:url("../assets/ui/chain.png") center/100% 100% no-repeat;
    filter:drop-shadow(1px 3px 2.5px rgba(0,0,0,.5)); pointer-events:none; }
  .c-lock .c-chain.c1{ transform:translate(-50%,-50%) rotate(36deg); }
  .c-lock .c-chain.c2{ transform:translate(-50%,-50%) rotate(-36deg); }
  /* GAP COVER — paints the frame lattice (gap wood) back OVER the chain ends so the chain
     tucks BEHIND the frame (woven look). Border = the gap, sits in the gap around the cubby. */
  .c-lock .c-gapcover{ position:absolute; inset:calc(-1 * var(--niche-gap, 8px)); z-index:6;
    border:var(--niche-gap, 8px) solid var(--grid-color, #caa06a); box-sizing:border-box;
    border-radius:var(--corner-radius, 0px); filter:brightness(1.08); pointer-events:none; }
  /* PADLOCK (gold) centered */
  .c-lock .c-lock-pad{ position:absolute; z-index:4; width:52%; height:52%; left:24%; top:30%;
    background:url("../assets/ui/lock_closed.png") center/contain no-repeat;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.45)); animation:lockIn .3s ease; }
  /* COUNT badge — small blue circle, top-center, overlapping the top edge */
  /* number badge sits ON the padlock (centered on the lock body) */
  .c-lock .c-lock-badge{ position:absolute; z-index:7; top:52%; left:50%; transform:translate(-50%,-50%);
    width:clamp(16px,19%,30px); aspect-ratio:159/191;
    background:url("../assets/ui/badge_lock.png") center/contain no-repeat;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.4)); }
  .c-lock .c-lock-num{ position:absolute; top:44%; left:50%; transform:translate(-50%,-50%);
    font-weight:900; font-size:clamp(8px,2.3vw,14px); color:#fff; white-space:nowrap;
    -webkit-text-stroke:0.7px #1f5fa6; paint-order:stroke fill; text-shadow:0 1px 1px rgba(0,0,0,.3); }
  /* BREAK (count -> 0): padlock flies off sideways, rest fades. */
  .c-lock.breaking .c-lock-pad{ background-image:url("../assets/ui/lock_break.png"); animation:lockFly .5s ease-in forwards; }
  .c-lock.breaking .c-lock-dim,
  .c-lock.breaking .c-lock-crack,
  .c-lock.breaking .c-chain,
  .c-lock.breaking .c-lock-badge{ animation:lockFade .3s ease forwards; }
  @keyframes lockIn{ from{ transform:scale(.4); opacity:0; } to{ opacity:1; } }
  @keyframes lockFly{ 0%{ transform:translate(0,0) rotate(0); opacity:1; }
    100%{ transform:translate(150%,-40%) rotate(55deg); opacity:0; } }
  @keyframes lockFade{ to{ opacity:0; } }
  /* recess shadow at the opening (read as set into the wood). */
  .cubby::before{ content:""; position:absolute; inset:0;
    z-index:6; pointer-events:none;
    box-shadow:
      inset 0 5px 9px -4px rgba(40,24,8,.42),
      inset 5px 0 8px -6px rgba(40,24,8,.30),
      inset -5px 0 8px -6px rgba(40,24,8,.30); }

  /* ---- THE 6 WOOD FACES (folded box) ----
     Sizes/transforms are set per-cubby in JS so the box CLOSES exactly (no step).
     Local 3D space: origin=front-top-left, x→right, y→DOWN, z→toward camera. */
  .cubby .c-back, .cubby .c-wall{ position:absolute; left:0; top:0; }
  /* BACK WALL — cream plane at z=-D. background-color == page wall (assert V5/V6).
     V18 — DIRECTIONAL INNER SHADING: a second radial gradient whose DARK pole sits toward
     the shadow direction (bottom-right by default, driven by --cubby-shade-dark-*) and whose
     LIT pole is toward the light (top-left). So each niche reads brighter at the upper-left
     and darker at the lower-right — the cubby gradient/shadow the reference shows. The
     opacity scales with --cubby-shade-op (from shadowStrength). The FIRST background-image
     stays first so the back color is still sampled as cream for the seamless-wall assert
     (the gradients sit ON TOP of the cream base color but the back is mostly cream). */
  /* niche INTERIOR back wall = the reference's light cream (the SHELF FLOOR below is the darker, in-
     shadow wood — see the floor band + .c-wall.b). */
  .cubby .c-back{ background-color: #e3cba8;
    background-image:
      /* SAFARI-SAFE FLOOR — the niche's 3D floor face (blend-mode + rotateX fold) can fail to
         composite on iOS Safari, leaving the shelf bottom cream (user: "모바일에서 선반 바닥 안보여").
         So paint a WOOD shelf-FLOOR band onto the BACK WALL bottom (which ALWAYS renders): the
         niche bottom reads as a wood floor surface on every browser. Recolors with gridColor.
         A THIN, DEFINED strip with a crisp top edge (a short fade) — NOT a tall soft glow that
         bleeds up the wall (user: "그리드 뒤에 번지는 영역이있어"). A faint seam shadow sits just
         above it so the floor reads as a plane meeting the back wall. */
      /* dark wood FLOOR band (bottom) only — the niche top has NO dark ceiling band (user: 천장색 없애줘),
         so the cream back wall runs straight up to the frame. The floor band matches the 3D floor color
         (#937149) with a crisp edge; painted on the always-rendering back wall (Safari-safe). */
      linear-gradient(to top,
        #937149 0%, #937149 20%, rgba(0,0,0,0) 21.5%),
      radial-gradient(140% 140% at var(--cubby-shade-lit-x,20%) var(--cubby-shade-lit-y,20%),
        rgba(255,248,228,.32) 0%, rgba(255,248,228,0) 50%);
    /* V28 (option B) — REMOVED ALL the dark shading behind the floor (the bottom AO vignette AND the
       diagonal dark radial) — user: 바닥 뒤에 이건 지워줘 → B로가. The back wall is now CLEAN cream running
       straight down to the floor band; only a soft top-left LIT highlight remains for a touch of depth. */
    z-index:0; }
  /* the folded WOOD faces — FLOOR (.b), CEILING (.t), LEFT (.l), RIGHT (.r). One
     light (upper-front-left): FLOOR lightest, CEILING darkest, LEFT lit, RIGHT shaded. */
  .cubby .c-wall{ pointer-events:none; z-index:1;
    background-repeat:no-repeat; background-size:100% 100%; }
  /* V21 — EVERY wood face = SOLID --grid-color base × GRAYSCALE grain map (multiply). The hue
     is IDENTICAL on every face (it IS gridColor); faces differ ONLY by a per-face brightness()
     (NO sepia/saturate — those would shift the hue). A neutral (hue-free) lit/shade gradient on
     top of the floor/ceiling adds the plank-surface read without tinting. The colored --board-img/
     --post-img stay LAST (covered) so the wood-asset selectors still resolve. */
  /* FLOOR (.b) — lit top of the wood plank (LIGHTEST face). */
  .cubby .c-wall.b{
    background-color: var(--grid-color, #caa06a);
    background-image:
      linear-gradient(to top, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 32%, rgba(0,0,0,.10) 100%),
      var(--board-grain),
      linear-gradient(var(--grid-color,#caa06a),var(--grid-color,#caa06a)),
      var(--board-img);
    background-size: 100% 100%, 100% 150%, 100% 100%, 100% 150%;
    background-position: 0 100%, 0 100%, 0 0, 0 100%;
    background-repeat:no-repeat;
    background-blend-mode: normal, multiply, normal, normal;
    /* V23 — the niche FLOOR reads clearly DARKER than the (now brighter) frame, per the reference. */
    filter: brightness(0.68); }

  /* ============ ATTIC TOPPERS (한칸/두칸 바닥없는 조각을 기존 그리드 천장 위에 얹기) ============
     A `.cubby.attic` is a floorless piece sitting on the cabinet top: it KEEPS its walls/back/
     ceiling but DROPS its own recessed floor (the 3D floor face + the dark back-wall floor band),
     so its goods stand on the cabinet TOP surface below it. That sitting surface is rendered FLOOR-
     COLORED (user: 가장 윗면도 선반 바닥색과 동일) as a band at the topper's base. */
  .cubby.attic .c-wall.b{ display:none; }                       /* no recessed 3D floor face (바닥빼고) */
  .cubby.attic .c-back{                                          /* back wall: drop the dark floor band, keep soft shade */
    background-image:
      linear-gradient(to top, #937149 0%, #937149 16%, rgba(0,0,0,0) 18%),   /* FLOOR-colored sitting surface */
      radial-gradient(150% 150% at 80% 80%, rgba(40,24,8,.16) 0%, rgba(40,24,8,0) 60%); }
  /* the floor-colored plank the topper SITS on (the cabinet top face under it) */
  .cubby.attic::after{ content:''; position:absolute; left:0; right:0; bottom:0; height:13%;
    background: #937149; filter:brightness(1.0); z-index:2; pointer-events:none;
    border-radius: 0 0 var(--corner-radius,0px) var(--corner-radius,0px); }

  /* VOID — an EMPTY attic cell: paint over the cabinet wood (cell + its gaps + the frame top rail
     above it) with the page WALLPAPER so only the toppers read as separate pieces on top. Appended
     BEFORE the toppers so the toppers paint over these mask edges. */
  .c-void{ position:relative; background:var(--wallpaper,#ecd3b3); }
  .c-void::before{ content:''; position:absolute; inset:calc(-1 * var(--niche-gap) - 1px);
    background:var(--wallpaper,#ecd3b3); z-index:0; }
  .c-void.void-top::after{ content:''; position:absolute;
    left:calc(-1 * var(--niche-gap)); right:calc(-1 * var(--niche-gap));
    top:calc(-1 * (var(--cab-pad) + var(--niche-gap))); height:var(--cab-pad);
    background:var(--wallpaper,#ecd3b3); z-index:0; }

  /* ============ HIDE FACES (per-cubby face transparency — data: hideFaces:[...]) ============
     A cubby may carry hideFaces (e.g. ["floor"]) -> we add a .hide-<face> class to its element
     in makeCubbyEl. The named wood FACE is display:none, but the cubby STAYS registered (its
     .c-floor holds goods + slots, drag/drop/match still work). 'floor' is the wood FLOOR BAND
     (.c-wall.b + the .c-back floor gradient band) — NEVER .c-floor. This is the general mechanism
     the user wants: stack a 1-/2-cell topper with its floor removed so it doesn't DOUBLE with the
     base's top face below it, yet still plays as a grid. */
  .cubby.hide-floor .c-wall.b{ display:none; }              /* drop the recessed 3D floor face */
  /* the back-wall floor-band override is SKIPPED for .attic cubbies — the attic block already
     paints a purpose-built floor-COLORED sitting surface there (the topper-on-cabinet look), so
     hideFoor on an attic topper is satisfied by attic's own CSS (both drop the band + 3D floor). */
  .cubby.hide-floor:not(.attic) .c-back{                    /* drop the dark FLOOR BAND on the back wall; keep soft shade */
    background-image:
      radial-gradient(150% 150% at var(--cubby-shade-dark-x,80%) var(--cubby-shade-dark-y,80%),
        rgba(40,24,8,calc(var(--cubby-shade-op,.25) * 1.7)) 0%,
        rgba(40,24,8,calc(var(--cubby-shade-op,.25) * 0.7)) 38%,
        rgba(40,24,8,0) 72%),
      radial-gradient(140% 140% at var(--cubby-shade-lit-x,20%) var(--cubby-shade-lit-y,20%),
        rgba(255,248,228,.32) 0%, rgba(255,248,228,0) 50%),
      radial-gradient(135% 130% at 50% 12%, rgba(0,0,0,0) 50%, rgba(70,45,18,.14) 100%); }
  .cubby.hide-ceiling .c-wall.t{ display:none; }            /* drop the ceiling face */
  .cubby.hide-left    .c-wall.l{ display:none; }            /* drop the left side wall */
  .cubby.hide-right   .c-wall.r{ display:none; }            /* drop the right side wall */
  .cubby.hide-back    .c-back{ background:transparent !important; }  /* clear the back-wall plane */
  /* CEILING (.t) — underside of the shelf above. Faces DOWN so a step DARKER than the lit floor
     (lit-from-above read) but still a clear wood SURFACE (V15). Same hue as every face. */
  .cubby .c-wall.t{
    background-color: var(--grid-color, #caa06a);
    background-image:
      linear-gradient(to bottom, rgba(0,0,0,.18) 0%, rgba(0,0,0,.06) 45%, rgba(0,0,0,0) 100%),
      var(--board-grain),
      linear-gradient(var(--grid-color,#caa06a),var(--grid-color,#caa06a)),
      var(--board-img);
    background-size: 100% 100%, 100% 150%, 100% 100%, 100% 150%;
    background-position: 0 0, 0 0, 0 0, 0 0;
    background-repeat:no-repeat;
    background-blend-mode: normal, multiply, normal, normal;
    filter: brightness(.86); }
  /* LEFT side wall (.l) — vertical-grain post, LIT (light from front-left). */
  .cubby .c-wall.l{
    background-color: var(--grid-color, #caa06a);
    background-image:
      var(--post-grain),
      linear-gradient(var(--grid-color,#caa06a),var(--grid-color,#caa06a)),
      var(--post-img);
    background-size: 100% 100%, 100% 100%, 100% 100%; background-repeat:no-repeat;
    background-blend-mode: multiply, normal, normal;
    filter: brightness(1.06); }
  /* RIGHT side wall (.r) — vertical-grain post, SHADED (darker). Same hue, lower brightness. */
  .cubby .c-wall.r{
    background-color: var(--grid-color, #caa06a);
    background-image:
      var(--post-grain),
      linear-gradient(var(--grid-color,#caa06a),var(--grid-color,#caa06a)),
      var(--post-img);
    background-size: 100% 100%, 100% 100%, 100% 100%; background-repeat:no-repeat;
    background-blend-mode: multiply, normal, normal;
    filter: brightness(.82); }
  /* FRONT RIM — the THIN front FACE of the shelf board, a wood band BELOW the standing
     surface along the front-bottom edge. z-index BELOW the niche-clip (V14) so it sits
     BENEATH the goods (the goods paint over it). Same hue, a touch darker than the floor. */
  .cubby .c-rim{ position:absolute; left:0; z-index:2; pointer-events:none;
    background-color: var(--grid-color, #caa06a);
    background-image:
      var(--board-grain),
      linear-gradient(var(--grid-color,#caa06a),var(--grid-color,#caa06a)),
      var(--board-img);
    background-size:100% 340%, 100% 100%, 100% 340%; background-position:0 100%, 0 0, 0 100%; background-repeat:no-repeat;
    background-blend-mode: multiply, normal, normal;
    filter: brightness(.92);
    box-shadow:0 2px 5px rgba(40,24,8,.55); }

  /* target highlights (drop feedback) — on the cubby opening. */
  .cubby.target-ok::before{ box-shadow: inset 0 0 0 3px #5fd06b, inset 0 0 18px rgba(95,208,107,.45); }
  .cubby.target-bad::before{ box-shadow: inset 0 0 0 3px #e8453c, inset 0 0 18px rgba(232,69,60,.4); }
  .cubby.clearing{ animation:cubbyPop .34s ease; }
  @keyframes cubbyPop{ 0%{transform:scale(1);} 30%{transform:scale(1.04);} 100%{transform:scale(1);} }

  /* ---- GOOD STAGES (inside the preserve-3d niche-clip) ----
     .c-floor    = the FRONT-row goods + 3 slot hit-columns (interactive).
     .c-back-layer = the BACK-row goods (peeking, non-interactive, deeper z).
     Both are full-opening planes inside the 3D box; goods are billboards on
     the floor, given translateZ in JS to sit at the floor depth (front/back). */
  .cubby .c-floor{ position:absolute; inset:0; z-index:5; transform-style:preserve-3d;
    overflow:visible; transition: box-shadow .12s; }
  .cubby .c-back-layer{ position:absolute; inset:0; z-index:3; transform-style:preserve-3d;
    pointer-events:none; }

  /* ---- FIXED 3-SLOT COLUMNS (left / center / right) ----
     Each .slot is a transparent column cell that owns the interactive hit-region
     for ONE position (slotFromX maps pointer→column). The good billboard sits in
     it, anchored to the floor line (bottom) + pushed back via translateZ in JS.
     The good art may overflow ABOVE the slot box (big bottles) but the HIT region
     is the slot column -> a good never steals a neighbor's grab (Fix #2). All slots
     share the same bottom floor line (Fix #4 baseline). */
  .cubby .c-floor .slot, .cubby .c-back-layer .slot{
    position:absolute; bottom:0; height:8%;
    display:flex; align-items:flex-end; justify-content:center;
    overflow:visible; }
  /* 3 columns spread EDGE TO EDGE across the cubby width (reference): LEFT good hugs
     the left inner wall, RIGHT good the right inner wall, center in the middle —
     near-touching like the reference. Each slot is the full third; the good sits
     CENTERED in it (centers ~17/50/83%). */
  .slot.s0{ left:0%;    width:34%; }                /* center 17% — hugs LEFT inner wall */
  .slot.s1{ left:33%;   width:34%; }                /* center 50% — middle */
  .slot.s2{ left:66%;   width:34%; }                /* center 83% — hugs RIGHT inner wall */
  .cubby .c-floor .slot{ z-index:2; }               /* front slots above back-layer */

  /* good billboard — stands UPRIGHT on the floor plane, facing the camera. Sits at
     the floor depth via a per-good --gz translateZ (set in JS: front small z, back
     deeper z = real front/back depth). The box is HEIGHT-driven (--good-h, a % of the
     cubby interior set per render) with width following the content aspect (--good-ar)
     so slim items get slim boxes (3 fit across) + wide items short boxes. transform-
     origin:bottom center + scale about the base keeps the shared baseline (Fix #4). */
  .good{ position:absolute; left:50%; bottom:0;
    height: var(--good-h, 90%); aspect-ratio: var(--good-ar, 0.42);
    /* the source tiles are SQUARE (256²) with the product centered; the .good box HUGS
       the product (height-driven, width = height*content-aspect). `auto 100%` scales the
       square image to the box HEIGHT so the product reads at FULL cubby height (the slim
       transparent sides of the square are clipped by the narrow box) — `contain` would
       wrongly fit a slim box to its WIDTH and shrink the product. center-bottom standing. */
    background-size:auto 100%; background-repeat:no-repeat; background-position:center bottom;
    /* V18 — DIRECTIONAL drop-shadow: offset toward the shadow direction (bottom-right by
       default, from the top-left light). dx/dy/blur/color come from --good-shadow-* which
       applyShelfCssVars() derives from SHELF.lightAngle + shadowStrength. */
    filter:drop-shadow(var(--good-shadow-dx,4px) var(--good-shadow-dy,4px) var(--good-shadow-blur,5px) var(--good-shadow-color,rgba(20,10,2,.45)));
    transform: translateX(-50%) translateZ(var(--gz,0px)) scale(var(--gs,1));
    transform-origin:bottom center;
    will-change:transform; cursor:grab; touch-action:none; pointer-events:none; }
  /* CONTACT SHADOW — soft base ellipse centered under the good's horizontal center,
     lying ON the floor at the good's base (tracks center+base for every slot/scale,
     Fix #3). It sits at the good's own translateZ so it stays glued to the foot. */
  .good::after{ content:""; position:absolute; left:50%; bottom:0;
    width:80%; height:12%; transform:translate(-50%,42%);
    background:radial-gradient(closest-side, rgba(20,10,2,.50), rgba(20,10,2,.22) 56%, rgba(20,10,2,0) 80%);
    border-radius:50%; z-index:-1; pointer-events:none; }
  /* PEEKING back-row goods — set DEEPER on the floor (bigger translateZ in JS) so they
     read as a real back row standing behind the front row, peeking above/between it.
     Slightly dimmed so they read one step back (the depth, not a blur smudge). */
  /* V18 — BACK-ROW goods are DARKER (in shadow behind the front row). brightness comes from
     --back-dim (SHELF.backDim, default 0.5 = ~half) + slight desaturation (saturate .85), per
     the reference closeup where the back goods read at roughly half brightness. The directional
     drop-shadow is softer for the back row (it's already dim + occluded). */
  .good.peek{ cursor:default;
    filter:drop-shadow(var(--good-shadow-dx,4px) var(--good-shadow-dy,4px) var(--good-shadow-blur,5px) var(--good-shadow-color,rgba(20,10,2,.34)))
           brightness(var(--back-dim,0.5)) saturate(.85);
    transform: translateX(-50%) translateZ(var(--gz,0px)) scale(var(--gs,1)); }
  .good.peek::after{ background:radial-gradient(closest-side, rgba(20,10,2,.36), rgba(20,10,2,.14) 60%, rgba(20,10,2,0) 80%);
    height:10%; width:74%; }
  /* a blocked good (data flag / non-grabbable) is visibly inert but in the FRONT */
  .good.blocked{ cursor:default; filter:drop-shadow(0 3px 3px rgba(0,0,0,.3)) brightness(.9); }
  .good.dragging{ opacity:0; }
  /* land squash WEAKENED (user: 이동 바운스 약하게) — gentler squash/stretch + shorter. */
  .good.land{ animation:land .28s cubic-bezier(.34,1.4,.64,1); }
  @keyframes land{
    0%{ transform:translateX(-50%) translateZ(var(--gz,0px)) translateY(-7%) scaleY(1.05) scaleX(.97) scale(var(--gs,1)); }
    45%{ transform:translateX(-50%) translateZ(var(--gz,0px)) translateY(0) scaleY(.95) scaleX(1.035) scale(var(--gs,1)); }
    70%{ transform:translateX(-50%) translateZ(var(--gz,0px)) translateY(0) scaleY(1.02) scaleX(.99) scale(var(--gs,1)); }
    100%{ transform:translateX(-50%) translateZ(var(--gz,0px)) translateY(0) scaleY(1) scaleX(1) scale(var(--gs,1)); }
  }
  /* 0.2s hold after a triple completes: freeze grabbing on that cubby so the goods sit then pop. */
  .cubby.cb-hold .good{ pointer-events:none; }
  /* CLEAR POP (뿅) — the 3 matched goods BOUNCE up + grow, then pop out together.
     Preserves the good's base transform (centering / depth z / per-type scale). */
  .good.popping{ animation:goodPop .36s cubic-bezier(.34,1.7,.5,1) forwards;
    will-change:transform,opacity; filter:none; z-index:9; }
  @keyframes goodPop{
    0%  { transform:translateX(-50%) translateZ(var(--gz,0px)) translateY(0)    scale(calc(var(--gs,1) * 1)); }
    35% { transform:translateX(-50%) translateZ(var(--gz,0px)) translateY(-7%)  scale(calc(var(--gs,1) * 1.14)); }  /* gentle bounce */
    58% { transform:translateX(-50%) translateZ(var(--gz,0px)) translateY(-4%)  scale(calc(var(--gs,1) * 1.04)); }
    100%{ transform:translateX(-50%) translateZ(var(--gz,0px)) translateY(-16%) scale(calc(var(--gs,1) * 0.05)); opacity:0; }  /* 뿅 */
  }
  /* "뿅" POOF — a small, soft white puff (+ a few tiny dots) at each good's vanish point.
     Deliberately subtle: small, fast, semi-transparent — reads as a gentle pop, not a burst. */
  .pop-puff{ position:fixed; width:40px; height:40px; margin:-20px 0 0 -20px; border-radius:50%;
    pointer-events:none; z-index:38;
    background:radial-gradient(circle, rgba(255,255,255,.9) 0%, rgba(255,248,228,.46) 46%, rgba(255,240,210,0) 72%); }
  @keyframes popPuff{ 0%{ transform:scale(.35); opacity:0; } 26%{ opacity:.78; } 100%{ transform:scale(1.15); opacity:0; } }
  .pop-dot{ position:fixed; width:6px; height:6px; margin:-3px 0 0 -3px; border-radius:50%; pointer-events:none; z-index:38;
    background:#fff7e0; box-shadow:0 0 4px rgba(255,228,164,.85); opacity:.9; }
  /* REVEAL (스르륵) — when the front layer empties, the back row glides FORWARD smoothly:
     it starts deeper/smaller/dimmer (behind) and slides forward to the front, brightening,
     with a soft ease-out (no bounce) so it reads as a gentle forward slide. */
  .good.revealing{ animation:revealForward .46s cubic-bezier(.22,.65,.3,1) both; }
  @keyframes revealForward{
    0%{ transform:translateX(-50%) translateZ(calc(var(--gz,0px) - 64px)) translateY(-7%) scale(calc(var(--gs,1) * .74)); filter:brightness(.6) saturate(.82); opacity:.45; }
    100%{ transform:translateX(-50%) translateZ(var(--gz,0px)) translateY(0) scale(var(--gs,1)); filter:none; opacity:1; }
  }
  /* drag avatar (floats above board) */
  #drag-ghost{ position:fixed; z-index:60; pointer-events:none; display:none;
    background-size:contain; background-repeat:no-repeat; background-position:center;
    filter:drop-shadow(0 8px 6px rgba(0,0,0,.4)); transform:translate(-50%,-50%) scale(1.12); }

  /* ---------------- EFFECT LAYERS (IMAGE sprites) ----------------
     All clear/star-fly/sparkle visuals are gpt-image-2 PNG sprites animated
     by the engine — no code-drawn shapes. */
  #fx{ position:fixed; inset:0; z-index:40; pointer-events:none; overflow:hidden; }
  /* flying star = fx_star.png */
  .fly-star{ position:fixed; z-index:55; width:38px; height:38px; pointer-events:none;
    background:url("../assets/ui/fx_star.png") center/contain no-repeat;
    filter:drop-shadow(0 0 6px rgba(255,200,40,.9)); will-change:transform,opacity; }
  /* COMBO flame that flies from the clear spot into the top flame pill */
  .fly-flame{ position:fixed; z-index:58; pointer-events:none; font-size:26px; line-height:1;
    transform:translate(-50%,-50%) scale(1); will-change:left,top,transform,opacity;
    filter:drop-shadow(0 0 5px rgba(255,140,30,.85)); }
  /* praise = praise_*.png banner image, escalating by combo tier */
  /* praise = an <img> (praise_<word>.png) — FIXED HEIGHT gives the SAME letter size for every word
     (all images share one font size); width auto so longer words are wider, not taller. */
  /* --pf = fit scale (1 normally; <1 only when a long word can't fit centered on a tight
     edge cell — shrinks PROPORTIONALLY so the praise stays CENTERED on its grid cell and
     never bleeds off-screen, instead of shifting off-center). */
  .praise{ position:fixed; z-index:56; pointer-events:none; --pf:1; transform:translate(-50%,-50%) scale(var(--pf));
    height:23px; width:auto; max-width:92vw;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.3)); }
  @keyframes praisePop{
    0%{ transform:translate(-50%,-50%) scale(calc(var(--pf)*.3)); opacity:0; }
    25%{ transform:translate(-50%,-62%) scale(calc(var(--pf)*1.18)); opacity:1; }
    45%{ transform:translate(-50%,-60%) scale(calc(var(--pf)*.95)); }
    70%{ transform:translate(-50%,-66%) scale(calc(var(--pf)*1.05)); opacity:1; }
    100%{ transform:translate(-50%,-92%) scale(calc(var(--pf)*.9)); opacity:0; }
  }
  /* in-play COMBO badge = badge_combo.png with the multiplier overlaid */
  .combo-badge{ position:fixed; z-index:57; pointer-events:none; transform:translate(-50%,-50%);
    width:102px; height:47px; display:flex; align-items:flex-end; justify-content:center;
    background:url("../assets/ui/badge_combo.png") center/contain no-repeat;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.28)); }
  .combo-badge .m{ position:relative; bottom:4px; font-weight:900; font-size:15px; color:#fff;
    -webkit-text-stroke:2px #2e8a37; paint-order:stroke fill; text-shadow:0 2px 0 rgba(0,0,0,.25);
    font-variant-numeric:tabular-nums; }
  @keyframes comboBadgePop{
    0%{ transform:translate(-50%,-50%) scale(.3) rotate(-8deg); opacity:0; }
    25%{ transform:translate(-50%,-50%) scale(1.18) rotate(3deg); opacity:1; }
    45%{ transform:translate(-50%,-50%) scale(.96) rotate(0deg); }
    78%{ transform:translate(-50%,-54%) scale(1.0); opacity:1; }
    100%{ transform:translate(-50%,-74%) scale(.92); opacity:0; }
  }
  /* sparkle ring = expanding fx_sparkle.png burst at clear point */
  .spark-ring{ position:fixed; z-index:54; pointer-events:none; transform:translate(-50%,-50%);
    width:46px; height:46px;
    background:url("../assets/ui/fx_sparkle.png") center/contain no-repeat; opacity:.9; }
  @keyframes ring{ 0%{ transform:translate(-50%,-50%) scale(.25) rotate(0deg); opacity:.9; }
    100%{ transform:translate(-50%,-50%) scale(1.8) rotate(40deg); opacity:0; } }
  /* individual sparkles = small fx_sparkle.png sprites that fan out */
  .sparkle{ position:fixed; z-index:54; pointer-events:none; width:14px; height:14px;
    background:url("../assets/ui/fx_sparkle.png") center/contain no-repeat; }
  /* clear confetti burst = fx_confetti.png sprites */
  .confetti{ position:fixed; z-index:53; pointer-events:none; width:46px; height:46px;
    background:url("../assets/ui/fx_confetti.png") center/contain no-repeat; }

  /* ---------------- ALL-SIDES FIREWORKS (clear celebration) ----------------
     Bursts launch/explode from the screen EDGES + CORNERS. Each burst is a
     fx_firework_*.png (or fx_star/fx_confetti) sprite scaled+faded in place.
     Fixed to the VIEWPORT so it surrounds the whole screen (not the board box). */
  #fireworks{ position:fixed; inset:0; z-index:95; pointer-events:none; overflow:hidden; }
  .fw{ position:fixed; pointer-events:none; will-change:transform,opacity;
    background:center/contain no-repeat; filter:drop-shadow(0 0 8px rgba(255,220,120,.65)); }
  @keyframes fwBurst{
    0%{ transform:translate(-50%,-50%) scale(.15) rotate(0deg); opacity:0; }
    18%{ opacity:1; }
    55%{ transform:translate(-50%,-50%) scale(1.05) rotate(14deg); opacity:1; }
    100%{ transform:translate(-50%,-50%) scale(1.5) rotate(26deg); opacity:0; }
  }
  /* a small launch streak that rises before the burst (fx_star sprite trailing up) */
  @keyframes fwRise{
    0%{ transform:translate(-50%,-50%) scale(.5); opacity:0; }
    20%{ opacity:1; }
    100%{ transform:translate(-50%, var(--rise,-120px)) scale(.7); opacity:0; }
  }

  /* ---------------- RESULT / GAME-OVER OVERLAY (image cards) ---------------- */
  #overlay{ position:fixed; inset:0; z-index:100; display:none;
    align-items:center; justify-content:center; padding:18px;
    background:rgba(28,14,4,.0); }
  #overlay.on{ display:flex; }
  /* full-viewport DIM behind the card (covers letterbox edges — GLOBAL_GUIDELINES B5). */
  #overlay.on{ background:rgba(28,14,4,.55); }

  /* IMAGE CARD — panel_result.png (clear) or panel_popup.png (game-over). The PNG IS the
     card; dynamic content (numbers/labels/banners/buttons) is overlaid absolutely. */
  .card{ position:relative; width:min(82vw,330px); aspect-ratio:auto;
    background:center/100% 100% no-repeat; padding:0;
    animation:popIn .42s cubic-bezier(.34,1.56,.64,1);
    filter:drop-shadow(0 18px 40px rgba(0,0,0,.5)); }
  .card.result{ background-image:url("../assets/ui/panel_result.png"); aspect-ratio:219/315; }
  .card.gameover{ background-image:url("../assets/ui/panel_popup.png"); aspect-ratio:215/305; }
  @keyframes popIn{ 0%{transform:scale(.6); opacity:0;} 100%{transform:scale(1); opacity:1;} }
  /* the inner content column floats inside the card's cream area */
  .card-body{ position:absolute; left:9%; right:9%; top:24%; bottom:9%;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:10px; }
  /* result card: center the MAX COMBO + NEXT block in the (tall) cream area */
  .card.result .card-body{ top:30%; bottom:14%; justify-content:center; gap:24px; }

  /* MAX COMBO readout (clear card) — ENGLISH label + xN value from S.maxCombo */
  .maxcombo{ display:flex; flex-direction:column; align-items:center; gap:2px; margin-top:6px; }
  .maxcombo .lbl{ font-weight:900; font-size:17px; letter-spacing:1px; color:#ff5fa2;
    -webkit-text-stroke:1px #fff; paint-order:stroke fill; text-shadow:0 2px 0 rgba(0,0,0,.12); }
  .maxcombo .val{ font-weight:900; font-size:40px; color:#ffb02e; line-height:1;
    -webkit-text-stroke:3px #7a3d00; paint-order:stroke fill;
    text-shadow:0 3px 0 rgba(0,0,0,.18); font-variant-numeric:tabular-nums; }

  /* game-over BANNER (txt_timeup.png / txt_nospace.png) — sits across the card's banner area */
  .go-banner{ position:absolute; left:50%; top:-6%; transform:translateX(-50%);
    width:88%; height:64px; background:center/contain no-repeat; z-index:2; }
  .go-banner.timeup{ background-image:url("../assets/ui/txt_timeup.png"); }
  .go-banner.nospace{ background-image:url("../assets/ui/txt_nospace.png"); }
  /* CONTINUE? sub-banner (txt_continue.png) */
  .go-continue{ width:74%; height:34px; background:url("../assets/ui/txt_continue.png") center/contain no-repeat; }
  /* the offered booster row: an icon + label/value (plus30 +30s  /  reshuffle x1) */
  /* the continue EFFECT sits in its own inset TAN box (reference) */
  .go-offer{ display:flex; flex-direction:column; align-items:center; gap:3px; margin:2px 0;
    align-self:stretch; padding:12px 16px; border-radius:18px;
    background:linear-gradient(#f1dba9,#e7c98a);
    box-shadow:inset 0 2px 5px rgba(150,105,55,.4), inset 0 -1px 0 rgba(255,255,255,.4), 0 1px 0 rgba(255,255,255,.45); }
  .go-offer .oicon{ width:54px; height:54px; background:center/contain no-repeat; }
  .go-offer .oicon.plus30{ background-image:url("../assets/ui/icon_plus30.png"); }
  .go-offer .oicon.reshuffle{ background-image:url("../assets/ui/icon_reshuffle.png"); }
  .go-offer .oval{ font-weight:900; font-size:24px; color:#ff5a1e; line-height:1;
    -webkit-text-stroke:2px #fff; paint-order:stroke fill; text-shadow:0 2px 0 rgba(0,0,0,.14); }
  .go-offer .olbl{ font-weight:800; font-size:12px; color:#8a5a2c; }

  /* IMAGE BUTTONS (btn_*.png). The PNG is the button; a coin cost / NEXT label overlays. */
  .ibtn{ position:relative; width:78%; height:46px; cursor:pointer; pointer-events:auto;
    background:center/contain no-repeat; display:flex; align-items:center; justify-content:center;
    transition:transform .08s ease; }
  .ibtn:active{ transform:translateY(2px) scale(.98); }
  .ibtn.continue{ background-image:url("../assets/ui/btn_continue.png"); }
  .ibtn.free{ background-image:url("../assets/ui/btn_free.png"); width:64px; height:64px; }
  .ibtn.retry{ background-image:url("../assets/ui/btn_retry.png"); }
  .ibtn.next{ background-image:url("../assets/ui/btn_continue.png"); }
  /* cost number overlaid on the green continue button (cosmetic coin price) */
  .ibtn .cost{ position:absolute; right:18%; font-weight:900; font-size:17px; color:#fff;
    -webkit-text-stroke:2px #2a6a14; paint-order:stroke fill; text-shadow:0 2px 0 rgba(0,0,0,.2);
    font-variant-numeric:tabular-nums; }
  .ibtn.next .nextlbl{ position:absolute; right:20%; font-weight:900; font-size:18px; color:#fff;
    letter-spacing:1px; -webkit-text-stroke:2px #2a6a14; paint-order:stroke fill; text-shadow:0 2px 0 rgba(0,0,0,.2); }
  /* continue + free sit side-by-side; retry full-width below */
  .btn-row{ display:flex; align-items:center; justify-content:center; gap:10px; width:100%; }
  .btn-row .ibtn.continue{ width:46%; height:50px; }

  /* ---- CLEAN game-over panel (panel_gameover_clean.png) + coin HUD + X + RETRY ---- */
  .card.gameover.clean{ background-image:url("../assets/ui/panel_gameover_clean.png"); aspect-ratio:943/1159; }
  /* content is a CENTERED group inside the cream area (never stretched to the border,
     so buttons can't spill past the frame). top/bottom = the cream inset of the panel. */
  .card.gameover.clean .card-body{ top:22%; bottom:9%; left:10%; right:10%; gap:11px;
    display:flex; flex-direction:column; justify-content:center; }
  /* TITLE — centered ON the ribbon (popup-relative), bigger. */
  .card.gameover.clean .go-title{ position:absolute; top:8.5%; left:50%; transform:translate(-50%,-50%); z-index:4;
    font-weight:800; font-size:35px; letter-spacing:1px; white-space:nowrap; color:#ffe27a;
    -webkit-text-stroke:2px #6a2f6a; paint-order:stroke fill;
    text-shadow:0 2px 0 rgba(70,25,70,.5), 0 3px 4px rgba(0,0,0,.22); }
  /* coin balance HUD — floats ABOVE the popup with a clear gap (separated from the ribbon) */
  .go-coins{ position:absolute; top:-16%; left:50%; transform:translateX(-50%); z-index:5;
    display:flex; align-items:center; gap:5px; padding:4px 14px 4px 7px; border-radius:18px;
    background:linear-gradient(#fff6e4,#f3ddb2); border:3px solid #fff; box-shadow:0 4px 0 rgba(0,0,0,.18); }
  .go-coins .ci{ width:25px; height:25px; background:url("../assets/ui/icon_coin.png") center/contain no-repeat; }
  .go-coins .cv{ font-weight:700; font-size:18px; color:#c2741a; text-shadow:0 1px 0 #fff; font-variant-numeric:tabular-nums; }
  /* SECTIONS (구역 분리): top = continue effect, divider, bottom = buttons */
  .go-sec{ display:flex; flex-direction:column; align-items:center; }
  .go-sec.top{ gap:6px; padding-top:4px; }
  .go-continue-txt{ font-weight:800; font-size:22px; color:#ffb02e;
    -webkit-text-stroke:1.2px #fff; paint-order:stroke fill; text-shadow:0 2px 0 rgba(150,80,10,.22); }
  .go-divider{ width:86%; height:3px; margin:8px auto; border-radius:3px;
    background:linear-gradient(90deg, rgba(165,120,70,0), rgba(165,120,70,.45) 50%, rgba(165,120,70,0)); }
  .go-sec.bot{ flex-direction:row; gap:10px; width:100%; }
  /* 3D TOY buttons — NO white outline; glossy top highlight + colored side ledge + drop
     shadow give the depth (입체감 토이아트톤). Press = sink onto the ledge. */
  .go-btn{ flex:1; height:52px; border-radius:26px; display:flex; align-items:center; justify-content:center; gap:6px;
    cursor:pointer; pointer-events:auto; font-weight:900; font-size:19px; color:#fff;
    text-shadow:0 2px 1px rgba(0,0,0,.3); transition:transform .08s, box-shadow .08s; }
  .go-btn:active{ transform:translateY(4px); }
  .go-btn.coin{ background:linear-gradient(#90e85f 0%,#6cca44 48%,#4faf30 100%);
    box-shadow:inset 0 3px 0 rgba(255,255,255,.5), inset 0 -6px 7px rgba(0,80,15,.34), 0 6px 0 #2f7d1d, 0 10px 11px rgba(0,0,0,.28); }
  .go-btn.coin:active{ box-shadow:inset 0 3px 0 rgba(255,255,255,.45), inset 0 -5px 7px rgba(0,80,15,.32), 0 2px 0 #2f7d1d, 0 4px 6px rgba(0,0,0,.24); }
  .go-btn.retry{ background:linear-gradient(#ffb858 0%,#f7973a 48%,#ef7d1c 100%);
    box-shadow:inset 0 3px 0 rgba(255,255,255,.55), inset 0 -6px 7px rgba(150,55,0,.34), 0 6px 0 #c25e12, 0 10px 11px rgba(0,0,0,.28); }
  .go-btn.retry:active{ box-shadow:inset 0 3px 0 rgba(255,255,255,.5), inset 0 -5px 7px rgba(150,55,0,.32), 0 2px 0 #c25e12, 0 4px 6px rgba(0,0,0,.24); }
  .go-btn .bi-coin{ width:24px; height:24px; background:url("../assets/ui/icon_coin.png") center/contain no-repeat; }
  .go-btn .bi-retry{ font-size:21px; font-weight:800; }
  .go-btn.shake{ animation:shakeX .3s ease; }
  @keyframes shakeX{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }

  /* ---- ITEM SHOP popup — SAME image panel as the other popups (panel_popup.png:
         purple ribbon + baked-in X + cream area). Centered by #overlay; the X is part
         of the panel (top-right), so it never offsets the panel's centering. ---- */
  .card.shop{ background-image:url("../assets/ui/panel_popup.png"); aspect-ratio:215/305; }
  .card.shop .shop-x{ position:absolute; top:0; right:0; width:22%; height:15%; cursor:pointer; pointer-events:auto; z-index:5; }
  .card.shop .shop-ribbon{ position:absolute; top:11%; left:49.8%; transform:translate(-50%,-50%); z-index:4;
    font-size:35px; font-weight:800; letter-spacing:1px; color:#fff; white-space:nowrap;
    text-shadow:0 2px 0 rgba(95,30,95,.5), 0 3px 4px rgba(0,0,0,.22); }
  .card.shop .card-body{ top:25%; bottom:17%; left:12%; right:12%; justify-content:center; gap:9px; }
  .card.shop .shop-icon{ width:64%; aspect-ratio:1/1; background:center/138% no-repeat;
    filter:drop-shadow(0 4px 4px rgba(0,0,0,.22)); }
  .card.shop .shop-name{ font-size:18px; font-weight:900; color:#7a4a14; }
  .card.shop .shop-desc{ font-size:12.5px; color:#9a7548; text-align:center; line-height:1.3; }
  .card.shop .shop-buy{ flex:none; width:76%; max-width:188px; height:50px; margin-top:4px; }

  /* ---- CLEAR: full-screen DIM show (no card) — big praise + MAX COMBO + NEXT ---- */
  #overlay.on.clear{ background:rgba(20,8,2,.62); }
  .clear-show{ width:min(92vw,420px); display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:16px; }
  .clear-show .cb-praise{ width:78vw; max-width:330px; height:116px; background:center/contain no-repeat;
    filter:drop-shadow(0 5px 6px rgba(0,0,0,.4)); animation:obPop .5s cubic-bezier(.34,1.56,.64,1); }
  .clear-show .cb-maxcombo{ display:flex; flex-direction:column; align-items:center; gap:2px; }
  .clear-show .cb-maxcombo .lbl{ font-weight:900; font-size:21px; letter-spacing:2px; color:#ffe08a;
    -webkit-text-stroke:1px rgba(120,60,10,.6); paint-order:stroke fill; }
  .clear-show .cb-maxcombo .val{ font-weight:900; font-size:64px; line-height:1; color:#ffce3a;
    -webkit-text-stroke:4px #8a3d00; paint-order:stroke fill; text-shadow:0 4px 0 rgba(0,0,0,.25);
    font-variant-numeric:tabular-nums; animation:obPop .5s .1s both cubic-bezier(.34,1.56,.64,1); }
  /* coins earned on clear (the earn source) */
  .clear-show .cb-coins{ display:flex; align-items:center; gap:5px; font-weight:900; font-size:26px; color:#ffe08a;
    -webkit-text-stroke:1.5px #7a4a10; paint-order:stroke fill; text-shadow:0 2px 0 rgba(0,0,0,.25);
    animation:obPop .5s .18s both cubic-bezier(.34,1.56,.64,1); }
  .clear-show .cb-coins .ci{ width:28px; height:28px; background:url("../assets/ui/icon_coin.png") center/contain no-repeat; }
  .clear-show .cb-next{ width:62%; max-width:230px; height:56px; border-radius:28px; cursor:pointer; pointer-events:auto;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(#90e85f 0%,#6cca44 48%,#4faf30 100%);
    box-shadow:inset 0 3px 0 rgba(255,255,255,.5), inset 0 -6px 7px rgba(0,80,15,.34), 0 6px 0 #2f7d1d, 0 10px 11px rgba(0,0,0,.26);

  /* legacy .popup kept for the PAUSE screen only */

  /* pause overlay */

    align-items:center; justify-content:center; }
  #pauseScreen.on{ display:flex; }
  #pauseScreen .popup h2{ font-size:26px; }

  /* dev nav */

<script>
/* =================================================================
   GameReels host bridge — GLOBAL (window.__GR) to avoid scope trap.
   Events + Haptics share the channel but are conceptually separate.
   ================================================================= */
(function(){
  var URLP = new URLSearchParams(location.search);
  // ===== REELS BUILD (GameReels) — forced ON so the deployed file HIDES currency UI + the item/booster
  // bar and turns the continue screen into a RESTART screen. Nothing is deleted; flip REELS_BUILD=false
  // to RESTORE the full game (coins/items/continue). verify.mjs sets window.__NO_REELS to test the full game. =====
  var REELS_BUILD = !window.__NO_REELS;
  var REELS = REELS_BUILD || URLP.has('reels') || URLP.has('gamereels');
  var DEV   = URLP.has('dev');
  var FROM  = parseInt(URLP.get('from'),10); if(!(FROM>=1)) FROM = 1;
  var TO    = parseInt(URLP.get('to'),10);   if(!(TO>=1))   TO = null;

  // single channel post (event-message) — FLAT {event,data}
  function postMsg(event, data){
    var msg = { event: event, data: (data===undefined? null : data) };
    try{
      if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler){
        window.flutter_inappwebview.callHandler('flutterChannel', msg);
      }
    }catch(e){}
    try{ if (window.GameReels && window.GameReels.post) window.GameReels.post(event, msg.data); }catch(e){}
    try{ if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.gamereels)
           window.webkit.messageHandlers.gamereels.postMessage(msg); }catch(e){}
    try{ if (window.parent && window.parent!==window) window.parent.postMessage(msg,'*'); }catch(e){}
  }

  // Haptic delegation — multi-path. iOS web has no navigator.vibrate (real app vibrates via signal).
  function vibrate(signal){
    var msg = { event: signal, data: null };
    try{
      if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler)
        window.flutter_inappwebview.callHandler('flutterChannel', msg);
    }catch(e){}
    try{ if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.haptic)
           window.webkit.messageHandlers.haptic.postMessage(signal); }catch(e){}
    try{
      if (navigator.vibrate){
        var ms = signal==='MediumVibrate'?22 : signal==='LightVibrate'?12 : 8;
        navigator.vibrate(ms);
      }
    }catch(e){}
  }

  window.__GR = {
    reels: REELS, dev: DEV, from: FROM, to: TO, active: true,
    post: postMsg, vibrate: vibrate
  };
  // GameReels.post fallback object (so postMsg's own fallback works if host supplies it later)
  if (!window.GameReels) window.GameReels = { post: function(ev,d){ postMsg(ev,d); } };
})();
</script>

<script>
/* =================================================================
   GOODS SORT engine — data-driven match-3 "sort into cubbies".
   ================================================================= */
(function(){
  'use strict';
  var GR = window.__GR;

  // ---------- runtime config (from URL via __GR) ----------
  var REELS = GR.reels, DEV = GR.dev;
  var startLevel = GR.from;            // 1-based
  var stopLevel  = GR.to;              // 1-based or null

  if (REELS) document.body.classList.add('reels');
  if (DEV) document.getElementById('devnav').classList.add('on');

  // GameEnd emission policy (single source of truth)
  function shouldEmitGameEnd(level){
    if (!REELS) return true;                 // non-reels: every level
    if (stopLevel && level === stopLevel) return true;  // segment end
    return (level % 30) === 0;               // reels: 30-multiples only
  }

  // ---------- haptics (CORE-GATED only) ----------
  // =============================================================
  // SFX — soft, ASMR-style sound effects (Web Audio: decode once -> low-latency playback).
  // Files in ../assets/audio/. The context unlocks on the first user gesture (mobile autoplay
  // policy). Missing/failed files just no-op (play() guards on a decoded buffer). Volumes are
  // kept LOW + soft (user: "귀 아픈 소리 말고 ASMR 소리처럼").
  // =============================================================
  var SFX = (function(){
    var ctx=null, buffers={}, inited=false, muted=false, master=null, bgm=null, bgmVol=0.30;
    var FILES={ pick:'sfx_pick', drop:'sfx_drop', clear:'sfx_clear', combo:'sfx_combo', win:'sfx_win', lock:'sfx_lock', button:'sfx_button' };
    var VOL={ pick:0.5, drop:0.55, clear:0.8, combo:0.75, win:0.85, lock:0.65, button:0.5 };
    function init(){
      if (inited) return; inited=true;
      try { var AC=window.AudioContext||window.webkitAudioContext;
        if (AC){ ctx=new AC(); master=ctx.createGain(); master.gain.value=0.85; master.connect(ctx.destination);
          Object.keys(FILES).forEach(function(k){
            fetch('../assets/audio/'+FILES[k]+'.mp3').then(function(r){ return r.ok?r.arrayBuffer():null; })
              .then(function(ab){ if(!ab||!ctx) return; ctx.decodeAudioData(ab, function(b){ buffers[k]=b; }, function(){}); })
              .catch(function(){});
          });
        }
      } catch(e){ ctx=null; }
      // BGM = a calm looping track (HTMLAudio); low volume so it sits UNDER the SFX. Starts on unlock().
      try { bgm=new Audio('../assets/audio/bgm.mp3'); bgm.loop=true; bgm.volume=bgmVol; bgm.preload='auto'; } catch(e){ bgm=null; }
    }
    function unlock(){
      init();
      if (ctx && ctx.state==='suspended'){ try{ ctx.resume(); }catch(e){} }
      if (bgm && !muted && bgm.paused){ var pr=bgm.play(); if(pr&&pr.catch) pr.catch(function(){}); }   // gesture-gated autoplay
    }
    function play(name, vol){
      if (muted || !ctx || !buffers[name]) return;
      try { var s=ctx.createBufferSource(); s.buffer=buffers[name];
        var g=ctx.createGain(); g.gain.value=(vol!=null?vol:(VOL[name]||0.6));
        s.connect(g); g.connect(master); s.start(0); }catch(e){}
    }
    function setMuted(m){ muted=!!m;
      if (bgm){ if (muted){ try{ bgm.pause(); }catch(e){} } else { var pr=bgm.play(); if(pr&&pr.catch) pr.catch(function(){}); } } }
    return { init:init, unlock:unlock, play:play, setMuted:setMuted, isMuted:function(){return muted;},
             setBgmVolume:function(v){ bgmVol=Math.max(0,Math.min(1,v)); if(bgm) bgm.volume=bgmVol; },
             bgmState:function(){ return bgm ? { paused:bgm.paused, t:bgm.currentTime, vol:bgm.volume } : null; } };
  })();
  window.__sfx = SFX;                          // QA/debug hook

  function haptic(kind){
    // kind: 'place' (drop/place) -> Light | 'clear' (cubby clear) -> Medium | 'btn' -> Soft
    SFX.unlock();                              // any haptic == a user gesture -> unlock audio + play soft SFX
    if (kind==='place') SFX.play('drop');
    else if (kind==='btn') SFX.play('button');
    var sig = kind==='clear' ? 'MediumVibrate'
            : kind==='place' ? 'LightVibrate'
            : kind==='btn'   ? 'SoftVibrate' : null;
    if (!sig) return;                         // anything else = not core -> no vibration
    try{ GR.vibrate(sig); }catch(e){}
  }

  // =============================================================
  // SHELF 3D CONFIG — SINGLE SOURCE OF TRUTH for the shelf "look".
  // =============================================================
  // These DEFAULTS are baked INLINE so the single self-contained HTML works fully
  // OFFLINE (no JSON fetch required). BOTH the engine and the editor read this same
  // object. The engine applies it to the niche CSS vars + buildNiches()/fitGoods().
  // An OVERRIDE may be merged on top (so the editor's saved settings show up in the
